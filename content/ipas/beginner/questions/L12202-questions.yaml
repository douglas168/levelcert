    question: "某行銷經理需要 AI 用固定格式撰寫五款新品的社群貼文，每款要有不同的創意角度，且文案風格須符合品牌的年輕活潑調性。以下哪種提示策略組合最能同時滿足「格式一致」「創意多元」「風格控制」三個需求？"
