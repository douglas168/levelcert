  - id: L12202-Q33
    difficulty: 5
    question: "一位提示工程師需要讓 AI 為律師事務所撰寫法律備忘錄，需控制角色、語氣、受眾、輸出格式，且希望透過反覆實驗找到最佳提示。最適合的框架組合是什麼？"
    options:
      a: "只用 RTF 就足夠了"
      b: "只用 CO-STAR 就足夠了"
      c: "直接使用 APE 讓模型自動找出最佳提示"
      d: "用 CO-STAR 的六維度結構化需求，再結合 CRISPE 的 Experiment 環節進行迭代優化"
    correct: d
    explanation:
      why_correct: "題目需要角色/語氣/受眾/格式的多維度控制（CO-STAR 的強項），又需要反覆實驗（CRISPE 的 Experiment 環節）。組合使用兩個框架的優勢能最全面地滿足需求。"
      why_not_a: "RTF 只有三個維度（角色/任務/格式），缺少語氣和受眾的控制維度，無法滿足全部需求。"
      why_not_b: "CO-STAR 能覆蓋六個維度，但缺少系統化的實驗迭代機制，無法有效「反覆實驗找最佳提示」。"
      why_not_c: "APE 是自動優化方法，不是用來明確指定角色/語氣/受眾/格式的框架，無法精準捕捉律師事務所的特定風格需求。"
