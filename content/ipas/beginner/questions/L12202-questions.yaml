  - id: L12202-Q35
    difficulty: 5
    question: "某企業的 IT 部門主張全面採用 API 串接以確保技術控制力，而業務部門希望使用現成的 ChatGPT 外掛以快速上線。以下哪個決策最能平衡雙方需求？"
    options:
      a: "完全採用 IT 部門的方案，業務部門的需求不重要"
      b: "完全採用業務部門的方案，快速上線最重要"
      c: "暫緩所有 AI 導入計畫，等技術更成熟再決定"
      d: "核心業務流程用 API 串接確保安全性和客製化，非核心的輔助任務允許使用外掛快速部署，並制定明確的資料治理規範"
    correct: d
    explanation:
      why_correct: "方案D根據風險層級採用差異化策略：核心流程需要安全性和控制力（API串接），輔助任務需要速度和便利性（外掛），並用資料治理規範管控風險，兼顧了技術面、組織面和效益面。"
      why_not_a: "忽略業務部門的需求會降低組織接受度，且可能因開發週期過長而錯失機會。"
      why_not_b: "完全使用外掛可能在安全性和客製化上有風險，核心業務資料透過第三方外掛處理可能違反資料治理要求。"
      why_not_c: "「等技術成熟」是永遠等不到的，這種態度會讓企業在 AI 競爭中落後。"
    keywords: ["API串接", "外掛生態系", "AI導入決策", "風險分級"]
    exam_trap: false
