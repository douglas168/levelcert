- id: "L11201-Q06"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 1
  question: "下列何種資料型態需要透過自然語言處理（NLP）技術進行分析？"
  options:
    a: "數值型資料（Numerical Data）"
    b: "文字資料（Text Data）"
    c: "圖像資料（Image Data）"
    d: "音訊資料（Audio Data）"
  correct: "b"
  explanation:
    why_correct: "文字資料（Text Data）是語言內容，需要透過自然語言處理（NLP）技術進行斷詞、語意分析、情感分析等處理。"
    why_not_a: "數值型資料通常使用傳統機器學習或迴歸分析等統計方法，不需要 NLP。"
    why_not_c: "圖像資料使用電腦視覺（Computer Vision）和 CNN 等技術進行分析，而非 NLP。"
    why_not_d: "音訊資料主要使用語音辨識（Speech Recognition）技術，雖然後續可能涉及 NLP，但音訊本身的處理屬於不同技術領域。"
  keywords:
    - "NLP"
    - "自然語言處理"
    - "文字資料"
  exam_trap: false

