- id: "L11201-Q01"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 1
  question: "大數據（Big Data）的「3V」特性最早由哪位分析師於 2001 年提出？"
  options:
    a: "Tim Berners-Lee"
    b: "Doug Laney"
    c: "Andrew Ng"
    d: "Geoffrey Hinton"
  correct: "b"
  explanation:
    why_correct: "Gartner 分析師 Doug Laney 於 2001 年首先提出大數據的 3V 特性（Volume、Velocity、Variety），後續擴展為 5V。"
    why_not_a: "Tim Berners-Lee 是全球資訊網（World Wide Web）的發明者，與大數據定義無關。"
    why_not_c: "Andrew Ng 是知名 AI 學者，但並非提出大數據 3V 概念的人。"
    why_not_d: "Geoffrey Hinton 是深度學習先驅，被稱為「AI 教父」，但與大數據 3V 定義無關。"
  keywords:
    - "Big Data"
    - "3V"
    - "Doug Laney"
  exam_trap: false

- id: "L11201-Q02"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 1
  question: "大數據 5V 特性中，「Velocity」的中文意義為何？"
  options:
    a: "巨量性"
    b: "多樣性"
    c: "時效性"
    d: "真實性"
  correct: "c"
  explanation:
    why_correct: "Velocity 對應「時效性」，指數據流動連續且迅速，需要即時或近即時處理才能發揮最大價值。"
    why_not_a: "「巨量性」對應的是 Volume，指數據規模龐大。"
    why_not_b: "「多樣性」對應的是 Variety，指數據來源種類繁多。"
    why_not_d: "「真實性」對應的是 Veracity，指數據須具備真實性與品質。"
  keywords:
    - "Velocity"
    - "時效性"
    - "5V"
  exam_trap: false

- id: "L11201-Q03"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 1
  question: "GIGO 原則（Garbage In, Garbage Out）所強調的核心觀念為何？"
  options:
    a: "資料量越大，AI 模型越準確"
    b: "輸入的資料品質差，輸出結果也會很差"
    c: "非結構化資料無法用於 AI 訓練"
    d: "大數據必須使用雲端運算才能處理"
  correct: "b"
  explanation:
    why_correct: "GIGO（Garbage In, Garbage Out）意為「垃圾進，垃圾出」，強調資料品質決定分析結果品質——若輸入的資料有偏差、錯誤或不完整，產出的結果也不可靠。"
    why_not_a: "資料量大不代表品質好，大量低品質資料反而會降低模型表現。GIGO 強調的是品質而非數量。"
    why_not_c: "非結構化資料可以透過 NLP、電腦視覺等技術進行 AI 訓練，並非無法使用。"
    why_not_d: "大數據的處理方式與 GIGO 原則是不同概念，GIGO 關注的是資料品質而非運算環境。"
  keywords:
    - "GIGO"
    - "Garbage In Garbage Out"
    - "資料品質"
  exam_trap: false

- id: "L11201-Q04"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 1
  question: "下列何者屬於「非結構化資料」（Unstructured Data）？"
  options:
    a: "CSV 檔案"
    b: "JSON 檔案"
    c: "關聯式資料庫表格"
    d: "監視器錄影影片"
  correct: "d"
  explanation:
    why_correct: "監視器錄影影片沒有預定義的格式或表格結構，屬於非結構化資料，需要電腦視覺等 AI 技術才能分析。"
    why_not_a: "CSV 檔案有固定的欄位分隔規則（逗號分隔），以行和列儲存資料，屬於結構化資料。"
    why_not_b: "JSON 檔案透過鍵值對（key-value pairs）提供部分組織結構，屬於半結構化資料。"
    why_not_c: "關聯式資料庫表格有固定的 schema 定義（欄位名稱、資料類型），是最典型的結構化資料。"
  keywords:
    - "非結構化資料"
    - "Unstructured Data"
    - "影片"
  exam_trap: false

