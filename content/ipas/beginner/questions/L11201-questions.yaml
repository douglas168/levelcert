  item_code: "L11201"
  difficulty: 5
  question: "某零售企業規劃建立 AI 客戶分析系統，需要整合以下資料：POS 交易紀錄（CSV）、客服錄音檔（MP3）、社群媒體評論（網頁文字）、會員 APP 使用行為（JSON log）。此專案面臨的最大資料整合挑戰為何？"
  options:
    a: "資料量太大，需要更多儲存空間"
    b: "四種資料都是非結構化的，無法建立統一的資料庫"
    c: "資料涵蓋結構化、半結構化和非結構化三種類型，需要不同的 AI 技術分別處理後才能整合分析"
    d: "所有資料都來自外部來源，公司無法控制資料品質"
  correct: "c"
  explanation:
    why_correct: "POS 交易 CSV 是結構化、客服錄音 MP3 是非結構化、社群評論是非結構化、JSON log 是半結構化。三種結構類型需要不同的處理技術（結構化 → SQL/統計分析、非結構化音訊 → 語音辨識、非結構化文字 → NLP、半結構化 → JSON 解析），整合後才能做綜合分析。"
    why_not_a: "儲存空間是基礎設施問題，不是「最大的資料整合挑戰」。增加儲存相對容易解決。"
    why_not_b: "這四種資料並非全部是非結構化的——CSV 是結構化、JSON 是半結構化。錯誤的分類前提導致錯誤的結論。"
    why_not_d: "POS 紀錄和會員 APP 行為是公司內部資料，並非所有資料都來自外部。"
  keywords:
    - "資料整合"
    - "結構化"
    - "半結構化"
    - "非結構化"
    - "AI技術"
  exam_trap: false

- id: "L11201-Q29"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 5
  question: "政府資料開放平臺（data.gov.tw）推動「高應用價值」主題資料，下列哪一項「不是」其九大優先聚焦領域之一？"
  options:
    a: "農業永續"
    b: "交通運輸"
    c: "電子商務"
    d: "健康醫療"
  correct: "c"
  explanation:
    why_correct: "data.gov.tw 的九大優先領域為：農業永續、空間資訊、氣候環境、災害防救、交通運輸、健康醫療、能源管理、社會救助、企業永續。其中不包含「電子商務」——電子商務屬於民間商業行為，非政府開放資料的優先主題。"
    why_not_a: "農業永續是八大優先領域之一，台灣以農業數位轉型為重要政策方向。"
    why_not_b: "交通運輸是八大優先領域之一，政府積極開放交通即時資料供民間應用。"
    why_not_d: "健康醫療是八大優先領域之一，與健保資料庫等醫療大數據開放相關。"
  keywords:
    - "data.gov.tw"
    - "八大領域"
    - "高應用價值"
    - "反向題"
  exam_trap: false

- id: "L11201-Q30"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 5
  question: "某 AI 新創公司正在評估一個大型資料集是否值得購買。團隊發現該資料集的 Volume 和 Variety 都很優秀，但在抽樣檢查中發現約 30% 的紀錄存在明顯錯誤。從 5V 框架的角度，下列哪一項是最合理的決策建議？"
  options:
    a: "直接購買，因為 Volume 和 Variety 足以彌補品質問題"
    b: "不購買，因為 Veracity 問題嚴重，依 GIGO 原則使用該資料訓練的模型不可靠"
    c: "購買後直接用於模型訓練，AI 會自動修正資料中的錯誤"
    d: "購買並全部刪除有錯誤的紀錄，只用剩餘 70% 的資料"
  correct: "b"
  explanation:
    why_correct: "30% 的錯誤率極高，嚴重違反 Veracity（真實性）。根據 GIGO 原則，品質差的資料會直接導致模型輸出不可靠。即使 Volume 和 Variety 優秀，真實性的嚴重缺陷使得整體資料的可用價值大幅降低，不建議購買。"
    why_not_a: "Volume 和 Variety 無法彌補 Veracity 的缺陷。大量多樣但錯誤的資料，訓練出的模型可能比小量高品質資料更差。"
    why_not_c: "AI 模型不會自動修正訓練資料中的錯誤——模型是從資料中學習模式，如果資料本身有錯誤，模型只會學到錯誤的模式。"
    why_not_d: "簡單刪除有錯誤的紀錄可能導致樣本偏差（selection bias），且剩餘 70% 的資料中可能也存在未被抽樣檢查發現的錯誤。更根本的問題是資料源頭的品質就有問題。"
  keywords:
    - "Veracity"
    - "Value"
    - "GIGO"
    - "資料品質評估"
    - "5V"
  exam_trap: false

