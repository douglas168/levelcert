    d: "Variety — 資料類型單一，模型無法從多角度學習"
  correct: "c"
  explanation:
    why_correct: "缺失值、重複紀錄和異常值都是資料品質（Veracity）問題。根據 GIGO 原則（Garbage In, Garbage Out），品質差的資料會導致模型產出不可靠的結果，無論模型多先進都無法彌補。"
    why_not_a: "題目描述的是資料品質問題（缺失、重複、異常），而非資料量不足的問題。"
