- id: "L11201-Q07"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "大數據 5V 中的「Veracity（真實性）」與下列哪個原則最密切相關？"
  options:
    a: "80/20 法則"
    b: "GIGO 原則"
    c: "摩爾定律"
    d: "帕累托法則"
  correct: "b"
  explanation:
    why_correct: "Veracity（真實性）強調資料品質，需過濾偏差、偽造或異常的「髒數據」。GIGO 原則（Garbage In, Garbage Out）同樣強調資料品質決定輸出品質，兩者核心觀念一致。"
    why_not_a: "80/20 法則在資料領域通常指約 80% 的資料是非結構化資料，與真實性（品質）無直接關聯。"
    why_not_c: "摩爾定律描述積體電路上電晶體數量的成長趨勢，與資料品質無關。"
    why_not_d: "帕累托法則（Pareto Principle）是 80/20 法則的另一種說法，與資料真實性無直接關聯。"
  keywords:
    - "Veracity"
    - "真實性"
    - "GIGO"
  exam_trap: false

- id: "L11201-Q08"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "電子郵件（Email）在資料結構分類中屬於下列何者？"
  options:
    a: "結構化資料"
    b: "半結構化資料"
    c: "非結構化資料"
    d: "純文字資料"
  correct: "b"
  explanation:
    why_correct: "電子郵件具有結構化欄位（寄件人、收件人、主旨、日期），但郵件內文是自由格式的文字，因此介於結構化與非結構化之間，屬於半結構化資料。"
    why_not_a: "電子郵件雖有部分欄位是結構化的，但內文沒有固定 schema，不能歸類為完全結構化資料。"
    why_not_c: "非結構化資料是完全沒有預定義格式的資料。電子郵件有寄件人、收件人等固定欄位，不算完全非結構化。"
    why_not_d: "「純文字資料」不是資料結構的標準分類方式，且電子郵件包含的不只是文字。"
  keywords:
    - "Email"
    - "半結構化資料"
    - "Semi-structured Data"
  exam_trap: true

- id: "L11201-Q09"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "關於全球資料的結構化程度，下列敘述何者最接近事實？"
  options:
    a: "約 80% 為結構化資料，20% 為非結構化資料"
    b: "結構化與非結構化資料各約 50%"
    c: "約 80% 為非結構化資料，20% 為結構化及半結構化資料"
    d: "約 60% 為半結構化資料，40% 為其他"
  correct: "c"
  explanation:
    why_correct: "業界普遍引用的比例為約 80% 的資料屬於非結構化資料（圖片、影片、自由文字等），僅約 20% 為結構化及半結構化資料。這解釋了為何 NLP、電腦視覺等處理非結構化資料的 AI 技術如此重要。"
    why_not_a: "實際比例恰好相反。結構化資料只佔約 20%，非結構化資料佔約 80%。"
    why_not_b: "兩者比例並非各半，非結構化資料遠多於結構化資料。"
    why_not_d: "半結構化資料（JSON、XML、Email 等）並非佔最大比例，非結構化資料才是。"
  keywords:
    - "80/20"
    - "非結構化資料"
    - "資料比例"
  exam_trap: false

- id: "L11201-Q10"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "數值型資料（Numerical Data）可進一步分為離散型與連續型，下列何者屬於「連續型」資料？"
  options:
    a: "班級學生人數"
    b: "商品庫存數量"
    c: "氣溫變化數值"
    d: "每日訂單筆數"
  correct: "c"
  explanation:
    why_correct: "氣溫是連續型（continuous）資料，可以是任意數值（如 25.3°C、25.31°C），透過測量取得，數值之間可以無限細分。"
    why_not_a: "學生人數是離散型（discrete）資料，只能是整數（不會有 0.5 個學生），透過計數取得。"
    why_not_b: "庫存數量是離散型資料，只能是整數，屬於可數的數值。"
    why_not_d: "訂單筆數是離散型資料，只能是正整數，透過計數取得。"
  keywords:
    - "連續型"
    - "離散型"
    - "Numerical Data"
  exam_trap: false

- id: "L11201-Q11"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "下列哪一組資料格式全部屬於「半結構化資料」？"
  options:
    a: "CSV、Excel、SQL 資料庫"
    b: "JSON、XML、HTML"
    c: "JPEG、MP3、PDF"
    d: "JSON、CSV、MP4"
  correct: "b"
  explanation:
    why_correct: "JSON、XML、HTML 都使用標籤（tags）或鍵值對（key-value pairs）提供部分結構，但沒有固定的表格 schema，屬於半結構化資料。"
    why_not_a: "CSV、Excel、SQL 資料庫都有固定的行列結構（schema），屬於結構化資料。"
    why_not_c: "JPEG（圖片）、MP3（音訊）、PDF（文件）都沒有預定義的資料結構，屬於非結構化資料。"
    why_not_d: "JSON 是半結構化，但 CSV 是結構化、MP4 是非結構化，三者分屬不同類別。"
  keywords:
    - "半結構化資料"
    - "JSON"
    - "XML"
    - "HTML"
  exam_trap: true

- id: "L11201-Q12"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 2
  question: "「Data is the fuel for AI」這句話最能說明下列哪個觀念？"
  options:
    a: "AI 系統需要耗費大量電力才能運作"
    b: "沒有資料，AI 模型無法學習和做出預測"
    c: "AI 技術的發展取決於半導體產業"
    d: "資料分析只能由 AI 系統來完成"
  correct: "b"
  explanation:
    why_correct: "「資料是 AI 的燃料」意味著 AI 模型的學習、訓練和預測都依賴於資料。沒有資料，AI 模型就如同沒有燃料的引擎，無法運作。"
    why_not_a: "電力消耗是 AI 系統的硬體需求，並非「fuel for AI」這個比喻要表達的意思。"
    why_not_c: "半導體產業影響的是運算能力（算力），而非「資料是燃料」的核心概念。"
    why_not_d: "資料分析可以由人工或傳統統計方法完成，不一定需要 AI。這句話強調的是 AI 需要資料，而非資料只能由 AI 處理。"
  keywords:
    - "Data is the fuel for AI"
    - "資料與AI關係"
  exam_trap: false

