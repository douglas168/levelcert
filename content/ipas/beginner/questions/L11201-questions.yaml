- id: "L11201-Q16"
  topic_code: "L11201"
  item_code: "L11201"
  difficulty: 3
  question: "7-11 超商想要預測各門市每小時的來客數量，以最佳化人力調度。下列哪些資料屬於「內部資料」？ ①POS 系統交易紀錄 ②門市附近氣象資料 ③會員 APP 使用紀錄 ④周邊競爭店家開店資訊"
  options:
    a: "①② "
    b: "①③"
    c: "②④"
    d: "①②③"
  correct: "b"
  explanation:
