  correct: "b"
  explanation:
    why_correct: "結合環保署、氣象局、交通流量三種不同來源的資料，提升了多樣性（Variety）。同時建立品質檢核機制確保真實性（Veracity）。這種做法在擴大資料面向的同時，也確保資料可靠。"
