    tags: ["pca", "k-means", "pipeline", "unsupervised"]

  - id: L11302-Q40
    stem: "某 AI 應用規劃師在對新人解說「為什麼說邏輯迴歸是分類演算法而不是迴歸演算法？」以下哪個解釋最準確且完整？"
    options:
      a: "因為邏輯迴歸不能預測數值，只能輸出 0 或 1"
      b: "因為邏輯迴歸使用 Sigmoid 函數把輸出壓縮到 0–1 之間表示機率，再根據閾值判斷類別。雖名稱有『迴歸』，但輸出型態和任務目標都是分類，不是預測連續數值"
      c: "因為邏輯迴歸是從非監督式學習衍生而來的，所以不是真正的迴歸"
      d: "因為邏輯迴歸的輸入必須是類別型特徵，所以歸類為分類演算法"
    answer: "b"
    explanation: "邏輯迴歸的本質：使用 Sigmoid 函數把線性組合壓縮到 0–1（機率），再透過閾值（通常 0.5）轉換成類別判斷。雖然歷史上命名沿用了「迴歸」，但它的輸出目標是類別（分類任務），這正是初級考試最核心的命名陷阱之一。選 a 錯在「只輸出 0 或 1」——邏輯迴歸實際上輸出的是機率，再由閾值轉成 0/1。"
    difficulty: 5
    tags: ["logistic-regression", "sigmoid", "classification", "naming-trap"]
