    answer: "c"
    explanation: "有標籤、二元分類任務、追求高準確率、中型結構化資料 → XGBoost（梯度提升，Gradient Boosting 的高效實作）是業界公認在結構化資料上的最強選手之一。PCA 是降維、K-means 是無標籤分群、線性迴歸是連續值預測。"
    difficulty: 3
    tags: ["xgboost", "gradient-boosting", "scenario", "classification"]

  # ── Difficulty 4 (D4 × 6) ─────────────────────────────────────
  - id: L11302-Q31
    stem: "下列關於「KNN（K 近鄰演算法）」與「K-means」的比較，哪一項最正確？"
    options:
      a: "兩者都屬於非監督式學習，差別只在 K 值大小"
      b: "KNN 是監督式分類（有標籤，看鄰居投票）；K-means 是非監督式分群（無標籤，找質心）"
      c: "K-means 是監督式學習；KNN 是非監督式學習"
      d: "兩者都使用 Boosting 策略"
    answer: "b"
    explanation: "KNN（K-Nearest Neighbors，K 近鄰演算法）是監督式分類，K 代表「看最近的幾個鄰居」，需要標籤；K-means 是非監督式分群，K 代表「要分幾群」，不需要標籤。這是初級考試最常出的混淆陷阱。"
    difficulty: 4
    tags: ["knn", "k-means", "confusion-trap", "supervised-vs-unsupervised"]

  - id: L11302-Q32
    stem: "某主管問：「為什麼你不用一棵大決策樹，而要用隨機森林？建那麼多棵樹不是浪費資源嗎？」以下哪個回答最準確？"
    options:
      a: "因為隨機森林每棵樹都獨立解決不同類型的任務"
      b: "因為單棵決策樹容易過擬合，隨機森林透過 Bagging 建多棵樹並投票，能大幅降低過擬合風險、提升準確率"
      c: "因為隨機森林使用 Boosting，每棵樹修補前棵的錯誤，效率更高"
      d: "因為深度學習需要多棵決策樹才能運作"
    answer: "b"
    explanation: "隨機森林的價值在於：單棵決策樹容易過擬合；而 Bagging 策略建出多棵在不同隨機子集上訓練的樹，再取平均/投票，有效降低整體的變異，避免過擬合。雖然計算多，但換來更穩定的高準確率。選 c 錯在「Boosting」——隨機森林用的是 Bagging。"
    difficulty: 4
    tags: ["random-forest", "decision-tree", "bagging", "overfitting"]

  - id: L11302-Q33
    stem: "下列對於「PCA（主成分分析）」的分析，何者最準確？"
    options:
      a: "PCA 是非監督式降維，它找出資料中方差最大的方向（主成分）進行投影，不需要任何標籤"
      b: "PCA 需要標籤資料，是監督式學習的降維工具"
      c: "PCA 的目的是把資料分成若干個群，每個群代表一個類別"
      d: "PCA 是強化式學習的一種特殊形式"
    answer: "a"
    explanation: "PCA 是非監督式降維方法：不需要標籤，通過找出資料中「解釋最多方差的方向（主成分）」來把高維資料投影到低維空間，同時保留最多資訊。目的是降維，不是分群。"
    difficulty: 4
    tags: ["pca", "unsupervised", "dimensionality-reduction"]

  - id: L11302-Q34
    stem: "下列關於「SVM（支援向量機）」的描述，哪一組最完整正確？"
    options:
      a: "SVM 屬於非監督式學習，通過找出群之間的超平面來分群"
      b: "SVM 是監督式分類演算法，核心是找最大邊界超平面，使用核技巧（Kernel Trick）處理非線性資料"
      c: "SVM 是集成學習方法，由多個決策樹組成"
      d: "SVM 是懶惰學習演算法，訓練時不建立任何模型"
    answer: "b"
    explanation: "SVM（Support Vector Machine，支援向量機）是監督式分類演算法，核心概念是找到使兩類間邊界（Margin）最大的超平面。對於線性不可分的資料，使用核技巧（Kernel Trick）將資料映射到更高維空間後再分類。SVM 是積極學習（建立模型），不是懶惰學習。"
    difficulty: 4
    tags: ["svm", "kernel-trick", "hyperplane"]

  - id: L11302-Q35
    stem: "某資深工程師面試一位候選人，問道：「XGBoost 和隨機森林都是集成學習，請說明兩者最根本的策略差異。」下列哪個回答最準確？"
    options:
      a: "兩者策略完全相同，差別只在樹的數量"
      b: "XGBoost 使用 Boosting（依序建樹，每棵修補前棵錯誤）；隨機森林使用 Bagging（並行建多棵獨立樹再投票）"
      c: "XGBoost 使用 Bagging；隨機森林使用 Boosting"
      d: "XGBoost 是非監督式；隨機森林是監督式"
    answer: "b"
    explanation: "XGBoost（梯度提升）使用 Boosting：依序建樹，每棵新樹專門修補前棵的預測誤差，最終把所有樹的預測累加。隨機森林使用 Bagging：並行建多棵互相獨立的樹（各自用隨機子集訓練），最後投票。"
    difficulty: 4
    tags: ["xgboost", "random-forest", "boosting", "bagging"]

  - id: L11302-Q36
    stem: "某學生說：「KNN 不需要訓練，所以是計算成本最低的演算法。」對於這個說法，下列哪個評估最正確？"
    options:
      a: "完全正確，KNN 確實是計算成本最低的演算法"
      b: "部分正確但有誤解：KNN 訓練成本低（只存資料），但預測時需要對每個新資料計算與所有訓練資料的距離，資料量大時預測成本極高"
      c: "完全錯誤，KNN 是所有演算法中訓練時間最長的"
      d: "KNN 根本不屬於機器學習演算法"
    answer: "b"
    explanation: "KNN 的懶惰學習特性：訓練時成本極低（只是把資料存起來），但代價是預測時成本高——每次預測都要計算新點與所有 N 個訓練資料的距離，時間複雜度 O(N)。資料量大時，預測速度非常慢，這是 KNN 最大的實務缺點。"
    difficulty: 4
    tags: ["knn", "lazy-learning", "computational-cost"]

  # ── Difficulty 5 (D5 × 4) ─────────────────────────────────────
  - id: L11302-Q37
    stem: "某 AI 顧問接到一個任務：客戶有大量文字客訴資料（10 萬筆，無任何標籤），想了解主要有哪些客訴主題。顧問計劃用 K-means 分成 5 群，但不確定 5 是否正確。下列解決策略何者最合理？"
    options:
      a: "直接用 K=5 跑 K-means，不需要驗證"
      b: "先用手肘法（嘗試 K=2 到 K=10，畫出群內誤差曲線找彎折點）確認合理 K 值，再執行 K-means 分群"
      c: "把資料打標籤後改用監督式學習的決策樹"
      d: "使用反向傳播來選擇最佳 K 值"
    answer: "b"
    explanation: "K-means 最大問題是「不知道 K 應該是多少」。正確流程是先用手肘法：嘗試多個 K 值，繪製 WCSS（群內誤差平方和）曲線，找到彎折最明顯的「手肘」點作為最佳 K——這樣的決策有依據，比憑感覺直接用 K=5 更嚴謹。反向傳播是神經網路概念，與 K-means 無關。"
    difficulty: 5
    tags: ["k-means", "elbow-method", "unsupervised", "scenario"]

  - id: L11302-Q38
    stem: "某新創公司正在建立一個詐騙偵測系統。工程師 A 提議用邏輯迴歸，工程師 B 提議用 XGBoost，工程師 C 提議用深度神經網路。資料量約 30 萬筆有標籤交易，任務是二元分類（詐騙/非詐騙），公司也需要向稽核人員解釋「模型為何認定某筆交易是詐騙」。綜合考量後，哪個建議最優先值得評估？"
    options:
      a: "工程師 A（邏輯迴歸）——因為最簡單"
      b: "工程師 B（XGBoost）——在中大型結構化資料上準確率高，且可透過特徵重要性提供部分解釋"
      c: "工程師 C（深度神經網路）——因為最複雜通常最準"
      d: "三者效果完全一樣，隨意選擇"
    answer: "b"
    explanation: "綜合評估：30 萬筆結構化資料 + 需要高準確率 + 需要部分可解釋性 → XGBoost 是最均衡選擇，在競賽和業界結構化資料上表現卓越，且可提供特徵重要性（Feature Importance）協助解釋。邏輯迴歸在這種複雜詐騙模式上準確率可能不足；深度神經網路解釋性差且對結構化資料未必勝過 XGBoost。"
    difficulty: 5
    tags: ["xgboost", "logistic-regression", "deep-learning", "model-selection", "scenario"]

  - id: L11302-Q39
    stem: "一位資料科學家正在處理一個高維資料集（200 個特徵），想先降維再分群。她計劃先用 PCA 降到 10 維，再用 K-means 分群。下列哪個說法最準確？"
    options:
      a: "PCA 和 K-means 都需要標籤，這個流程只適用於監督式學習"
      b: "這是合理的非監督式學習流程：PCA 先降維保留主要資訊，再用 K-means 在低維空間分群，可有效提升分群品質和效率"
      c: "應該先 K-means 再 PCA，順序不能反過來"
      d: "PCA 輸出已經是分群結果，不需要再做 K-means"
    answer: "b"
    explanation: "PCA + K-means 的串接是業界常見的非監督式流程：PCA 先去除冗餘維度（高維空間中距離度量容易失真），K-means 在低維空間分群效率更高、品質更好。兩者都是非監督式，不需要標籤。PCA 輸出是新座標（主成分），不是分群結果。"
