topic: L11302
topic_name: 常見的機器學習模型
level: beginner
questions:
  # ── Difficulty 1 (D1 × 9) ─────────────────────────────────────
  - id: L11302-Q01
    stem: "下列何者是「線性迴歸（Linear Regression）」的適用任務？"
    options:
      a: "預測連續數值，例如房屋成交價格"
      b: "把顧客分成幾個消費族群"
      c: "判斷電子郵件是否為垃圾郵件"
      d: "從圖像中辨識人臉"
    answer: "a"
    explanation: "線性迴歸用於預測連續數值（迴歸任務），如房價、銷售額、氣溫。分群屬於非監督式、垃圾郵件判斷屬於分類、人臉辨識屬於深度學習分類任務。"
    difficulty: 1
    tags: ["linear-regression", "regression"]

  - id: L11302-Q02
    stem: "下列關於「邏輯迴歸（Logistic Regression）」的敘述，何者正確？"
    options:
      a: "它是一種迴歸演算法，輸出連續數值"
      b: "它雖然名稱含有「迴歸」，但本質上是分類演算法"
      c: "它是非監督式學習的演算法"
      d: "它需要大量影像資料才能發揮效果"
    answer: "b"
    explanation: "邏輯迴歸（Logistic Regression）名稱易誤導，但任務是分類（尤其是二元分類），輸出機率（0–1）再轉換成類別。這是初級考試最常見的命名陷阱。"
    difficulty: 1
    tags: ["logistic-regression", "classification", "naming-trap"]

  - id: L11302-Q03
    stem: "下列哪一種演算法是「非監督式學習」的分群方法？"
    options:
      a: "KNN（K 近鄰演算法）"
      b: "決策樹（Decision Tree）"
      c: "K-means"
      d: "隨機森林（Random Forest）"
    answer: "c"
    explanation: "K-means 是非監督式分群演算法，不需要標籤，自動把資料分成 K 個群。KNN、決策樹、隨機森林都是監督式演算法。"
    difficulty: 1
    tags: ["k-means", "unsupervised", "clustering"]

  - id: L11302-Q04
    stem: "「決策樹（Decision Tree）」最主要的缺點是什麼？"
    options:
      a: "完全無法處理分類任務"
      b: "需要大量 GPU 運算資源"
      c: "容易過擬合（overfitting），尤其當樹的深度增加時"
      d: "只能用於數值型特徵，不能處理類別型特徵"
    answer: "c"
    explanation: "決策樹最著名的缺點是容易過擬合——樹越深就越像是「背答案」，在訓練集表現很好，但對新資料泛化能力差。隨機森林正是為了解決這個問題而被設計出來。"
    difficulty: 1
    tags: ["decision-tree", "overfitting"]

  - id: L11302-Q05
    stem: "下列哪一個選項是「隨機森林（Random Forest）」所採用的集成學習策略？"
    options:
      a: "Boosting（提升法）"
      b: "Stacking（疊加法）"
      c: "Pruning（剪枝法）"
      d: "Bagging（自助聚合法）"
    answer: "d"
    explanation: "隨機森林採用 Bagging（Bootstrap Aggregating）：隨機抽樣建出多棵決策樹，預測時讓所有樹投票，多數決定結果。Boosting 是梯度提升（Gradient Boosting/XGBoost）的策略。"
    difficulty: 1
    tags: ["random-forest", "bagging", "ensemble"]

  - id: L11302-Q06
    stem: "KNN（K-Nearest Neighbors，K 近鄰演算法）中的「K」代表什麼？"
    options:
      a: "要分成幾個群"
      b: "神經網路的層數"
      c: "預測時參考最近的幾個訓練資料點（鄰居）"
      d: "模型訓練的迭代次數"
    answer: "c"
    explanation: "KNN 中的 K 代表「最近的 K 個鄰居」——預測時找出距離最近的 K 個訓練資料點，由這 K 個鄰居的類別多數決定答案。這和 K-means 的 K（要分幾群）完全不同。"
    difficulty: 1
    tags: ["knn", "k-nearest-neighbors"]

  - id: L11302-Q07
    stem: "「主成分分析（PCA，Principal Component Analysis）」的主要用途是什麼？"
    options:
      a: "把有標籤資料分成多個類別"
      b: "讓智能體在環境中學習最佳策略"
      c: "找出資料中的異常值並刪除"
      d: "把高維資料壓縮到低維，同時保留最多資訊"
    answer: "d"
    explanation: "PCA 是非監督式降維技術，目的是把高維資料投影到低維空間，同時盡量保留最多的資料變異（資訊）。常用於資料視覺化、特徵壓縮。"
    difficulty: 1
    tags: ["pca", "dimensionality-reduction", "unsupervised"]

  - id: L11302-Q08
    stem: "下列關於「隨機森林（Random Forest）」的敘述，何者正確？"
    options:
      a: "隨機森林由一棵非常深的決策樹構成"
      b: "隨機森林使用 Boosting 策略依序修補錯誤"
      c: "隨機森林屬於非監督式學習"
      d: "隨機森林是多棵決策樹的集成，透過投票決定最終結果"
    answer: "d"
    explanation: "隨機森林由多棵（通常數百棵）決策樹組成，採用 Bagging 策略平行建立，預測時以多數投票決定結果，有效降低單棵決策樹的過擬合問題。"
    difficulty: 1
    tags: ["random-forest", "ensemble", "bagging"]

  - id: L11302-Q09
    stem: "下列哪一個激活函數（Activation Function）最常用於深度神經網路的隱藏層（Hidden Layer）？"
    options:
      a: "Softmax"
      b: "Sigmoid"
      c: "ReLU（Rectified Linear Unit，線性整流函數）"
      d: "PCA"
    answer: "c"
    explanation: "ReLU（Rectified Linear Unit，線性整流函數）是現代深度神經網路隱藏層最常用的激活函數，因為它計算簡單、有效解決梯度消失問題。Softmax 用於多類別分類輸出層，Sigmoid 用於二元分類輸出層，PCA 不是激活函數。"
    difficulty: 1
    tags: ["neural-network", "activation-function", "relu"]

  # ── Difficulty 2 (D2 × 10) ────────────────────────────────────
  - id: L11302-Q10
    stem: "下列關於「KNN（K 近鄰演算法）」被稱為「懶惰學習（Lazy Learning）」的原因，何者正確？"
    options:
      a: "KNN 在訓練時不建立任何模型，只儲存訓練資料，等到要預測時才計算距離"
      b: "KNN 只能用在簡單問題上，太難的問題它解決不了"
      c: "KNN 的準確率通常比其他演算法低"
      d: "KNN 需要的訓練時間比隨機森林更長"
    answer: "a"
    explanation: "KNN 的「懶惰」是指它在訓練階段不做任何學習（不建立模型），只是把所有訓練資料存起來。等到有新資料需要預測時，才去計算新點與所有訓練點的距離，找出最近的 K 個鄰居。這和大多數「積極學習（Eager Learning）」演算法在訓練時就建好模型的方式不同。"
    difficulty: 2
    tags: ["knn", "lazy-learning", "eager-learning"]

  - id: L11302-Q11
    stem: "下列何者最能描述「K-means」演算法的核心流程？"
    options:
      a: "隨機選定 K 個質心，反覆將資料點分配到最近質心、再更新質心，直到穩定"
      b: "以 Bagging 策略並行建立多個分類樹，再多數投票"
      c: "從根節點依特徵進行二元分裂，形成樹狀決策流程"
      d: "找出資料中使邊界距離最大的超平面來分類"
    answer: "a"
    explanation: "K-means 的流程：1. 隨機選 K 個質心；2. 把每個點分配到最近質心；3. 重新計算質心（群內平均值）；4. 重複 2–3 直到質心不再移動。這是非監督式分群，不需要標籤。"
    difficulty: 2
    tags: ["k-means", "clustering", "centroid"]

  - id: L11302-Q12
    stem: "「SVM（Support Vector Machine，支援向量機）」的核心概念「最大邊界（Maximum Margin）」是指什麼？"
    options:
      a: "訓練資料越多，SVM 表現越好"
      b: "在分類時允許最多的資料點跨越邊界"
      c: "使用最多特徵維度來建立分類模型"
      d: "找一個超平面，使得它與兩類資料中最近點的距離總和最大"
    answer: "d"
    explanation: "SVM 尋找一個超平面（Hyperplane），使得超平面到兩邊最近的訓練資料點（支援向量，Support Vectors）的距離（Margin）最大化，這樣的邊界泛化能力最強，遇到新資料最不容易分錯。"
    difficulty: 2
    tags: ["svm", "maximum-margin", "hyperplane"]

  - id: L11302-Q13
    stem: "下列關於「梯度提升（Gradient Boosting）」和「隨機森林（Random Forest）」的比較，何者正確？"
    options:
      a: "隨機森林使用 Bagging 並行建樹；梯度提升使用 Boosting 依序建樹"
      b: "兩者都使用 Boosting 策略依序建立模型"
      c: "兩者都使用 Bagging 並行建樹"
      d: "隨機森林使用 Boosting；梯度提升使用 Bagging"
    answer: "a"
    explanation: "隨機森林使用 Bagging（並行建多棵相互獨立的樹，再投票）；梯度提升使用 Boosting（依序建樹，每棵樹專門修補前棵樹的錯誤，累積改進）。這是兩種不同的集成策略。"
    difficulty: 2
    tags: ["gradient-boosting", "random-forest", "bagging-vs-boosting"]

  - id: L11302-Q14
    stem: "使用「手肘法（Elbow Method）」是為了解決哪一個演算法的什麼問題？"
    options:
      a: "解決決策樹容易過擬合的問題"
      b: "確定隨機森林需要幾棵決策樹"
      c: "選擇 KNN 中最佳的 K 個鄰居數量"
      d: "幫助選擇 K-means 中合適的 K 值（要分幾群）"
    answer: "d"
    explanation: "手肘法（Elbow Method）是 K-means 的 K 值選擇工具：嘗試不同 K 值，畫出群內誤差曲線，找到曲線「彎折最明顯如手肘」的那個 K 值作為最佳選擇。這解決了 K-means 「需要預先指定 K，但不知道 K 應該是多少」的問題。"
    difficulty: 2
    tags: ["k-means", "elbow-method", "k-selection"]

  - id: L11302-Q15
    stem: "下列關於「階層式分群（Hierarchical Clustering）」與「K-means」最重要的差異，何者正確？"
    options:
      a: "階層式分群不需要預先指定群數（K），可事後從樹狀圖決定；K-means 必須事先指定 K"
      b: "K-means 屬於監督式學習，階層式分群屬於非監督式學習"
      c: "K-means 輸出樹狀圖（Dendrogram），階層式分群輸出質心"
      d: "兩者沒有差異，只是名稱不同"
    answer: "a"
    explanation: "階層式分群最大優勢是不需要預先指定 K，而是建立 Dendrogram（樹狀圖），讓使用者事後選擇切割高度來決定群數。K-means 則必須在開始前就指定要分成幾群。"
    difficulty: 2
    tags: ["hierarchical-clustering", "k-means", "dendrogram"]

  - id: L11302-Q16
    stem: "「PCA（主成分分析）」中的「解釋方差比（Explained Variance Ratio）」越高，代表什麼？"
    options:
      a: "模型的準確率越高"
      b: "主成分的數量越少越好"
      c: "過擬合的風險越低"
      d: "降維後保留的原始資料資訊越多"
    answer: "d"
    explanation: "PCA 的解釋方差比衡量每個主成分「解釋了原始資料幾%的變化量」。前幾個主成分的解釋方差比加總越高，代表降維後保留的資訊越完整——通常希望前幾個主成分能解釋 80% 以上的方差。"
    difficulty: 2
    tags: ["pca", "explained-variance-ratio"]

  - id: L11302-Q17
    stem: "在神經網路中，「前向傳播（Forward Propagation）」和「反向傳播（Backpropagation）」的方向分別是？"
    options:
      a: "前向傳播從輸入層到輸出層（計算預測）；反向傳播從輸出層往回傳（調整權重）"
      b: "兩者都從輸入層到輸出層"
      c: "前向傳播從輸出層到輸入層；反向傳播從輸入層到輸出層"
      d: "兩者都從輸出層到輸入層"
    answer: "a"
    explanation: "前向傳播（Forward Propagation）是資料從輸入層→隱藏層→輸出層的正向計算，產生預測值。反向傳播（Backpropagation）是把預測誤差從輸出層往回傳遞，調整每個連接的權重。兩者方向相反，是神經網路訓練的核心循環。"
    difficulty: 2
    tags: ["neural-network", "forward-propagation", "backpropagation"]

  - id: L11302-Q18
    stem: "下列關於「Softmax 激活函數」的用途，何者正確？"
    options:
      a: "用在深度神經網路的隱藏層，避免梯度消失"
      b: "把負數輸出設為 0，正數直接通過"
      c: "用在線性迴歸的最終輸出層"
      d: "把多個輸出值轉換成各類別的機率分布，且所有類別機率加總為 1"
    answer: "d"
    explanation: "Softmax 用於多類別分類任務的輸出層：把神經網路最後一層的多個原始分數轉換成「各類別的機率」，且所有類別的機率加總等於 1（例如：貓 0.7、狗 0.2、鳥 0.1）。ReLU 用在隱藏層，Sigmoid 用在二元分類輸出層。"
    difficulty: 2
    tags: ["softmax", "activation-function", "multi-class"]

  - id: L11302-Q19
    stem: "下列何者最能描述「集成學習（Ensemble Learning）」的核心概念？"
    options:
      a: "結合多個基礎模型（如多棵決策樹）的預測，以獲得比單一模型更好的結果"
      b: "只使用一個非常複雜的模型以提升準確度"
      c: "將資料集分成訓練集和測試集進行評估"
      d: "使用多種不同特徵同時訓練一個模型"
    answer: "a"
    explanation: "集成學習（Ensemble Learning）的核心是「組合多個弱（或一般）模型，使整體效果優於任一單一模型」。隨機森林（Bagging）和 Gradient Boosting（Boosting）都是集成學習的代表，都比單棵決策樹更準確穩定。"
    difficulty: 2
    tags: ["ensemble-learning", "random-forest", "gradient-boosting"]

  # ── Difficulty 3 (D3 × 11) ────────────────────────────────────
  - id: L11302-Q20
    stem: "某房仲公司希望根據坪數、地段、屋齡預測中古屋的成交價格（具體金額）。下列哪種演算法最適合作為起點？"
    options:
      a: "K-means"
      b: "KNN（K 近鄰演算法）"
      c: "線性迴歸（Linear Regression）"
      d: "邏輯迴歸（Logistic Regression）"
    answer: "c"
    explanation: "預測「成交價格」是連續數值輸出（迴歸任務），線性迴歸是最直接的起點模型，可解釋性強且易于理解「哪個特徵影響多少」。邏輯迴歸雖名含迴歸但做的是分類，K-means 是分群（非監督式）。"
    difficulty: 3
    tags: ["linear-regression", "regression", "scenario"]

  - id: L11302-Q21
    stem: "某電商平台有 50 萬筆顧客購買紀錄，沒有任何顧客分類標籤，希望自動找出具有相似消費行為的族群以利個性化行銷。最適合的做法是？"
    options:
      a: "使用非監督式學習中的 K-means 分群"
      b: "使用監督式學習中的邏輯迴歸"
      c: "使用強化式學習讓 AI 逐漸最佳化行銷策略"
      d: "使用 PCA 把顧客特徵降維後直接作為分類結果"
    answer: "a"
    explanation: "沒有標籤且目標是「自動找出族群」，是非監督式分群的典型情境，K-means 適合大型資料且可擴展。PCA 是降維不是分群；邏輯迴歸需要標籤；強化式學習是試錯決策情境。"
    difficulty: 3
    tags: ["k-means", "unsupervised", "clustering", "scenario"]

  - id: L11302-Q22
    stem: "某醫療團隊需要對癌症影像（X 光片）建立自動分類模型。他們擁有 20 萬張已標記「良性/惡性」的影像。最適合的技術方向是？"
    options:
      a: "PCA（降維）"
      b: "K-means（非監督式分群）"
      c: "CNN（卷積神經網路）深度學習"
      d: "手肘法選擇最佳 K 值"
    answer: "c"
    explanation: "有大量已標記影像、任務是影像分類→ 監督式深度學習；影像資料最適合 CNN（Convolutional Neural Network，卷積神經網路）。PCA 是降維、K-means 是無標籤分群、手肘法是選 K-means 的 K 值工具。"
    difficulty: 3
    tags: ["cnn", "deep-learning", "image-classification", "scenario"]

  - id: L11302-Q23
    stem: "某金融公司要開發信用評分系統，資料量中等（約 10 萬筆），且需向監管機關解釋「為何拒絕某申請人」。在下列選項中，哪種演算法最能兼顧準確度與解釋性？"
    options:
      a: "多層深度神經網路"
      b: "K-means 分群"
      c: "決策樹或邏輯迴歸"
      d: "PCA 降維後直接使用"
    answer: "c"
    explanation: "監管需要可解釋的決策理由→決策樹（可讀分支規則）或邏輯迴歸（可看特徵係數）是合適選擇。深度神經網路是「黑盒子」，解釋性差；K-means 是非監督分群；PCA 是降維工具。"
    difficulty: 3
    tags: ["decision-tree", "logistic-regression", "interpretability", "scenario"]

  - id: L11302-Q24
    stem: "某研究團隊有一個 500 維的基因資料集，每個樣本有 500 個特徵。他們想把這個資料集壓縮到 2 維後畫散佈圖，觀察樣本間的關係。最適合的工具是？"
    options:
      a: "KNN（K 近鄰演算法）"
      b: "決策樹（Decision Tree）"
      c: "梯度提升（Gradient Boosting）"
      d: "PCA（主成分分析）"
    answer: "d"
    explanation: "PCA（Principal Component Analysis，主成分分析）是最適合的降維工具：把 500 維壓縮到 2 維，同時保留最多方差。降維後便于視覺化探索資料結構。KNN 和決策樹都是分類演算法，不做降維。"
    difficulty: 3
    tags: ["pca", "dimensionality-reduction", "scenario"]

  - id: L11302-Q25
    stem: "某推薦系統工程師想為使用者推薦「和他過去行為最相似的其他用戶所喜歡的內容」，資料量小且特徵維度低。最適合哪種演算法？"
    options:
      a: "SVM（支援向量機）"
      b: "K-means"
      c: "KNN（K 近鄰演算法）"
      d: "PCA"
    answer: "c"
    explanation: "KNN（K-Nearest Neighbors，K 近鄰演算法）的核心是「找出最相似的 K 個鄰居」，非常適合協作過濾式推薦（找相似用戶）。資料量小、維度低時 KNN 效果穩定。K-means 是無標籤分群，PCA 是降維，SVM 重在邊界分類。"
    difficulty: 3
    tags: ["knn", "recommendation", "scenario"]

  - id: L11302-Q26
    stem: "某數據科學家訓練了一棵決策樹，訓練集準確率 98%，但測試集準確率只有 62%。下列描述何者最正確？"
    options:
      a: "這個結果很正常，決策樹本來就要這樣"
      b: "測試集太小，重新抽樣就可以解決"
      c: "這是過擬合（overfitting）現象，決策樹樹深太高、把訓練資料背了起來"
      d: "這是欠擬合（underfitting）現象，模型太過簡單"
    answer: "c"
    explanation: "訓練集 98%、測試集 62% 的巨大落差是決策樹過擬合（overfitting）的典型症狀——樹長得太深，把訓練資料中的雜訊都「背」起來了，遇到新資料就失靈。解決方法包括剪枝、限制樹深、或改用隨機森林。"
    difficulty: 3
    tags: ["decision-tree", "overfitting", "scenario"]

  - id: L11302-Q27
    stem: "某業務分析師不知道公司的 1,000 家客戶應該分成幾個族群。他使用 K-means，嘗試了 K=2 到 K=10，畫出了一條曲線，想從曲線找出最佳的 K。他在用哪個方法？"
    options:
      a: "交叉驗證（Cross-validation）"
      b: "PCA 解釋方差比分析"
      c: "反向傳播（Backpropagation）"
      d: "手肘法（Elbow Method）"
    answer: "d"
    explanation: "手肘法（Elbow Method）是為 K-means 選擇最佳 K 值的工具：嘗試不同 K 值，畫出群內誤差（WCSS）曲線，找到曲線「彎折如手肘」的點，該點即為合理的 K 值。"
    difficulty: 3
    tags: ["k-means", "elbow-method", "k-selection", "scenario"]

  - id: L11302-Q28
    stem: "某 NLP 工程師想對一批文字資料做情感分析（正面/負面），資料量約 5 萬筆，已有標籤。她在評估 SVM 和 KNN 兩個選項，考量的是「訓練後預測速度快」的需求。哪個更合適？"
    options:
      a: "KNN，因為訓練時不建模型、速度最快"
      b: "兩者預測速度完全相同"
      c: "SVM，因為訓練後模型已建立，預測速度快"
      d: "KNN，因為文字分類需要懶惰學習"
    answer: "c"
    explanation: "SVM 屬於積極學習（Eager Learning）——訓練時建立好模型，預測時直接套模型計算，速度快。KNN 是懶惰學習——訓練時不建模型，預測時要計算新點與所有訓練資料的距離，資料量大時預測極慢。「需要快速預測」→ SVM 比 KNN 更合適。"
    difficulty: 3
    tags: ["svm", "knn", "lazy-vs-eager", "scenario"]

  - id: L11302-Q29
    stem: "某公司想了解自家 200 種商品在哪些商品組合間有「一起購買」的關聯（如買 A 也常買 B），資料完全沒有標籤。最適合的機器學習方法是？"
    options:
      a: "監督式學習中的決策樹"
      b: "強化式學習"
      c: "主成分分析（PCA）"
      d: "非監督式學習中的關聯規則（如 Apriori）"
    answer: "d"
    explanation: "購物籃分析（找商品共現關係）是非監督式學習中「關聯規則（Association Rules）」的典型應用。沒有標籤、目的是找共現模式→關聯規則（如 Apriori 演算法）。決策樹和強化式學習不適用，PCA 是降維工具。"
    difficulty: 3
    tags: ["association-rules", "unsupervised", "scenario"]

  - id: L11302-Q30
    stem: "某 AI 工程師正在選擇模型。她的資料是結構化表格（約 8 萬筆），任務是預測「客戶是否會購買新產品（是/否）」，且追求高預測準確率。下列何者最適合？"
    options:
      a: "PCA（主成分分析）"
