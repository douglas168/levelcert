topic: L12302
topic_name: 生成式AI導入規劃
level: beginner
# Total: 40 questions
# Difficulty: D1=9, D2=10, D3=11, D4=6, D5=4
# Answer distribution: A=10, B=10, C=10, D=10
# Coverage: 四階段策略(8), 出口標準(7), 測試類型(7), 應急規劃(11), 資源規劃(4), 變更管理(3)

questions:
  - id: L12302-Q01
    difficulty: 1
    question: "生成式AI導入的四階段推廣策略，正確的順序為何？"
    options:
      a: "POC → Pilot → Rollout → Scale"
      b: "Pilot → POC → Rollout → Scale"
      c: "POC → Rollout → Pilot → Scale"
      d: "Pilot → POC → Scale → Rollout"
    correct: a
    explanation:
      why_correct: "四階段正確順序：POC（概念驗證，2-4週）→ Pilot（試行，1-3個月）→ Rollout（推廣，3-6個月）→ Scale（規模化，持續）。從小範圍技術驗證到全組織部署，每階段規模逐步擴大。"
      why_not_b: "Pilot 不在 POC 之前；必須先用 POC 驗證技術可行性，才進入 Pilot 試行。"
      why_not_c: "Rollout 在 Pilot 之後，不在 Pilot 之前；Pilot 驗證業務效益後才進行 Rollout。"
      why_not_d: "Pilot 不在 POC 之前；Scale 和 Rollout 的順序也錯誤。"
    keywords: ["四階段策略", "POC", "Pilot", "Rollout", "Scale"]
    topic_area: 四階段推廣策略

  - id: L12302-Q02
    difficulty: 1
    question: "POC（Proof of Concept，概念驗證）階段的主要目的是什麼？"
    options:
      a: "全公司跨部門正式上線並建立標準作業程序"
      b: "讓業務同仁在真實環境中驗證業務效益"
      c: "工程師以少量樣本資料驗證技術可行性"
      d: "進行使用者驗收測試確認功能符合需求"
    correct: c
    explanation:
      why_correct: "POC 由技術團隊（1-2位工程師）以少量樣本資料在2-4週內完成，目標是確認技術可行性——這個AI在公司環境能不能跑起來。"
      why_not_a: "這是 Scale 規模化階段的目的。"
      why_not_b: "讓業務同仁在真實環境測試業務效益是 Pilot 試行階段的目的。"
      why_not_d: "UAT（使用者驗收測試）通常在 Pilot 階段或正式上線前進行，不是 POC 的主要目的。"
    keywords: ["POC", "概念驗證", "技術可行性"]
    topic_area: 四階段推廣策略

  - id: L12302-Q03
    difficulty: 1
    question: "HITL（Human-in-the-Loop，人機協作回圈）與 Fallback、Rollback、Kill Switch 最大的本質差異是？"
    options:
      a: "HITL 只適用於醫療場景，其他三個適用於所有場景"
      b: "HITL 是事前設計在決策流程中的人工審核節點，其他三個是出問題後的應急措施"
      c: "HITL 是出問題後才啟動的應急措施，其他三個是事前設計"
      d: "HITL 需要最高層授權才能啟動，其他三個可自動執行"
    correct: b
    explanation:
      why_correct: "HITL 是在設計階段就規劃好「高風險決策必須經人工審核」的流程節點，不是等問題發生後才介入。Fallback、Rollback、Kill Switch 都是在系統出現故障或問題後才觸發的應急措施。"
      why_not_a: "HITL 適用於所有高風險決策場景，包含醫療、金融、法律、人事等。"
      why_not_c: "這說反了——HITL 是事前設計，不是應急措施。"
      why_not_d: "Kill Switch 的設計要求恰恰相反——必須能在幾秒內執行，不需複雜授權。"
    keywords: ["HITL", "應急規劃", "Fallback", "Rollback", "Kill Switch"]
    topic_area: 應急規劃

  - id: L12302-Q04
    difficulty: 1
    question: "下列哪一個應急措施是指「退回AI系統上一個穩定版本」？"
    options:
      a: "Rollback（回滾）"
      b: "Kill Switch（緊急關閉）"
      c: "HITL（人機協作回圈）"
      d: "Fallback（備援）"
    correct: a
    explanation:
      why_correct: "Rollback（回滾）是將 AI 系統撤回到上一個穩定的版本，例如新版本 v2.0 出現問題就退回 v1.5，AI 系統繼續運作但使用舊版本。"
      why_not_b: "Kill Switch 是緊急停用所有 AI 功能，不是退版。"
      why_not_c: "HITL 是在決策流程中插入人工審核，與版本管理無關。"
      why_not_d: "Fallback 是切回原有的舊系統或人工流程，不是退版本號。"
    keywords: ["Rollback", "回滾", "應急規劃"]
    topic_area: 應急規劃

  - id: L12302-Q05
    difficulty: 1
    question: "資源規劃「人錢料時」四維度中，「料」指的是什麼？"
    options:
      a: "AI 應用的使用教材與培訓文件"
      b: "軟體授權和訂閱費用"
      c: "建設資料中心的建材"
      d: "訓練資料、測試資料與評估資料"
    correct: d
    explanation:
      why_correct: "資源規劃四維度：人（人力）、錢（預算）、料（資料）、時（時程）。其中「料」指的是 AI 需要的各種資料，包含訓練資料、測試資料和評估資料。資料是最常被低估的資源維度。"
      why_not_a: "使用教材和培訓文件屬於培訓費用（錢），不是「料」的內容。"
      why_not_b: "軟體授權和訂閱費屬於「錢（預算）」維度，不是「料」。"
      why_not_c: "建材是建築業的概念，與 AI 導入資源規劃無關。"
    keywords: ["資源規劃", "人錢料時", "資料"]
    topic_area: 資源規劃

  - id: L12302-Q06
    difficulty: 1
    question: "UAT（User Acceptance Testing，使用者驗收測試）應由誰來執行？"
    options:
      a: "安全專家，以攻擊者角度找漏洞"
      b: "工程師，在實驗室環境中測試"
      c: "外部小範圍用戶，收集外部真實回饋"
      d: "終端使用者（業務人員），確認功能符合業務需求"
    correct: d
    explanation:
      why_correct: "UAT 是由終端使用者（業務人員，非 IT 工程師）在接近正式環境中執行，目的是確認系統符合業務需求和使用者期望，通過後簽署驗收。"
      why_not_a: "安全專家以攻擊者角度找漏洞是 Red Team 測試。"
      why_not_b: "工程師在實驗室環境測試是 POC 階段的工作。"
      why_not_c: "外部小範圍用戶測試是 Beta 測試。"
    keywords: ["UAT", "使用者驗收測試", "測試類型"]
    topic_area: 測試類型

  - id: L12302-Q07
    difficulty: 1
    question: "Red Team（紅隊）測試的主要目的是什麼？"
    options:
      a: "由安全專家以攻擊者角度主動尋找 AI 系統漏洞和有害輸出"
      b: "讓業務人員確認 AI 功能是否符合工作需求"
      c: "對比新舊系統同時運行的輸出差異"
      d: "將小範圍外部用戶納入早期試用計劃"
    correct: a
    explanation:
      why_correct: "Red Team 測試是由安全或品質專家，以「攻擊者」的角度主動尋找 AI 系統的安全漏洞、偏見和有害輸出，是高風險應用上線前的必要驗證步驟。"
      why_not_b: "業務人員確認功能符合需求是 UAT 的目的。"
      why_not_c: "新舊系統同時運行比較輸出是平行運行（Parallel Run）。"
      why_not_d: "小範圍外部用戶早期試用是 Beta 測試。"
    keywords: ["Red Team", "紅隊測試", "測試類型"]
    topic_area: 測試類型

  - id: L12302-Q08
    difficulty: 1
    question: "Fallback（備援）應急措施的正確定義是？"
    options:
      a: "退回 AI 系統上一個穩定版本"
      b: "在 AI 決策流程中插入人工審核節點"
      c: "緊急停用所有 AI 功能"
      d: "問題發生時切換回原有的舊系統繼續運作"
    correct: d
    explanation:
      why_correct: "Fallback（備援）是當 AI 系統嚴重故障或效能不符 SLA 時，切換回原有的舊系統/人工流程繼續運作，確保服務不中斷。例如 AI 客服機器人當機後切回人工客服。"
      why_not_a: "退回上一個穩定版本是 Rollback（回滾）。"
      why_not_b: "在流程中插入人工審核節點是 HITL（人機協作回圈）。"
      why_not_c: "緊急停用所有 AI 功能是 Kill Switch（緊急關閉）。"
    keywords: ["Fallback", "備援", "應急規劃"]
    topic_area: 應急規劃

  - id: L12302-Q09
    difficulty: 1
    question: "AI 導入通常推薦使用「敏捷（Agile）」方式而非「瀑布（Waterfall）」方式，主要原因是？"
    options:
      a: "敏捷方式不需要任何文件，可以節省時間"
      b: "瀑布方式只能用在傳統軟體，AI 禁止使用"
      c: "敏捷方式適合 AI 專案的不確定性，可快速迭代調整"
      d: "敏捷方式保證 AI 專案一定不會失敗"
    correct: c
    explanation:
      why_correct: "AI 專案天生具有高度不確定性——不確定模型效果、使用者接受度、資料品質等。敏捷方式透過每2-4週的迭代，允許快速調整方向，適合這種不確定的環境。"
      why_not_a: "敏捷方式仍需要文件，只是文件量和形式與瀑布不同；敏捷有每個 Sprint 的計劃和回顧。"
      why_not_b: "瀑布方式並非被禁止，只是在需求不確定的 AI 項目中不如敏捷適合。"
      why_not_d: "任何方法論都無法「保證」成功，敏捷只是降低風險、提高適應性的方式。"
    keywords: ["敏捷", "Agile", "瀑布", "Waterfall"]
    topic_area: 四階段推廣策略

  - id: L12302-Q10
    difficulty: 2
    question: "某公司 AI 客服系統完成 POC 驗證後，下一步應該是什麼？"
    options:
      a: "直接進入 Scale 規模化部署"
      b: "立即在全公司所有部門同時上線"
      c: "停止導入，等待更成熟的 AI 技術"
      d: "在 1-2 個部門選定真實使用者進行 Pilot 試行"
    correct: d
    explanation:
      why_correct: "POC 只驗證了技術可行性，下一步應是 Pilot（試行），在1-2個部門選定真實使用者在真實業務環境中測試，驗證業務效益和使用者接受度。不能跳過 Pilot 直接 Scale。"
      why_not_a: "Scale 是在 Pilot 和 Rollout 都成功後才進行的最後階段。"
      why_not_b: "跳過 Pilot 直接全公司上線是最常見的導入失敗原因——POC 成功不代表業務流程可行。"
      why_not_c: "POC 成功代表技術可行，沒有理由停止；下一步是繼續推進到 Pilot。"
    keywords: ["POC", "Pilot", "四階段策略"]
    topic_area: 四階段推廣策略

  - id: L12302-Q11
    difficulty: 2
    question: "Pilot（試行）階段最重要的出口標準（Exit Criteria）包含哪兩項？"
    options:
      a: "使用者接受度達標 + 核心 KPI 達標"
      b: "技術可行性確認 + 基礎準確率達標"
      c: "無重大故障 + SLA（服務等級協議）達標"
      d: "全組織部署完成 + 長期預算已核准"
    correct: a
    explanation:
      why_correct: "Pilot 階段的出口標準是驗證業務效益：使用者接受度達到預設門檻 + 核心 KPI 達標。這兩項同時達成才代表業務效益已驗證，可以進入 Rollout。"
      why_not_b: "技術可行性確認和基礎準確率是 POC 的出口標準，不是 Pilot。"
      why_not_c: "無重大故障和 SLA 達標是 Rollout 階段的出口標準。"
      why_not_d: "全組織部署完成和長期預算核准是進入 Scale 的條件，不是 Pilot 出口。"
    keywords: ["出口標準", "Exit Criteria", "Pilot"]
    topic_area: 出口標準

  - id: L12302-Q12
    difficulty: 2
    question: "下列哪一個情境最適合使用「平行運行（Parallel Run）」測試策略？"
    options:
      a: "比較新版提示詞與舊版提示詞哪個效果更好"
      b: "找出 AI 系統對特定族群可能存在的偏見"
      c: "讓業務人員確認 AI 功能是否符合工作需求"
      d: "銀行系統更換新 AI 核心，在 Rollout 過渡期確保輸出正確"
    correct: d
    explanation:
      why_correct: "平行運行是新舊系統同時處理真實業務，比較輸出結果。在金融機構等高風險環境更換核心系統時，必須讓新舊系統並行一段時間，確認新系統輸出正確後才完全切換，降低切換風險。"
      why_not_a: "比較新舊版本效果是 A/B 測試（通常用於功能優化，不是系統切換）。"
      why_not_b: "找出偏見是 Red Team 測試的範疇。"
      why_not_c: "業務人員確認功能是 UAT（使用者驗收測試）。"
    keywords: ["平行運行", "Parallel Run", "測試類型"]
    topic_area: 測試類型

  - id: L12302-Q13
    difficulty: 2
    question: "某 AI 系統更新至 v3.0 後，發現誤判率明顯上升，IT 部門決定退回 v2.5 版本。這個動作稱為？"
    options:
      a: "HITL（人機協作回圈）"
      b: "Kill Switch（緊急關閉）"
      c: "Fallback（備援）"
      d: "Rollback（回滾）"
    correct: d
    explanation:
      why_correct: "Rollback（回滾）是將 AI 系統退回上一個穩定版本（從 v3.0 退回 v2.5），AI 系統繼續運作但使用舊版本。觸發條件是最新版本出現 bug 或效能退化。"
      why_not_a: "HITL 是在決策流程中設計人工審核節點，與版本退回無關。"
      why_not_b: "Kill Switch 是緊急停用所有 AI 功能，不只是退版。"
      why_not_c: "Fallback 是切回完全不同的舊系統或人工流程，不是退版本號。"
    keywords: ["Rollback", "回滾", "版本退回"]
    topic_area: 應急規劃

  - id: L12302-Q14
    difficulty: 2
    question: "下列關於變更管理（Change Management）在 AI 導入中的描述，何者最正確？"
    options:
      a: "變更管理包含利害關係人管理、員工培訓、溝通計劃和成效追蹤"
      b: "變更管理只需要 IT 部門處理技術文件更新"
      c: "變更管理是指更新程式碼版本控制的流程"
      d: "變更管理只在 Scale 規模化階段才需要執行"
    correct: a
    explanation:
      why_correct: "變更管理的四個核心要素：利害關係人管理（識別支持者/中立者/反對者）、員工培訓與阻力管理、溝通計劃（定期說明進度）、成效追蹤與回報。這些要素貫穿整個導入過程，不只在某一階段。"
      why_not_b: "變更管理不只是技術文件，重點在於「人的改變」——習慣、技能和阻力。"
      why_not_c: "程式碼版本控制是 IT 工程管理，不是變更管理。"
      why_not_d: "變更管理應從 Pilot 階段就開始規劃，貫穿 Rollout 和 Scale，不是最後才做。"
    keywords: ["變更管理", "Change Management", "利害關係人"]
    topic_area: 變更管理

  - id: L12302-Q15
    difficulty: 2
    question: "Rollout（推廣）階段的出口標準，最重要的兩項是？"
    options:
      a: "技術可行性確認 + 基礎準確率達標"
      b: "使用者接受度達標 + 核心 KPI 達標"
      c: "無重大故障 + SLA（服務等級協議）達標"
      d: "全組織部署完成 + ROI 已達目標"
    correct: c
    explanation:
      why_correct: "Rollout 階段的出口標準關注「穩定性」：系統是否能在多部門穩定運作（無重大故障）、是否達到事先承諾的服務等級（SLA 達標）。這代表可以進入 Scale 全組織部署。"
      why_not_a: "這是 POC 的出口標準（技術可行性 + 準確率）。"
      why_not_b: "這是 Pilot 的出口標準（使用者接受度 + KPI）。"
      why_not_d: "全組織部署完成是 Scale 階段的結果，不是 Rollout 的出口標準。"
    keywords: ["Rollout", "出口標準", "SLA"]
    topic_area: 出口標準

  - id: L12302-Q16
    difficulty: 2
    question: "Beta 測試（Beta Testing）和 UAT（使用者驗收測試）的最大差異是什麼？"
    options:
      a: "Beta 測試由外部小範圍用戶執行；UAT 由內部業務人員執行"
      b: "Beta 測試只能用在行動應用；UAT 用在企業系統"
      c: "Beta 測試比 UAT 更早執行，通常在 POC 階段"
      d: "Beta 測試和 UAT 本質相同，只是名稱不同"
    correct: a
    explanation:
      why_correct: "Beta 測試是讓外部小範圍用戶（非公司員工的早期採用者）在正式發布前試用，目的是收集外部真實回饋；UAT 是讓內部終端使用者（業務人員）確認系統符合業務需求並簽署驗收。執行者和目的都不同。"
      why_not_b: "Beta 和 UAT 都可用於各種類型的系統，不限於特定平台。"
      why_not_c: "Beta 測試通常在 Rollout 前進行，不是 POC 階段；UAT 通常在 Pilot 階段。"
      why_not_d: "兩者目的和執行者都不同，不能視為相同。"
    keywords: ["Beta測試", "UAT", "測試類型差異"]
    topic_area: 測試類型

  - id: L12302-Q17
    difficulty: 2
    question: "在資源規劃「人錢料時」中，「時（時程）」規劃最重要的要素是什麼？"
    options:
      a: "計算每小時 API 呼叫費用"
      b: "確認 AI 模型的版本更新時間表"
      c: "決定員工上下班時間"
      d: "里程碑設定、相依性管理和預留緩衝時間"
    correct: d
    explanation:
      why_correct: "時程規劃的核心包含：里程碑（每個階段的預期完成日期）、相依性管理（哪些任務必須按順序執行）、緩衝時間（建議每個里程碑加 20% 緩衝）。良好的時程規劃確保各階段按序完成。"
      why_not_a: "API 費用計算屬於「錢（預算）」維度，不是「時（時程）」。"
      why_not_b: "AI 模型版本更新時間表屬於供應商管理，不是項目時程規劃的核心。"
      why_not_c: "員工工作時間是 HR 管理，不是 AI 導入時程規劃的內容。"
    keywords: ["時程規劃", "里程碑", "資源規劃"]
    topic_area: 資源規劃

  - id: L12302-Q18
    difficulty: 2
    question: "下列關於 Kill Switch（緊急關閉）的描述，何者最正確？"
    options:
      a: "Kill Switch 需要高層核准，流程通常需要兩個工作天"
      b: "Kill Switch 只能在 AI 系統技術故障時使用"
      c: "Kill Switch 等同於 Rollback，退回上一個版本"
      d: "Kill Switch 是緊急停用所有 AI 功能，必須能在幾秒內執行"
    correct: d
    explanation:
      why_correct: "Kill Switch（緊急關閉）的設計要求是能在幾秒內立即執行，不需複雜授權程序。它用於緊急情況：發現嚴重安全問題、法規合規疑慮、或重大倫理事件，需要立即完全停用 AI 功能。"
      why_not_a: "Kill Switch 必須即時執行，需要複雜授權會讓它失去「緊急」的功能。"
      why_not_b: "Kill Switch 不只用於技術故障，倫理問題和合規疑慮也是觸發條件。"
      why_not_c: "Kill Switch 是停用 AI，Rollback 是退版本，兩者完全不同。"
    keywords: ["Kill Switch", "緊急關閉", "應急規劃"]
    topic_area: 應急規劃

  - id: L12302-Q19
    difficulty: 2
    question: "下列哪一個情境中應使用 A/B 測試？"
    options:
      a: "銀行貸款審核 AI 在放款前需要人工確認"
      b: "評估新版商品推薦提示詞是否比舊版提升點擊率"
      c: "新 AI 採購系統上線前讓採購人員確認符合工作流程"
      d: "尋找 AI 聊天機器人對特定族群的歧視性輸出"
    correct: b
    explanation:
      why_correct: "A/B 測試是對比兩個版本（新舊提示詞）的效果差異，通過分流不同用戶到不同版本，比較點擊率、轉換率等量化指標，確定哪個版本更好。"
      why_not_a: "貸款審核需要人工確認是 HITL（人機協作回圈）的典型場景。"
      why_not_c: "採購人員確認符合工作流程是 UAT（使用者驗收測試）。"
      why_not_d: "尋找歧視性輸出是 Red Team 測試的目的。"
    keywords: ["A/B測試", "測試類型"]
    topic_area: 測試類型

  - id: L12302-Q20
    difficulty: 3
    question: "某醫院計劃導入 AI 輔助診斷系統，系統設計規定所有 AI 給出的診斷建議必須由主治醫師確認後才能進入病歷。這個設計對應哪個概念？"
    options:
      a: "Rollback（回滾）——退回上一個穩定版本"
      b: "Kill Switch（緊急關閉）——緊急停用 AI 診斷功能"
      c: "HITL（Human-in-the-Loop，人機協作回圈）——事前設計的人工審核節點"
      d: "Fallback（備援）——切回人工診斷流程"
    correct: c
    explanation:
      why_correct: "這是 HITL 的典型案例：醫療屬於高風險決策場景，系統設計階段就規劃「AI 建議→主治醫師確認→進病歷」的流程，不是等出問題才介入。HITL 是事前設計，確保高風險決策有人工負責。"
      why_not_a: "Rollback 是版本管理，發現新版問題退回舊版，與診斷確認流程無關。"
      why_not_b: "Kill Switch 是緊急完全停用，是應急措施，不是常規確認流程。"
      why_not_d: "Fallback 是系統故障時切回備用方案，不是常規流程中的人工確認機制。"
    keywords: ["HITL", "醫療", "高風險決策"]
    topic_area: 應急規劃

  - id: L12302-Q21
    difficulty: 3
    question: "Rollout（推廣）階段與 Scale（規模化）階段的主要差異是什麼？"
    options:
      a: "Rollout 是技術驗證；Scale 是業務效益驗證"
      b: "Rollout 只在單一部門進行；Scale 在兩個部門"
      c: "Rollout 和 Scale 是同義詞，可以互換使用"
      d: "Rollout 是逐步擴大到多部門（3-6個月）；Scale 是全組織長期部署"
    correct: d
    explanation:
      why_correct: "Rollout（推廣）是在3-6個月內逐步將 AI 部署擴大到多個部門，重點是培訓和問題快速解決；Scale（規模化）是全組織/全產品線的長期部署，建立自動化和長期維運機制。兩者在範圍和重點上都不同。"
      why_not_a: "技術驗證是 POC，業務效益驗證是 Pilot，這兩者都不是 Rollout 或 Scale 的定義。"
      why_not_b: "Rollout 針對多部門，不是單一部門；Scale 是全組織，不是兩個部門。"
      why_not_c: "雖然有些文件用「Scale/Rollout」合稱，但兩者在四階段框架中有明確差異。"
    keywords: ["Rollout", "Scale", "四階段差異"]
    topic_area: 四階段推廣策略

  - id: L12302-Q22
    difficulty: 3
    question: "某公司 AI 推薦系統被發現對特定族群有歧視性推薦，管理層決定立即停用所有 AI 推薦功能，改由人工編輯負責。這個決定對應哪個應急措施？"
    options:
      a: "Kill Switch——緊急停用 AI 推薦功能，人工接管"
      b: "HITL——在推薦流程中加入人工審核"
      c: "Rollback——退回上一個穩定版本的推薦系統"
      d: "Pilot——重新進行試行測試"
    correct: a
    explanation:
      why_correct: "因為發現歧視性輸出這個倫理問題，管理層決定「立即停用所有 AI 功能」並由人工接管——這是 Kill Switch（緊急關閉）的典型觸發情境。緊急安全/倫理問題需要最強硬的應急手段。"
      why_not_b: "HITL 是加入人工審核節點，但題目是「停用 AI」不是「加審核流程」。"
      why_not_c: "Rollback 是退版本，但題目描述的是完全停用，不是退回舊版本。"
      why_not_d: "Pilot 是導入階段，不是應急措施。"
    keywords: ["Kill Switch", "倫理問題", "緊急停用"]
    topic_area: 應急規劃

  - id: L12302-Q23
    difficulty: 3
    question: "某公司在 AI 客服系統的 Rollout 過渡期，讓新的 AI 系統和舊的規則式系統同時處理客戶問題，每天比較兩個系統的回答品質。這個做法屬於？"
    options:
      a: "A/B 測試——分流不同用戶到不同版本"
      b: "Beta 測試——外部小範圍用戶試用"
      c: "Red Team 測試——以攻擊者角度找漏洞"
      d: "平行運行（Parallel Run）——新舊系統同時跑，比較輸出"
    correct: d
    explanation:
      why_correct: "平行運行（Parallel Run）的核心特徵是：新舊系統同時處理相同的真實業務，比較兩個系統的輸出差異，確認新系統可以替代舊系統後才完全切換。這在 Rollout 過渡期是降低風險的標準做法。"
      why_not_a: "A/B 測試是分流不同用戶到不同版本，目的是比較效果優劣，不是在過渡期同時處理同一批業務。"
      why_not_b: "Beta 測試是外部用戶試用，不是新舊系統並行比較。"
      why_not_c: "Red Team 是找漏洞，不是比較新舊系統輸出。"
    keywords: ["平行運行", "Parallel Run", "Rollout過渡"]
    topic_area: 測試類型

  - id: L12302-Q24
    difficulty: 3
    question: "某公司 AI 內容生成系統的 Pilot 階段結束後，評估結果顯示：使用者滿意度 4.2/5（門檻 4.0），內容採用率 68%（門檻 70%）。應該如何處理？"
    options:
      a: "因採用率未達 70% 門檻，不應進入 Rollout，需先調整再重新評估"
      b: "直接進入 Rollout，4.2 分已超過門檻足夠"
      c: "重新定義門檻，把採用率改為 65% 就可以通過"
      d: "跳過 Rollout 直接進入 Scale，節省時間"
    correct: a
    explanation:
      why_correct: "出口標準（Exit Criteria）的設計是「所有關鍵指標都必須達標才能進下一關」。雖然滿意度超標，但採用率 68% 未達 70% 門檻，所以不應進入 Rollout，需找出採用率不足的原因（可能是操作複雜、輸出品質問題等）並改善。"
      why_not_b: "出口標準是所有指標都要達標，不是「一個超過就算通過」。"
      why_not_c: "事後改變門檻是不誠信的做法，會讓出口標準失去意義。"
      why_not_d: "跳過 Rollout 直接 Scale 會放大未解決的問題，提高失敗風險。"
    keywords: ["出口標準", "Exit Criteria", "Pilot"]
    topic_area: 出口標準

  - id: L12302-Q25
    difficulty: 3
    question: "在 AI 導入的資源規劃中，哪項資源最常被企業低估，也是導入失敗的常見原因？"
    options:
      a: "錢（預算）——API 費用超支"
      b: "人（人力）——IT 人員不足"
      c: "料（資料）——缺乏可用的高品質訓練/測試資料"
      d: "時（時程）——時程排得太緊"
    correct: c
    explanation:
      why_correct: "資料（料）是最常被低估的資源維度。企業往往覺得「有資料」，但實際上資料品質差、數量不足、隱私問題或標註不完整，導致 AI 無法正常訓練或測試。業界調查一致指出資料準備不足是 AI 導入失敗的主要原因之一。"
      why_not_a: "預算超支是常見問題，但不是最常被低估的。"
      why_not_b: "IT 人員不足也是問題，但企業通常比較容易意識到人力缺口。"
      why_not_d: "時程排得太緊也常見，但不如資料問題普遍且難以在規劃初期發現。"
    keywords: ["資料", "資源規劃", "常被低估"]
    topic_area: 資源規劃

  - id: L12302-Q26
    difficulty: 3
    question: "下列哪一個情境最適合在 AI 決策流程中加入 HITL（Human-in-the-Loop）機制？"
    options:
      a: "AI 自動生成社群媒體貼文文案"
      b: "AI 幫助員工查詢公司 FAQ 問題"
      c: "AI 決定員工薪資調整和晉升建議"
      d: "AI 自動回答網路商店的商品詢問"
    correct: c
    explanation:
      why_correct: "員工薪資調整和晉升建議屬於高風險的人事決策，直接影響員工的職業和生計。這類決策必須事前設計 HITL 機制，確保有人工審核和最終確認，不能由 AI 自動決定。"
      why_not_a: "社群媒體文案屬於低風險輔助工作，錯了容易修改，不必強制 HITL。"
      why_not_b: "FAQ 查詢是標準化低風險任務，HITL 的必要性低。"
      why_not_d: "商品詢問是一般客服任務，風險較低，不必強制 HITL。"
    keywords: ["HITL", "高風險決策", "人事"]
    topic_area: 應急規劃

  - id: L12302-Q27
    difficulty: 3
    question: "某銀行的 AI 詐欺偵測系統在深夜發現 API 回應超時，導致所有交易驗證失敗。IT 應立即執行哪個應急措施？"
    options:
      a: "Rollback——退回上一個版本的詐欺偵測系統"
      b: "Fallback——切換回規則式詐欺偵測或人工審核模式"
      c: "HITL——在每筆交易中加入人工確認"
      d: "Beta 測試——讓外部用戶幫忙測試新系統"
    correct: b
    explanation:
      why_correct: "API 超時導致服務中斷是系統性故障，需要立即啟動 Fallback（備援），切換回原有的規則式系統或人工審核模式，確保銀行交易服務不中斷。Fallback 的目的就是「AI 掛了，服務繼續」。"
      why_not_a: "Rollback 是退版本，適用於版本升級後效能退化，不適用於 API 超時故障。"
      why_not_c: "HITL 是事前設計的流程機制，深夜緊急故障時「加入人工確認」不實際也不是應急方案。"
      why_not_d: "緊急故障期間進行 Beta 測試完全不合理。"
    keywords: ["Fallback", "API故障", "銀行"]
    topic_area: 應急規劃

  - id: L12302-Q28
    difficulty: 3
    question: "下列關於敏捷導入（Agile）與瀑布導入（Waterfall）的比較，何者最準確？"
    options:
      a: "AI 專案應該用瀑布，因為瀑布規劃更嚴謹"
      b: "敏捷適合 AI 的不確定性，但敏捷表示不需要文件和規劃"
      c: "瀑布和敏捷對 AI 專案效果相同，選擇取決於個人偏好"
      d: "敏捷透過2-4週迭代快速調整，適合 AI 不確定性；瀑布適合需求完全明確的子項目"
    correct: d
    explanation:
      why_correct: "AI 導入推薦敏捷的原因：AI 專案充滿不確定性（模型效果、使用者接受度），需要快速迭代調整。敏捷每2-4週一個迭代，允許快速修正。瀑布適用於需求完全明確的子項目。敏捷≠無規劃，每個 Sprint 仍有計劃。"
      why_not_a: "瀑布的嚴謹性在 AI 不確定性環境中反而是弱點——最後才能得到完整回饋。"
      why_not_b: "敏捷不是無規劃；敏捷有 Sprint 計劃、回顧等，只是允許彈性調整，仍需文件。"
      why_not_c: "兩者對 AI 專案的適合度有明顯差異；AI 的不確定性讓敏捷更合適。"
    keywords: ["敏捷", "瀑布", "AI導入方法論"]
    topic_area: 四階段推廣策略

  - id: L12302-Q29
    difficulty: 3
    question: "POC 階段的出口標準（Exit Criteria）中，哪兩項最關鍵？"
    options:
      a: "使用者接受度 > 80% + KPI 達標"
      b: "無重大故障（7天）+ SLA 達標"
      c: "全部員工培訓完成 + 長期預算已核准"
      d: "技術可行性確認 + 基礎準確率達到預設門檻"
    correct: d
    explanation:
      why_correct: "POC 的核心目的是驗證技術可行性，所以出口標準圍繞技術面：（1）技術可行性確認——AI 在公司環境能正常運作、（2）基礎準確率達到預設門檻——模型輸出品質符合最低要求。兩項都確認後才進入 Pilot。"
      why_not_a: "使用者接受度和 KPI 是 Pilot 的出口標準，POC 時業務使用者尚未參與。"
      why_not_b: "無重大故障和 SLA 是 Rollout 的出口標準。"
      why_not_c: "員工培訓完成和預算核准是更後期的要求，不是 POC 的出口標準。"
    keywords: ["POC", "出口標準", "技術可行性"]
    topic_area: 出口標準

  - id: L12302-Q30
    difficulty: 3
    question: "下列哪個情境屬於「變更管理（Change Management）中的阻力管理」？"
    options:
      a: "IT 團隊更新 AI 模型的 API 金鑰"
      b: "資安部門掃描系統漏洞"
      c: "測試團隊執行 Red Team 攻擊"
      d: "業務部門主管抵制 AI 導入，擔心取代員工工作"
    correct: d
    explanation:
      why_correct: "變更管理的「阻力管理」正是針對這種情況：部門主管擔心被取代而抵制。需要透過溝通（說明 AI 是輔助工具）、培訓（讓員工掌握新技能）、利害關係人管理（將主管從反對者轉為支持者）來解決。"
      why_not_a: "更新 API 金鑰是技術操作，與變更管理無關。"
      why_not_b: "資安掃描是 IT 安全工作，不是變更管理。"
      why_not_c: "Red Team 測試是測試活動，不是變更管理。"
    keywords: ["變更管理", "阻力管理", "利害關係人"]
    topic_area: 變更管理

  - id: L12302-Q31
    difficulty: 4
    question: "某公司同時面臨三個問題：（1）新版 AI 生成品質下降；（2）AI 服務完全中斷；（3）用戶資料外洩疑慮。應分別對應哪三個應急措施？"
    options:
      a: "（1）Kill Switch（2）Rollback（3）HITL"
      b: "（1）Rollback（2）Fallback（3）Kill Switch"
      c: "（1）Fallback（2）Kill Switch（3）Rollback"
      d: "（1）HITL（2）Fallback（3）Rollback"
    correct: b
    explanation:
      why_correct: "三個問題對應三個應急措施：（1）新版品質下降→Rollback（退回上一個穩定版本）；（2）服務完全中斷→Fallback（切回舊系統確保服務不中斷）；（3）資料外洩疑慮→Kill Switch（緊急停用 AI 功能，避免繼續洩露）。"
      why_not_a: "Kill Switch 適用於安全/倫理問題（第3項），不是品質下降（第1項）。"
      why_not_c: "Fallback 適用於服務中斷（第2項），不是品質下降（第1項）。"
      why_not_d: "HITL 是事前設計的流程，不是緊急應急措施；且不適用於服務中斷情境。"
    keywords: ["Rollback", "Fallback", "Kill Switch", "應急措施比較"]
    topic_area: 應急規劃

  - id: L12302-Q32
    difficulty: 4
    question: "某製造業計劃導入 AI 品質檢測，POC 完成後正進行 Pilot。Pilot 中期評估：使用者滿意度 3.8/5（門檻 4.0），但檢測準確率已達 95%（門檻 90%）。最佳處理方式是？"
    options:
      a: "因準確率超標，直接進入 Rollout"
      b: "降低滿意度門檻到 3.5，然後進入 Rollout"
      c: "繼續 Pilot，針對滿意度低的原因改善（如介面或培訓），再評估"
      d: "因滿意度未達標，立即停止導入"
    correct: c
    explanation:
      why_correct: "Pilot 是中期評估，尚有改善機會。準確率超標是好消息，但使用者滿意度偏低（3.8 vs 4.0 門檻）可能源於介面難用、培訓不足或期待落差，這些都可在 Pilot 期間改善。正確做法是找出原因→改善→再評估，而不是放棄或降低標準。"
      why_not_a: "出口標準要全部達標；滿意度未達標不能進入 Rollout。"
      why_not_b: "事後降低門檻不誠信且失去出口標準的意義。"
      why_not_d: "這只是 Pilot 中期，不是終期評估；且問題是可改善的，不應立即放棄。"
    keywords: ["Pilot", "出口標準", "中期改善"]
    topic_area: 出口標準

  - id: L12302-Q33
    difficulty: 4
    question: "某 HR AI 系統正式上線後發現：（A）使用者表示操作複雜，（B）某部門主管反對使用 AI 審核員工績效。變更管理應分別採取什麼措施？"
    options:
      a: "（A）技術修復 UI（B）強制使用 AI 決策"
      b: "（A）加強使用者培訓（B）針對主管的顧慮進行溝通和利害關係人管理"
      c: "（A）降低功能需求（B）解雇反對的主管"
      d: "（A）重新進行 POC（B）完全停用 AI"
    correct: b
    explanation:
      why_correct: "變更管理針對「人的問題」：（A）操作複雜是技能問題，應加強使用者培訓，讓員工熟悉操作；（B）主管反對是利害關係人阻力，應透過溝通了解顧慮（如工作取代的恐懼）、說明 AI 的輔助定位、將主管納入決策過程，把反對者轉為支持者。"
      why_not_a: "強制使用 AI 決策會加劇阻力，且員工績效審核必須有 HITL，不能完全由 AI 決定。"
      why_not_c: "降低功能需求無法解決操作複雜問題；解雇主管是不理性且可能違法的。"
      why_not_d: "重新 POC 是最後手段；完全停用也過度反應。"
    keywords: ["變更管理", "培訓", "利害關係人溝通"]
    topic_area: 變更管理

  - id: L12302-Q34
    difficulty: 4
    question: "在四階段 AI 導入策略中，「敏捷方式的迭代回饋循環」最應該發生在哪個時機？"
    options:
      a: "只在 Scale 規模化後才收集回饋"
      b: "等整個四階段全部完成後才收集一次性回饋"
      c: "只在 POC 完成後一次性收集回饋"
      d: "每個 Sprint（2-4週）都收集回饋，並在各階段轉換時進行出口標準評估"
    correct: d
    explanation:
      why_correct: "敏捷方式的核心優勢是快速迭代回饋：每個 Sprint（2-4週）收集使用者和業務回饋，快速調整方向。同時，各階段之間（POC→Pilot→Rollout→Scale）設有出口標準評估點，確保符合條件才進入下一階段。兩層回饋機制結合，最大化靈活性。"
      why_not_a: "只在 Scale 後收集回饋太晚，無法在早期糾正問題。"
      why_not_b: "等全部完成後才回饋等同於瀑布方式，失去敏捷的優勢。"
      why_not_c: "只在 POC 後收集一次回饋，忽略了 Pilot 和 Rollout 的重要回饋。"
    keywords: ["敏捷", "迭代", "回饋循環"]
    topic_area: 四階段推廣策略

  - id: L12302-Q35
    difficulty: 4
    question: "某公司的 AI 合約審查工具已完成 Pilot，現在進入 Rollout 推廣到法律、財務、採購三個部門。Rollout 期間最重要的優先事項是什麼？"
    options:
      a: "立即開始 Scale 規模化，讓更多部門同時上線"
      b: "確保 SLA（服務等級協議）達標、無重大故障，並完成各部門培訓"
      c: "重新進行 POC 驗證合約審查的準確率"
      d: "暫停 Rollout，先進行 Beta 測試收集外部回饋"
    correct: b
    explanation:
      why_correct: "Rollout 階段的核心目標是「穩定且有序地擴大覆蓋範圍」。最重要的工作：（1）確保服務穩定符合 SLA；（2）快速解決問題避免重大故障；（3）對各部門進行適當培訓，確保使用者能有效使用工具。這三項直接對應 Rollout 出口標準。"
      why_not_a: "Rollout 都還沒完成就急著 Scale，是跳過出口標準的危險做法。"
      why_not_c: "Pilot 已完成驗證，Rollout 階段不需要重新 POC。"
      why_not_d: "Beta 測試是 Rollout 前或初期進行的，不是 Rollout 進行中的優先事項。"
    keywords: ["Rollout", "SLA", "培訓"]
    topic_area: 出口標準

  - id: L12302-Q36
    difficulty: 4
    question: "在 AI 導入規劃中，「相依性管理（Dependency Management）」在時程規劃中指的是什麼？"
    options:
      a: "確保 AI 系統不依賴外部 API，避免供應商鎖定"
      b: "管理員工對 AI 系統的心理依賴程度"
      c: "建立 AI 模型的相依套件清單（requirements.txt）"
      d: "識別哪些任務必須按先後順序執行，後一個任務依賴前一個的完成"
    correct: d
    explanation:
      why_correct: "時程規劃中的相依性管理是識別任務間的前後關係：例如「資料清理完成」→才能「開始模型訓練」→才能「進行 UAT」。不識別相依性會導致後一個任務的人員空等，或前一個任務延誤導致整個時程崩潰。"
      why_not_a: "供應商鎖定是採購評估問題（L12301），不是時程規劃中的相依性管理。"
      why_not_b: "員工心理依賴是變更管理議題，不是時程規劃。"
      why_not_c: "軟體套件依賴（requirements.txt）是技術開發管理，不是專案時程規劃。"
    keywords: ["時程規劃", "相依性管理", "資源規劃"]
    topic_area: 資源規劃

  - id: L12302-Q37
    difficulty: 5
    question: "某電商平台 AI 個人化推薦系統 Rollout 三個月後，SLA 達標但用戶投訴推薦內容有偏見。此時正確的處理步驟是什麼？"
    options:
      a: "先 Kill Switch 停用偏見推薦功能，同時調查偏見根因，並在修復後重新規劃 HITL 流程設計"
      b: "Rollback 退版 + 修正後重新上線"
      c: "Fallback 切舊系統 + 等待技術團隊修復"
      d: "繼續 Rollout + 同時進行 A/B 測試比較偏見程度"
    correct: a
    explanation:
      why_correct: "偏見是倫理問題，需要分三步處理：（1）立即 Kill Switch 停用含偏見的推薦功能，防止持續傷害；（2）調查偏見根因（訓練資料、模型設計等問題）；（3）修復後規劃 HITL 流程——注意：HITL 是事前設計的人工審核機制，屬於後續治理設計，不是緊急措施本身。"
      why_not_b: "Rollback 只解決版本問題，如果偏見在多個版本都存在，退版無效。"
      why_not_c: "Fallback 切回舊系統，如果偏見是系統性問題，舊系統可能也有同樣問題。"
      why_not_d: "繼續 Rollout 且用 A/B 測試「比較偏見程度」是不倫理的——不應讓更多用戶暴露在已知偏見問題中。"
    keywords: ["Kill Switch", "HITL", "倫理問題", "應急組合"]
    topic_area: 應急規劃

  - id: L12302-Q38
    difficulty: 5
    question: "某公司計劃從「POC 完成」到「全面 Scale」用 6 個月完成，時程如下：POC（已完成）→ Pilot（1個月）→ Rollout（1個月）→ Scale（4個月）。哪個環節風險最高？"
    options:
      a: "Pilot 1個月偏短，業務效益驗證不充分"
      b: "Rollout 1個月明顯偏短，多部門推廣和培訓不可能在1個月內完成"
      c: "Scale 4個月太短，全組織部署需要更多時間"
      d: "整體時程合理，敏捷方式可以加速各階段"
    correct: b
    explanation:
      why_correct: "標準參考時間：Rollout 需要3-6個月才能逐步推廣到多部門、完成各部門培訓、穩定服務。1個月明顯偏短，是最高風險環節。Pilot 1個月在某些情況下勉強可行（標準是1-3個月），但 Rollout 1個月幾乎不可能在多部門完成所有工作。"
      why_not_a: "Pilot 1個月偏短但非最大風險；問題更大的是 Rollout。"
      why_not_c: "Scale 4個月對全組織部署可能偏緊，但 Rollout 1個月是更明顯的問題。"
      why_not_d: "敏捷可以加速迭代，但 Rollout 1個月涵蓋多部門推廣和培訓在實務上幾乎不可能。"
    keywords: ["時程規劃", "Rollout時間", "四階段"]
    topic_area: 四階段推廣策略

  - id: L12302-Q39
    difficulty: 5
    question: "某公司 AI 導入完成 Scale 後 6 個月，AI 模型的業務 KPI 開始下滑（模型漂移/Model Drift）。這個現象提示了什麼規劃要素被遺漏？"
    options:
      a: "POC 階段的技術驗證不足"
      b: "Pilot 階段沒有進行 UAT"
      c: "Scale 後缺乏持續監控、定期評估和再訓練機制"
      d: "資源規劃沒有預留足夠的運算資源"
    correct: c
    explanation:
      why_correct: "模型漂移（Model Drift）是指隨著時間推移，真實世界的資料分布改變，導致模型效果下降。Scale 後的 AI 維運需要：（1）持續監控 KPI 指標；（2）定期評估模型效能；（3）當發現漂移時進行再訓練或更新模型。「AI 上線不是結束」——缺乏這個持續維運機制是本題問題所在。"
      why_not_a: "POC 在6個月前就完成了，且當時 KPI 正常；問題是後來的漂移，不是早期技術驗證問題。"
      why_not_b: "UAT 是功能驗收，與 Scale 後的模型漂移問題無關。"
      why_not_d: "運算資源是基礎設施問題，模型漂移是效能退化問題，兩者無直接關聯。"
    keywords: ["Scale", "模型漂移", "持續監控"]
    topic_area: 出口標準

  - id: L12302-Q40
    difficulty: 5
    question: "某公司計劃同時進行 AI 客服系統的 Pilot 和 Beta 測試，請問這樣的安排是否正確？"
    options:
      a: "正確，Pilot 和 Beta 可以同時進行以節省時間"
      b: "有問題，Beta 測試應在 Scale 完成後才執行"
      c: "有問題，Beta 測試（外部用戶）應在 Rollout 前進行；Pilot 期間應先做 UAT 確認內部流程無誤再向外開放"
      d: "有問題，應把 Beta 測試改成 Red Team 測試"
    correct: c
    explanation:
      why_correct: "測試時機順序：Pilot 階段重點是內部使用者（業務人員）的 UAT——確認系統符合業務需求；Beta 測試是讓外部小範圍用戶試用，通常在 Rollout 前進行。在 Pilot 期間就讓外部用戶參與，可能在系統尚未穩定時暴露外部風險，且內部流程問題還沒解決就向外開放不合適。"
      why_not_a: "雖然時間上可以節省，但在 Pilot（內部驗證）完成前就引入外部用戶有風險——內部流程問題可能影響外部用戶體驗。"
      why_not_b: "Beta 測試在 Scale 後才做太晚；Beta 的目的是在 Rollout 前的最後外部驗證，不是在 Scale 後。"
      why_not_d: "Beta 測試和 Red Team 目的不同，不能互換；Red Team 是找漏洞，不是收集用戶回饋。"
    keywords: ["Beta測試", "UAT", "測試順序", "Pilot"]
    topic_area: 測試類型
