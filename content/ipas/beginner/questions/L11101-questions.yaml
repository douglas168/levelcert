    d: "提出了圖靈測試的評估方法"
  correct: "b"
  explanation:
    why_correct: "達特茅斯會議由 John McCarthy、Marvin Minsky、Nathaniel Rochester 和 Claude Shannon 發起，會議中正式使用「Artificial Intelligence」一詞，確立 AI 為一門獨立的學術學科。這是 AI 作為研究領域的誕生標誌。"
    why_not_a: "1997 年 IBM Deep Blue 才擊敗西洋棋世界冠軍。1956 年會議的重點不在於下棋展示，而在於學科定義。"
    why_not_c: "McCulloch 和 Pitts 早在 1943 年就提出人工神經元模型，遠早於達特茅斯會議。"
    why_not_d: "圖靈測試由 Alan Turing 在 1950 年的論文中提出，比達特茅斯會議早了六年。"
