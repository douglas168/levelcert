    why_not_a: "卷積神經網路（Convolutional Neural Network）由 LeCun 等人在 1990 年代發展，主要用於影像處理，與 Transformer 無關。"
    why_not_b: "RNN（Recurrent Neural Network）是 Transformer 之前處理序列資料的主流架構，Transformer 正是為了克服 RNN 難以平行運算的問題而提出的。"
