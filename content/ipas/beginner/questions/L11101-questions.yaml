- id: "L11101-Q09"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 3
  question: "小明開發了一個 AI 系統，能根據病患過去的檢查紀錄和即時的生理數據來預測心臟病風險。依 AI 功能分類，這個系統最可能屬於哪一類？"
  options:
    a: "反應式機器（Reactive Machines）"
    b: "有限記憶（Limited Memory）"
    c: "心智理論（Theory of Mind）"
    d: "自我意識（Self-Aware）"
  correct: "b"
  explanation:
    why_correct: "該系統能利用「過去的檢查紀錄」（歷史資料）搭配即時數據來做預測，這正是有限記憶型 AI 的特徵——能儲存並運用過去的資料來改善當前決策。"
    why_not_a: "反應式機器只根據當前輸入做出反應，無法利用歷史資料。此系統明確使用了過去的檢查紀錄。"
    why_not_c: "心智理論型 AI 需要能理解人類的情緒、信念和意圖，該系統僅分析生理數據，不涉及理解病患心理狀態。"
    why_not_d: "自我意識型 AI 需具備自我認知能力，目前僅存在於理論中，此系統不具備此特徵。"
  keywords:
    - "有限記憶"
    - "Limited Memory"
    - "醫療 AI"
    - "預測"
  exam_trap: false

- id: "L11101-Q10"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 3
  question: "一家台灣企業聲稱其新產品是「通用人工智慧（AGI）」，能在任何認知任務上達到人類水準。身為 AI 專案規劃師，你對此主張的最佳回應為何？"
  options:
    a: "這是合理的，因為 ChatGPT 已經證明 AGI 已經實現"
    b: "需要進一步評估，因為目前尚無公認的 AGI 系統，該產品很可能是 ANI"
    c: "這不可能，因為 AGI 永遠不會被實現"
    d: "無需質疑，因為 AGI 的定義尚未標準化"
  correct: "b"
  explanation:
    why_correct: "截至目前，所有商用 AI 系統（包括最先進的大型語言模型）都屬於 ANI。尚無公認達到 AGI 標準的系統，因此需要仔細評估該企業的主張。"
    why_not_a: "ChatGPT 雖然功能強大，但仍屬於 ANI（弱人工智慧），在特定任務上有明顯侷限，並非 AGI。這是常見的考試陷阱。"
    why_not_c: "「永遠不會被實現」過於絕對。學術界對 AGI 是否可能實現仍有爭論，不應斷言不可能。"
    why_not_d: "雖然 AGI 的精確定義確實仍有討論空間，但此回應迴避了專業判斷的責任。作為 AI 規劃師應具備辨識能力。"
  keywords:
    - "AGI"
    - "ANI"
    - "ChatGPT"
    - "通用人工智慧"
  exam_trap: true

- id: "L11101-Q11"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 3
  question: "某公司開發了一套西洋棋 AI，它只會根據當前棋盤上的棋子位置計算最佳走法，不會記住前幾步的走法歷史。依 AI 功能分類，此系統屬於哪一類？"
  options:
    a: "有限記憶（Limited Memory）"
    b: "反應式機器（Reactive Machines）"
    c: "心智理論（Theory of Mind）"
    d: "弱人工智慧（Weak AI）"
  correct: "b"
  explanation:
    why_correct: "該系統「只根據當前棋盤狀態」做決策，不利用歷史走法資料，符合反應式機器的定義。IBM Deep Blue 就是經典的反應式機器案例。"
    why_not_a: "有限記憶型 AI 會利用過去的資料來輔助決策，但題目明確指出此系統不會記住前幾步走法。"
    why_not_c: "心智理論型 AI 需要理解對手的情緒和意圖，此系統僅做棋盤分析，不涉及理解對手心理。"
    why_not_d: "弱人工智慧（Weak AI）是哲學分類，非功能分類。題目問的是功能分類。學生容易混淆這兩種分類體系。"
  keywords:
    - "反應式機器"
    - "Reactive Machines"
    - "Deep Blue"
  exam_trap: false

- id: "L11101-Q12"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 3
  question: "依據台灣《人工智慧基本法》第三條的定義，下列何者最符合「人工智慧」的核心要素？"
  options:
    a: "具備自主運行能力，透過機器學習及演算法，能產出預測、內容、建議或決策"
    b: "能通過圖靈測試，使人類無法區分其與真人的差異"
    c: "具備自我意識，能反思自身的運算過程"
    d: "以深度學習為核心技術，必須使用神經網路架構"
  correct: "a"
  explanation:
    why_correct: "台灣《人工智慧基本法》第三條定義人工智慧的三大核心要素：(1) 自主運行能力、(2) 透過機器學習及演算法、(3) 產出預測、內容、建議或決策。"
    why_not_b: "圖靈測試是 Alan Turing 在 1950 年提出的 AI 判定方法，並非台灣法律對 AI 的定義。"
    why_not_c: "自我意識是最高層級 AI 功能分類的理論特徵，台灣法律定義並未要求 AI 具備自我意識。"
    why_not_d: "台灣法律定義使用的是「機器學習及演算法」，涵蓋範圍比深度學習更廣，未限定必須使用神經網路。"
  keywords:
    - "人工智慧基本法"
    - "第三條"
    - "自主運行能力"
    - "機器學習及演算法"
