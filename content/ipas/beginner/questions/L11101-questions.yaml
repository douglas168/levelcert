- id: "L11101-Q05"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 2
  question: "Russell 與 Norvig 在《Artificial Intelligence: A Modern Approach》中，以 2×2 矩陣將 AI 分為四種研究方向。下列哪一項不是其中之一？"
  options:
    a: "像人一樣思考（Thinking Humanly）"
    b: "理性地行動（Acting Rationally）"
    c: "像人一樣行動（Acting Humanly）"
    d: "自主地學習（Learning Autonomously）"
  correct: "d"
  explanation:
    why_correct: "Russell & Norvig 的 2×2 矩陣由 Thinking/Acting × Humanly/Rationally 組成，共四類：Thinking Humanly、Thinking Rationally、Acting Humanly、Acting Rationally。「自主地學習」並非其中之一。"
    why_not_a: "Thinking Humanly（像人一樣思考）是四個象限之一，屬於認知科學取向。"
    why_not_b: "Acting Rationally（理性地行動）是四個象限之一，屬於理性代理人取向。"
    why_not_c: "Acting Humanly（像人一樣行動）是四個象限之一，圖靈測試即屬此類。"
  keywords:
    - "Russell & Norvig"
    - "2×2 矩陣"
    - "Thinking Rationally"
    - "Acting Rationally"
  exam_trap: false

- id: "L11101-Q06"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 2
  question: "關於「強人工智慧（Strong AI）」與「弱人工智慧（Weak AI）」的哲學區分，下列敘述何者正確？"
  options:
    a: "強 AI 指計算能力很強的 AI 系統，弱 AI 指計算能力較弱的系統"
    b: "強 AI 認為機器可以真正擁有意識與理解力，弱 AI 認為機器僅能模擬智慧行為"
    c: "強 AI 指 AGI，弱 AI 指 ANI，兩者完全相同概念"
    d: "強 AI 與弱 AI 的區分已被學術界廢除，不再使用"
  correct: "b"
  explanation:
    why_correct: "John Searle 提出的哲學區分：強 AI（Strong AI）主張機器能真正擁有心智、意識與理解力；弱 AI（Weak AI）主張機器只是模擬智慧行為，並不具有真正的理解。"
    why_not_a: "這是最常見的誤解。「強」和「弱」並非指計算能力的強弱，而是哲學立場上對機器能否擁有意識的主張。"
    why_not_c: "雖然 Strong AI 與 AGI、Weak AI 與 ANI 有時被混用，但嚴格來說它們分屬哲學討論與能力分類，概念內涵不完全相同。"
    why_not_d: "強 AI / 弱 AI 的哲學區分至今仍是 AI 哲學中的核心議題，並未被廢除。"
  keywords:
    - "強人工智慧"
    - "弱人工智慧"
    - "Strong AI"
    - "Weak AI"
    - "Searle"
  exam_trap: true

- id: "L11101-Q07"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 2
  question: "在 AI 功能分類中，「有限記憶（Limited Memory）」型 AI 的主要特徵為何？"
  options:
    a: "只能根據當前輸入做出反應，無法利用過去的經驗"
    b: "能利用過去的資料或經驗來改善當前的決策"
    c: "能理解他人的情緒與意圖"
    d: "具有自我意識，能反思自身的存在"
  correct: "b"
  explanation:
    why_correct: "有限記憶（Limited Memory）型 AI 能儲存並利用過去的資料或經驗來輔助當前決策，如自駕車利用過去的道路感測資料、ChatGPT 利用對話上下文。"
    why_not_a: "這是「反應式機器（Reactive Machines）」的特徵，如 IBM Deep Blue 只根據當下棋盤狀態下棋。"
    why_not_c: "這是「心智理論（Theory of Mind）」型 AI 的特徵，目前仍在研究階段。"
    why_not_d: "這是「自我意識（Self-Aware）」型 AI 的特徵，目前僅為理論推測。"
  keywords:
    - "有限記憶"
    - "Limited Memory"
    - "功能分類"
  exam_trap: false

- id: "L11101-Q08"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 2
  question: "關於 AI 發展史上的「AI 寒冬（AI Winter）」，下列敘述何者正確？"
  options:
    a: "AI 寒冬只發生過一次，約在 1970 年代"
    b: "AI 寒冬是指 AI 技術被政府禁止研究的時期"
    c: "AI 歷史上經歷了至少兩次 AI 寒冬，分別在 1970 年代與 1980 年代末期"
    d: "AI 寒冬是因為硬體技術倒退所導致"
  correct: "c"
  explanation:
    why_correct: "AI 歷史上經歷了至少兩次寒冬：第一次在 1970 年代（因專家系統的侷限與 Lighthill 報告導致資金大幅縮減），第二次在 1980 年代末至 1990 年代初（因專家系統維護成本過高與日本第五代計算機計畫失敗）。"
    why_not_a: "AI 寒冬不只一次，至少有兩次明顯的低潮期。"
    why_not_b: "AI 寒冬並非政府禁令，而是因為技術無法達到預期、資金撤出、研究熱度驟降的時期。"
    why_not_d: "AI 寒冬主要原因是技術瓶頸與資金縮減，並非硬體技術倒退。硬體在這段期間持續進步。"
  keywords:
    - "AI 寒冬"
    - "AI Winter"
    - "1970s"
    - "1980s"
  exam_trap: false

