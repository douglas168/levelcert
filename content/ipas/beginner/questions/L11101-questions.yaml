- id: "L11101-Q13"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 4
  question: "「能力分類（ANI / AGI / ASI）」與「功能分類（Reactive / Limited Memory / Theory of Mind / Self-Aware）」是兩種常見的 AI 分類方式。下列關於兩者的比較，何者正確？"
  options:
    a: "兩種分類完全對應：ANI = Reactive，AGI = Limited Memory，ASI = Self-Aware"
    b: "能力分類側重 AI 能執行任務的廣度，功能分類側重 AI 處理資訊的方式與認知層次"
    c: "功能分類是能力分類的子集，所有功能分類都可以歸入 ANI"
    d: "兩種分類互斥，不能同時使用於描述同一個 AI 系統"
  correct: "b"
  explanation:
    why_correct: "能力分類（ANI/AGI/ASI）關注 AI 能處理的任務範圍——從單一任務到超越人類全面能力。功能分類（Reactive 到 Self-Aware）關注 AI 如何處理資訊——從純反應到具備自我意識。兩者是不同維度的分類。"
    why_not_a: "這是錯誤的一一對應。例如，目前的 Limited Memory AI（如 ChatGPT）仍屬於 ANI，而非 AGI。兩種分類並非簡單對應關係。"
    why_not_c: "功能分類中的 Theory of Mind 和 Self-Aware 是未來可能實現的類型，不一定全部歸入 ANI。當 AGI 實現時，可能同時具備 Theory of Mind 功能。"
    why_not_d: "兩種分類並非互斥。同一個 AI 系統可以同時被描述為「ANI + Limited Memory」（如自駕車），兩種分類從不同角度描述 AI。"
  keywords:
    - "能力分類"
    - "功能分類"
    - "ANI"
    - "AGI"
    - "分類比較"
  exam_trap: false

- id: "L11101-Q14"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 4
  question: "2012 年 AlexNet 在 ImageNet 競賽中大幅領先傳統方法，被視為深度學習崛起的關鍵事件。從 AI 發展史的角度分析，AlexNet 的成功主要歸功於哪些因素的結合？"
  options:
    a: "演算法突破（卷積神經網路）+ 大量標註資料（ImageNet）+ GPU 運算能力提升"
    b: "量子運算技術的成熟 + 新型演算法 + 政府大規模資助"
    c: "專家系統技術的延續 + 規則式推理的改良 + 雲端運算普及"
    d: "強化學習的突破 + 自我對弈訓練 + 聯邦學習（Federated Learning）技術"
  correct: "a"
  explanation:
    why_correct: "AlexNet 的成功仰賴三大因素：(1) 卷積神經網路（CNN）架構的改良與 ReLU、Dropout 等技巧、(2) ImageNet 提供的大規模標註影像資料集、(3) NVIDIA GPU 平行運算大幅加速訓練。這三者的匯聚開啟了深度學習的黃金時代。"
    why_not_b: "2012 年量子運算尚未成熟到可用於深度學習訓練，這是錯誤的時間線。AlexNet 使用的是 GPU，非量子電腦。"
    why_not_c: "AlexNet 的成功恰好標誌著從規則式系統（專家系統）轉向資料驅動的深度學習，而非專家系統的延續。"
    why_not_d: "AlexNet 是監督式學習的影像分類任務，並非強化學習或自我對弈。聯邦學習是後來才提出的分散式訓練方法。"
