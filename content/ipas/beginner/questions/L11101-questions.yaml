- id: "L11101-Q20"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 5
  question: "某新創公司宣稱其 AI 產品「具備自主運行能力，使用深度學習演算法，能根據用戶行為產出個人化推薦」。依據台灣《人工智慧基本法》的定義以及 AI 分類體系，下列對該產品的綜合分析何者最正確？"
  options:
    a: "符合《人工智慧基本法》的 AI 定義；能力分類為 AGI（因為具備自主運行能力）；功能分類為 Limited Memory"
    b: "符合《人工智慧基本法》的 AI 定義；能力分類為 ANI；功能分類為 Limited Memory（因為利用用戶歷史行為資料）"
    c: "不符合《人工智慧基本法》的 AI 定義（因為只用深度學習而非機器學習）；分類無法判定"
    d: "符合《人工智慧基本法》的 AI 定義；能力分類為 ANI；功能分類為 Reactive Machines（因為只做推薦）"
  correct: "b"
  explanation:
    why_correct: "綜合分析：(1) 自主運行能力 + 演算法 + 產出推薦 → 符合《人工智慧基本法》第三條定義；(2) 專注於推薦任務 → ANI（非 AGI）；(3) 利用「用戶行為」歷史資料做預測 → Limited Memory（非 Reactive）。三個面向分析皆正確。"
    why_not_a: "「自主運行能力」是台灣法律對 AI 的基本定義要素，並非 AGI 的判定標準。AGI 要求在所有認知領域達到人類水準，僅有自主運行能力遠不足以構成 AGI。"
    why_not_c: "深度學習是機器學習的子集（DL ⊂ ML），使用深度學習當然也符合「機器學習及演算法」的定義。這是利用 AI ⊃ ML ⊃ DL 層次關係設計的陷阱。"
    why_not_d: "該產品利用「用戶行為」（歷史資料）來做推薦，這正是 Limited Memory 的特徵。Reactive Machines 不會使用歷史資料，只根據當前輸入做反應。"
