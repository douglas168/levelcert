- id: "L11101-Q01"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 1
  question: "圖靈測試（Turing Test）最早於哪一年被提出？"
  options:
    a: "1943 年"
    b: "1950 年"
    c: "1956 年"
    d: "1966 年"
  correct: "b"
  explanation:
    why_correct: "Alan Turing 於 1950 年發表論文《Computing Machinery and Intelligence》，提出了「模仿遊戲」（Imitation Game），即後來廣為人知的圖靈測試。"
    why_not_a: "1943 年是 McCulloch 和 Pitts 提出人工神經元模型的年份，並非圖靈測試。"
    why_not_c: "1956 年是達特茅斯會議（Dartmouth Conference），被視為 AI 學科正式誕生的起點，但圖靈測試早了六年。"
    why_not_d: "1966 年與 ELIZA 聊天程式有關，並非圖靈測試的提出年份。"
  keywords:
    - "圖靈測試"
    - "Turing Test"
    - "1950"
  exam_trap: false

- id: "L11101-Q02"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 1
  question: "「人工智慧」（Artificial Intelligence）一詞首次在哪場學術會議中被正式使用？"
  options:
    a: "1950 年曼徹斯特大學研討會"
    b: "1956 年達特茅斯會議（Dartmouth Conference）"
    c: "1969 年國際人工智慧聯合會議（IJCAI）"
    d: "1980 年美國人工智慧學會（AAAI）年會"
  correct: "b"
  explanation:
    why_correct: "1956 年 John McCarthy 等人於達特茅斯學院舉辦的研討會正式使用「Artificial Intelligence」一詞，被視為 AI 學科的誕生。"
    why_not_a: "1950 年雖有圖靈的重要論文，但當時尚未正式使用「人工智慧」這個名稱。"
    why_not_c: "IJCAI 首屆會議在 1969 年舉行，此時 AI 一詞已使用了十三年。"
    why_not_d: "AAAI 成立於 1979 年，1980 年舉辦首屆年會，遠晚於 AI 名稱的誕生。"
  keywords:
    - "達特茅斯會議"
    - "Dartmouth Conference"
    - "1956"
  exam_trap: false

- id: "L11101-Q03"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 1
  question: "依照 AI 能力分類，目前所有商用 AI 系統屬於下列哪一種類型？"
  options:
    a: "通用人工智慧（AGI）"
    b: "超級人工智慧（ASI）"
    c: "弱人工智慧（ANI）"
    d: "自我意識人工智慧（Self-Aware AI）"
  correct: "c"
  explanation:
    why_correct: "目前所有實際運作的 AI 系統——包括 ChatGPT、自駕車視覺系統等——都屬於弱人工智慧（Artificial Narrow Intelligence, ANI），只能在特定任務上表現出智慧行為。"
    why_not_a: "AGI（Artificial General Intelligence）指能像人類一樣處理各種認知任務的 AI，目前尚未實現。"
    why_not_b: "ASI（Artificial Super Intelligence）指在所有領域超越人類的 AI，目前僅存在於理論討論中。"
    why_not_d: "自我意識 AI 屬於功能分類中的最高層級，目前僅為理論推測，尚未實現。"
  keywords:
    - "弱人工智慧"
    - "ANI"
    - "Artificial Narrow Intelligence"
  exam_trap: false

- id: "L11101-Q04"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 1
  question: "在 AI 技術的層次關係中，下列何者正確描述了 AI、ML、DL 三者的包含關係？"
  options:
    a: "DL ⊃ ML ⊃ AI"
    b: "ML ⊃ AI ⊃ DL"
    c: "AI ⊃ ML ⊃ DL"
    d: "AI ⊃ DL ⊃ ML"
  correct: "c"
  explanation:
    why_correct: "人工智慧（AI）是最廣泛的概念，機器學習（ML）是 AI 的子集，而深度學習（DL）是 ML 的子集。即 AI ⊃ ML ⊃ DL。"
    why_not_a: "完全顛倒了三者的包含關係。DL 是最小的範疇，不可能包含 ML 和 AI。"
    why_not_b: "ML 不包含 AI；ML 是 AI 的一部分，非反過來。"
    why_not_d: "DL 不包含 ML。DL 是 ML 的子集（特定方法），兩者順序錯誤。"
  keywords:
    - "AI"
    - "ML"
    - "DL"
    - "層次關係"
  exam_trap: false

