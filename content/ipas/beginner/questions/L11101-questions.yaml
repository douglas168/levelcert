- id: "L11101-Q23"
  topic_code: "L11101"
  item_code: "L11101"
  difficulty: 2
  question: "1980 年代，專家系統（Expert Systems）曾掀起 AI 研究的第二波熱潮。下列關於專家系統的描述，何者最正確？"
  options:
    a: "專家系統透過深度學習從大量數據中自動歸納規則"
    b: "專家系統將人類專家的知識編碼為 if-then 規則，用於特定領域的推理與決策"
    c: "專家系統具有自我學習能力，能隨時間自動更新知識庫"
    d: "專家系統是第一個通過圖靈測試的 AI 系統"
  correct: "b"
  explanation:
    why_correct: "專家系統（Expert Systems）的核心原理是將人類專家在特定領域的知識，以 if-then 規則（知識庫 + 推理引擎）的形式編碼到程式中，讓系統能模擬專家的推理過程。例如 MYCIN 系統將醫師診斷血液感染的知識編碼為約 600 條規則。"
    why_not_a: "專家系統是規則式（Rule-Based）AI，依靠人工編寫規則，而非從數據中自動學習。深度學習在 2010 年代才真正興起。"
    why_not_c: "專家系統的一大侷限正是「無法自動學習」——知識庫的更新需要人類專家手動維護，成本極高，這也是專家系統最終衰落的原因之一。"
    why_not_d: "專家系統並未通過圖靈測試。專家系統專注於特定領域的推理，不具備通用對話能力。"
  keywords:
    - "專家系統"
    - "Expert Systems"
    - "if-then 規則"
    - "知識庫"
    - "MYCIN"
  exam_trap: false

