    b: "以 UNESCO 框架為倫理基礎、參考 OECD 原則建立政策方向、借鏡台灣基本法的七大原則與分工架構、依本國發展程度選擇性採納 EU AI Act 風險分級制度"
    c: "僅需採用 OECD 五大原則即可，無需考慮其他框架"
    d: "等待聯合國制定全球統一 AI 法規後再行立法，目前不需任何行動"
