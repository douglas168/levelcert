- id: "L11102-Q09"
  topic_code: "L11102"
  item_code: "L11102"
  difficulty: 2
  question: "關於「人類在迴圈中」（Human-in-the-Loop, HITL）的概念，下列敘述何者最正確？"
  options:
    a: "指在 AI 決策流程中保留人類監督與介入的機制"
    b: "指 AI 系統必須由人類全程手動操作"
    c: "指 AI 系統只能作為輔助工具，不可自動執行任何決策"
    d: "指所有 AI 系統都必須在每一步驟取得人類核准"
  correct: "a"
  explanation:
    why_correct: "HITL 的核心概念是在 AI 決策流程中保留人類監督與介入的機制，確保人類對重要決策保有最終控制權。"
    why_not_b: "HITL 不代表全程手動操作，AI 仍可自動處理部分流程，關鍵是人類能在必要時介入。"
    why_not_c: "HITL 不排除 AI 自動執行決策，而是強調人類可以監督並在需要時覆寫 AI 決策。"
    why_not_d: "每一步驟都需人類核准是過度解讀，HITL 強調的是關鍵節點的人類介入，而非每一步驟。"
  keywords:
    - "HITL"
    - "Human-in-the-Loop"
    - "人類自主"
    - "人類監督"
  exam_trap: false

