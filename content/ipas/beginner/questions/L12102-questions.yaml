topic: L12102
topic_name: No Code / Low Code的優勢與限制
level: beginner
questions:

  # ============================================================
  # Difficulty 1 — Remember (Bloom's: 記憶) — 6 questions
  # ============================================================

  - id: L12102-Q01
    difficulty: 1
    question: "No Code / Low Code 最常被提及的核心優勢之一，是相較傳統開發方式可提升多少倍的開發速度？"
    options:
      a: "約 5 倍"
      b: "約 50 倍"
      c: "約 100 倍"
      d: "約 20 倍"
    correct: d
    explanation:
      why_correct: "Forrester 研究指出，LCNC 開發速度比傳統全程式碼開發快約 20 倍。記住「Forrester → 20 倍」這個數字對。"
      why_not_a: "5 倍低估了 LCNC 的效率優勢，Forrester 數據為 20 倍。"
      why_not_b: "50 倍過度誇大，無主流研究支持。"
      why_not_c: "100 倍遠超任何機構估計，不切實際。"
    keywords: ["開發速度", "Forrester", "20倍"]
    exam_trap: false

  - id: L12102-Q02
    difficulty: 1
    question: "「供應商鎖定（Vendor Lock-in）」在 No Code / Low Code 情境中是指什麼？"
    options:
      a: "平台供應商限制使用者帳號數量，導致無法擴充團隊"
      b: "使用者無法將應用遷移至其他平台，因為平台通常不允許匯出原始碼"
      c: "供應商要求簽訂長期合約，不允許中途解約"
      d: "平台僅支援單一瀏覽器，限制終端使用者的存取方式"
    correct: b
    explanation:
      why_correct: "Vendor Lock-in 的核心問題是平台專有格式（Proprietary Format）讓應用邏輯、資料結構都綁在特定平台，無法輕易遷移，遷移等於從頭重寫。"
      why_not_a: "帳號數量限制是授權（licensing）問題，與 Vendor Lock-in 無關。"
      why_not_c: "合約條款是商業問題，Vendor Lock-in 指的是技術上的遷移困難。"
      why_not_d: "瀏覽器相容性是前端問題，與供應商鎖定完全不同。"
    keywords: ["Vendor Lock-in", "供應商鎖定", "平台遷移"]
    exam_trap: false

  - id: L12102-Q03
    difficulty: 1
    question: "「影子 IT（Shadow IT）」在 No Code / Low Code 應用情境中是指什麼現象？"
    options:
      a: "IT 部門在未獲管理層授權下自行採購雲端服務"
      b: "駭客利用 LCNC 平台漏洞入侵企業內部系統"
      c: "非 IT 部門自行使用 LCNC 工具建置系統，未經 IT 部門監管與治理"
      d: "企業刻意隱藏 IT 支出以規避預算審查"
    correct: c
    explanation:
      why_correct: "Shadow IT 是非 IT 部門員工自行使用工具（包含 LCNC 平台）建置應用，繞過 IT 治理流程，導致安全與合規風險。"
      why_not_a: "IT 部門自行採購是另一種治理問題，Shadow IT 強調的是非 IT 部門的自主行為。"
      why_not_b: "駭客入侵屬於資安攻擊（Security Breach），不是 Shadow IT 概念。"
      why_not_d: "隱藏 IT 支出是財務問題，與 Shadow IT 的技術治理概念無關。"
    keywords: ["Shadow IT", "影子IT", "治理風險"]
    exam_trap: false

  - id: L12102-Q04
    difficulty: 1
    question: "下列何者屬於 No Code / Low Code 的優勢？"
    options:
      a: "無限制的客製化彈性，任何複雜邏輯都能實作"
      b: "保證高并發場景下的企業級效能"
      c: "完全免除資料安全與合規的疑慮"
      d: "降低對專業工程師的依賴，讓業務人員也能建置應用"
    correct: d
    explanation:
      why_correct: "賦能業務人員（Business Empowerment）是 LCNC 的核心優勢之一——讓非技術背景的員工也能建置應用，降低對工程師的依賴。"
      why_not_a: "客製化受限（Customization Constraints）恰恰是 LCNC 的主要限制，複雜邏輯難以實現。"
      why_not_b: "擴展性瓶頸（Scalability Bottleneck）是 LCNC 的重要限制，無法保證高并發效能。"
      why_not_c: "資安隱私疑慮（Security & Privacy Risks）是 LCNC 的限制之一，資料存於第三方平台有合規風險。"
    keywords: ["LCNC優勢", "業務賦能", "Business Empowerment"]
    exam_trap: false

  - id: L12102-Q05
    difficulty: 1
    question: "「技術債（Technical Debt）」在 LCNC 開發中最常見的成因是什麼？"
    options:
      a: "為了快速交付（如 MVP 上線）而不斷疊加功能卻從未重構，導致後續維護困難"
      b: "使用 LCNC 平台需要支付的授權費用"
      c: "LCNC 平台底層架構缺乏安全機制"
      d: "企業購買 LCNC 平台後尚未攤提的固定資產折舊"
    correct: a
    explanation:
      why_correct: "技術債是快速開發的副作用——MVP 上線後需求持續增加，在原有基礎上疊加功能但從不重構，最終系統越來越混亂，維護成本飆升。"
      why_not_b: "授權費用是直接的營運支出（OpEx），不是技術債概念。"
      why_not_c: "技術債與平台安全機制無關，而是使用者的開發行為造成的。"
      why_not_d: "固定資產折舊是會計概念，與技術債完全無關。"
    keywords: ["技術債", "Technical Debt", "MVP", "重構"]
    exam_trap: false

  - id: L12102-Q06
    difficulty: 1
    question: "在 No Code / Low Code 的場景選擇上，「安全選 Low，簡單選 No」是指什麼原則？"
    options:
      a: "Low Code 適合高安全合規需求（如金融、醫療），No Code 適合簡單標準化需求"
      b: "Low Code 的操作比 No Code 更安全，所有情況都應優先選 Low Code"
      c: "No Code 適合所有簡單場景，Low Code 只適合高難度場景"
      d: "安全場域不能使用任何 LCNC 工具"
    correct: a
    explanation:
      why_correct: "判斷原則：有法規或資安約束（金融、醫療個資法）→ 選 Low Code（可加程式碼層級合規控制）；標準化流程、快速迭代（教育表單、新創 MVP）→ 選 No Code（門檻最低最快）。"
      why_not_b: "Low Code 不是永遠「更安全」，No Code 也有適合的場景，關鍵是「場景需求」。"
      why_not_c: "選擇標準是安全合規需求，不只是難度高低。"
      why_not_d: "安全場域可以使用 LCNC，尤其是 Low Code（因為可用程式碼實現合規控制）。"
    keywords: ["安全選Low", "簡單選No", "場域選擇"]
    exam_trap: false

  # ============================================================
  # Difficulty 2 — Understand (Bloom's: 理解) — 7 questions
  # ============================================================

  - id: L12102-Q07
    difficulty: 2
    question: "關於 No Code / Low Code 的成本優勢，下列敘述何者最完整正確？"
    options:
      a: "LCNC 節省的只有工程師薪資成本"
      b: "LCNC 雖省了人力，但平台授權費使 TCO 比傳統開發更高"
      c: "LCNC 的成本優勢只在導入初期，長期 TCO 與傳統開發相同"
      d: "LCNC 壓縮了人力、時間、維護與試錯等整個開發生命週期的成本"
    correct: d
    explanation:
      why_correct: "LCNC 的成本優勢體現在完整的開發生命週期（Development Lifecycle）：人力成本（少工程師）、時間成本（快 20 倍）、維護成本（平台負責底層）、試錯成本（失敗成本低）。"
      why_not_a: "「只有工程師薪資」過度窄化，LCNC 節省的是整個生命週期多種類型的成本。"
      why_not_b: "此選項描述了 TCO（Total Cost of Ownership，總持有成本）考量，是需要注意的陷阱，但並非 LCNC「成本優勢」的核心定義。"
      why_not_c: "LCNC 的成本優勢並不僅限於初期，維護與迭代階段同樣有成本差異。"
    keywords: ["成本節省", "TCO", "開發生命週期"]
    exam_trap: false

  - id: L12102-Q08
    difficulty: 2
    question: "下列關於 Vendor Lock-in 影響的敘述，何者最完整？"
    options:
      a: "Vendor Lock-in 只是遷移成本的問題，只要預算足夠就能解決"
      b: "Vendor Lock-in 影響遷移成本、技術策略自主性、資料遺失風險與服務中斷，是多維度問題"
      c: "Vendor Lock-in 只存在於 No Code 平台，Low Code 因可匯出程式碼所以沒有此問題"
      d: "Vendor Lock-in 只影響 IT 部門，業務部門不受影響"
    correct: b
    explanation:
      why_correct: "Vendor Lock-in 是多維度問題：直接遷移成本、技術策略自主性（Strategic Autonomy）喪失、資料格式不相容的遺失風險、遷移期間服務中斷、以及換到新平台可能又產生新的鎖定。"
      why_not_a: "「只是成本問題」是常見陷阱。Vendor Lock-in 的核心問題是技術策略自主性喪失，不只是金錢問題。"
      why_not_c: "Low Code 平台即使允許匯出，程式碼仍高度依賴原廠套件，同樣存在 Vendor Lock-in 風險，只是程度不同。"
      why_not_d: "Vendor Lock-in 影響整個企業的技術策略，業務部門也會受到應用無法遷移的影響。"
    keywords: ["Vendor Lock-in", "技術策略自主性", "遷移成本"]
    exam_trap: true

  - id: L12102-Q09
    difficulty: 2
    question: "下列關於 Low Code 平台中「模型（Model）」概念的說明，何者正確？"
    options:
      a: "模型是指平台內建的機器學習演算法"
      b: "模型是指平台的商業授權定價方案"
      c: "模型是指使用者建立的資料庫備份檔案"
      d: "模型用來抽象描述資料結構、業務流程與介面邏輯，是 Low Code 的核心設計概念"
    correct: d
    explanation:
      why_correct: "在 Low Code 平台中，「模型（Model）」是核心概念，用來抽象描述資料結構（Data Model）、業務流程（Process Model）與介面邏輯（UI Model），讓開發者以視覺化方式定義應用架構。此概念曾在 114 年第四次初級考試出現。"
      why_not_a: "機器學習演算法是 ML/AI 領域的模型概念，與 Low Code 平台的「模型」定義不同——這正是常考的陷阱。"
      why_not_b: "定價方案是商業概念，與 Low Code 平台架構設計無關。"
      why_not_c: "資料庫備份是資料管理操作，不是 Low Code 的「模型」定義。"
    keywords: ["模型", "Model", "Low Code平台", "資料模型"]
    exam_trap: true

  - id: L12102-Q10
    difficulty: 2
    question: "「公民開發者（Citizen Developer）」與「影子 IT（Shadow IT）」最關鍵的差別是什麼？"
    options:
      a: "公民開發者使用 No Code 工具，影子 IT 使用 Low Code 工具"
      b: "公民開發者是在 IT 部門核可的治理框架下開發，影子 IT 則是未經核可的自主建置"
      c: "公民開發者只存在大企業，影子 IT 只存在中小企業"
      d: "兩者本質相同，只是名稱不同"
    correct: b
    explanation:
      why_correct: "判斷標準是「是否經過 IT 核可」。公民開發者在企業核可工具清單與治理框架下自主開發（核可，正面）；Shadow IT 是繞過 IT 監管的自行建置（未核可，負面風險）。口訣：核可 = 公民開發者，未核可 = 影子 IT。"
      why_not_a: "工具類型不是判斷標準，兩者都可能使用 No Code 或 Low Code 工具。"
      why_not_c: "兩種現象不分企業規模，大企業同樣有 Shadow IT，中小企業也可建立公民開發者制度。"
      why_not_d: "兩者本質完全不同：公民開發者是企業鼓勵的正式角色，Shadow IT 是需要管控的風險行為。"
    keywords: ["Citizen Developer", "Shadow IT", "IT治理", "核可"]
    exam_trap: false

  - id: L12102-Q11
    difficulty: 2
    question: "No Code / Low Code 如何與「AI 民主化（AI Democratization）」產生關聯？"
    options:
      a: "LCNC 是 AI 民主化的關鍵推手，讓非技術人員也能建置 AI 應用，但不代表不需要人類監督"
      b: "AI 民主化是指 AI 技術完全開源，LCNC 與此無關"
      c: "LCNC 讓 AI 完全自動化，從此不需要人類介入"
      d: "AI 民主化要求所有 AI 模型都必須透過 LCNC 平台部署"
    correct: a
    explanation:
      why_correct: "LCNC 平台（如 Google AppSheet + AI、Power Apps Copilot）降低了 AI 使用與開發門檻，是 AI 民主化的重要推手。但 AI 民主化不代表不需要人類——業務判斷、資料品質把關、AI 偏差（Bias）監督仍需人工。"
      why_not_b: "AI 民主化核心是降低使用門檻，LCNC 與 AI 民主化高度相關。"
      why_not_c: "「完全不需要人類介入」是常見考試陷阱，必須避免。"
      why_not_d: "AI 民主化不限制 AI 的部署方式，LCNC 只是途徑之一。"
    keywords: ["AI民主化", "AI Democratization", "人類監督"]
    exam_trap: false

  - id: L12102-Q12
    difficulty: 2
    question: "No Code / Low Code 的「客製化受限（Customization Constraints）」限制，主要體現在哪個情境？"
    options:
      a: "視覺化工具難以實現超出平台設計範圍的複雜邏輯或深層巢狀條件"
      b: "平台授權費過高，企業無法負擔完整功能"
      c: "平台無法連接任何外部 API"
      d: "使用者介面設計風格單一，無法自訂外觀"
    correct: a
    explanation:
      why_correct: "客製化受限的核心是：NC/LC 平台的視覺化設計器難以表達深層巢狀邏輯（Nested Logic）或超出平台預設能力的複雜業務規則，如多層條件分支、複雜演算法等。"
      why_not_b: "授權費是成本問題，不是客製化限制。"
      why_not_c: "多數 NC/LC 平台支援 API 串接（Zapier 就是靠 API 串接服務），「無法連接任何 API」是常見誤解。"
      why_not_d: "部分 NC/LC 平台確實在 UI 客製化上有限制，但客製化受限的核心含義是「複雜邏輯難以實現」，而非外觀限制。"
    keywords: ["客製化受限", "複雜邏輯", "巢狀邏輯"]
    exam_trap: false

  - id: L12102-Q13
    difficulty: 2
    question: "在 Build vs Buy vs NC/LC 決策框架中，何時最適合選擇「Build（傳統開發）」？"
    options:
      a: "需要快速驗證市場需求時"
      b: "標準化功能、快速部署時"
      c: "涉及企業核心競爭力、需要高度客製化的系統"
      d: "非核心流程自動化、快速上線時"
    correct: c
    explanation:
      why_correct: "Build（傳統開發）適合：涉及企業核心競爭力（護城河）、需要高度客製化（LCNC 做不到）、高效能核心系統（如金融交易引擎）。這些場景的技術要求超出 LCNC 的能力範圍。"
      why_not_a: "快速驗證市場需求是 NC/LC 的強項（快速原型、低試錯成本）。"
      why_not_b: "標準化功能快速部署最適合「Buy（購買軟體）」，如 HR 系統、CRM。"
      why_not_d: "非核心流程自動化是 NC/LC 的典型應用場景。"
    keywords: ["Build vs Buy", "決策框架", "核心競爭力"]
    exam_trap: false

  # ============================================================
  # Difficulty 3 — Apply (Bloom's: 應用) — 7 questions
  # ============================================================

  - id: L12102-Q14
    difficulty: 3
    question: "某台灣中小型電商公司（月營收 200 萬、無專職工程師）想在 1 個月內建置會員管理系統的 MVP，未來半年若驗證成功需支援 5,000 名會員。下列哪個方案最適合？"
    options:
      a: "使用 Low Code 平台（如 OutSystems）預先考慮擴展性"
      b: "外包給軟體公司以 Node.js 從頭開發，一步到位"
      c: "使用 No Code 平台（如 Airtable）快速搭建 MVP，後續視成長再遷移"
      d: "購買現成 CRM SaaS（如 HubSpot）直接使用標準功能"
    correct: c
    explanation:
      why_correct: "無工程師 + 1 個月時限 → 必須選 No Code。5,000 名會員在 Airtable 能力範圍內，MVP 階段不需要預先投資擴展性。記住「簡單選 No」：先驗證再遷移是精實創業核心思維。"
      why_not_a: "Low Code（如 OutSystems）學習曲線陡，無工程師的團隊 1 個月難以上手，屬於「過度設計」。"
      why_not_b: "外包開發通常需 3–6 個月，成本高，不符合 1 個月時限。"
      why_not_d: "CRM SaaS 月費較高，且標準功能可能無法完全符合電商會員管理的客製化需求。"
    keywords: ["場景應用", "MVP", "無工程師", "No Code"]
    exam_trap: false

  - id: L12102-Q15
    difficulty: 3
    question: "某企業的 HR 部門使用 No Code 工具建置了員工考勤系統，但未通知 IT 部門。這最可能引發哪個風險？"
    options:
      a: "技術債累積"
      b: "影子 IT（Shadow IT）"
      c: "供應商鎖定（Vendor Lock-in）"
      d: "API 相容性問題"
    correct: b
    explanation:
      why_correct: "HR 部門繞過 IT 部門自行建置系統，正是 Shadow IT 的典型案例——未經 IT 治理的應用導致資料安全、合規與系統整合風險。判斷依據：IT 不知情 + 未核可。"
      why_not_a: "技術債是關於程式碼品質問題，此情境核心是缺乏監管，屬於治理層面。"
      why_not_c: "Vendor Lock-in 是無法遷移平台的技術困境，此場景主要問題是監管缺失而非遷移困難。"
      why_not_d: "API 相容性是技術問題，此場景的風險本質是組織治理問題。"
    keywords: ["Shadow IT", "IT不知情", "治理風險"]
    exam_trap: false

  - id: L12102-Q16
    difficulty: 3
    question: "某大學社團（商管背景成員，無程式能力）想在兩週內推出活動報名系統 MVP。下列哪個策略最合理？"
    options:
      a: "用 No Code 平台快速搭建 MVP 驗證需求"
      b: "用 React + Node.js 從頭開發確保系統品質"
      c: "先花三個月學習程式設計再開始開發"
      d: "購買企業級 SaaS 方案滿足所有需求"
    correct: a
    explanation:
      why_correct: "商管背景 + 兩週時限 → No Code 是唯一在此條件下能快速推出 MVP 的選擇，符合精實創業的驗證理念。「簡單選 No」。"
      why_not_b: "React + Node.js 需要程式能力，商管背景團隊無法在兩週內完成。"
      why_not_c: "三個月學習週期遠超兩週時限。"
      why_not_d: "企業級 SaaS 成本高且功能冗餘，大學社團預算有限，MVP 階段不需要完整功能。"
    keywords: ["MVP", "No Code", "非技術使用者"]
    exam_trap: false

  - id: L12102-Q17
    difficulty: 3
    question: "某公司使用 Zapier 串接 CRM 與 Email 行銷系統，但發現無法實作「根據客戶過去 90 天購買行為動態調整推薦策略」的複雜條件分支邏輯。此情境最能反映 No Code 工具的哪個限制？"
    options:
      a: "供應商鎖定（Vendor Lock-in）"
      b: "客製化受限（複雜邏輯處理能力有限）"
      c: "影子 IT（Shadow IT）風險"
      d: "無法進行任何 API 串接"
    correct: b
    explanation:
      why_correct: "Zapier 等 No Code 工具在基本自動化流程表現出色，但面對複雜的條件分支邏輯（動態推薦策略）有明顯限制。這是客製化受限（Customization Constraints）的典型表現，也是常見考題。"
      why_not_a: "Vendor Lock-in 是遷移困難問題，此場景問題是功能不足，與遷移無關。"
      why_not_c: "Shadow IT 是治理問題，此場景未提及監管缺失。"
      why_not_d: "Zapier 以 API 串接為核心功能，「無法串接 API」是常見錯誤陷阱，正確答案是複雜邏輯有限制。"
    keywords: ["Zapier", "複雜邏輯限制", "客製化受限"]
    exam_trap: true

  - id: L12102-Q18
    difficulty: 3
    question: "某新創公司使用 No Code 平台快速上線後使用者大幅成長，系統開始出現效能問題。此時最適合的做法為何？"
    options:
      a: "評估核心瓶頸模組後，逐步將高負載模組遷移至傳統程式碼開發"
      b: "凍結新功能，全力以傳統方式重寫整個系統後再恢復服務"
      c: "繼續在 No Code 平台上升級方案，靠快取策略提升效能"
      d: "更換效能更好的 No Code 平台，同時遷移資料至新平台"
    correct: a
    explanation:
      why_correct: "漸進式遷移（Incremental Migration）是最務實的策略——先識別效能瓶頸的核心模組，將其改用傳統程式碼開發，其餘仍保留在 LCNC 平台，平衡效能需求與開發效率。"
      why_not_b: "全面重寫會讓產品在競爭中停滯數月，且中斷服務可能流失已驗證的市場。"
      why_not_c: "升級方案與快取只是暫時緩解，No Code 平台的擴展性天花板仍在，隨使用者增長終究會碰到瓶頸。"
      why_not_d: "更換平台要面對 Vendor Lock-in 的遷移困境，且新的 No Code 平台仍有 LCNC 共通的擴展性限制。"
    keywords: ["漸進式遷移", "擴展性瓶頸", "效能限制"]
    exam_trap: false

  - id: L12102-Q19
    difficulty: 3
    question: "醫院想建置掛號與病歷查詢系統，需符合個資法規定，且有複雜的科別分診邏輯。下列哪種開發方式最適合？"
    options:
      a: "No Code（門檻最低，最快上線）"
      b: "Low Code（可用程式碼實現合規控制，兼顧速度與安全）"
      c: "LCNC 完全不適合醫療場域，必須傳統開發"
      d: "外包即可，不需要考慮 LCNC 或傳統開發的差異"
    correct: b
    explanation:
      why_correct: "醫療場域有高安全合規需求（個資法、醫療法規），需要 Low Code 的程式碼擴展能力來實現加密存儲、存取日誌、權限分級等合規控制。「安全選 Low」。No Code 在資安客製化上能力有限。"
      why_not_a: "No Code 在資安客製化上力不從心，醫療法規要求的程式碼層級控制（如加密、稽核日誌）超出 No Code 能力。"
      why_not_c: "醫療業是 LCNC 採用最快的產業之一，法規嚴格不代表不能用 LCNC，而是需要選擇 Low Code。"
      why_not_d: "外包策略不能回答「用 LCNC 還是傳統開發」的核心問題，且外包方的工具選擇仍需這個原則。"
    keywords: ["醫療場域", "安全選Low", "個資法", "合規"]
    exam_trap: false

  - id: L12102-Q20
    difficulty: 3
    question: "某企業導入 LCNC 後，公民開發者數量從 10 人快速成長至 80 人，主管認為「公民開發者越多，數位轉型越成功」。此觀點最大的問題是什麼？"
    options:
      a: "公民開發者數量確實是數位轉型成功的最佳指標，觀點正確"
      b: "公民開發者不應超過 IT 部門人數，否則 IT 部門失去存在價值"
      c: "公民開發者增加若缺乏治理框架，會導致 Shadow IT 風險倍增、資料孤島與技術債失控"
      d: "公民開發者只應在 IT 全程監督下操作，不應有自主開發權限"
    correct: c
    explanation:
      why_correct: "「公民開發者越多越好」是常見考試陷阱。數量成長若缺乏配套治理框架（核准工具清單、資安審查流程、應用資產盤點），就從「賦能」變成「失控」——80 人各自建置形成 Shadow IT 叢林，資料分散成孤島，技術債快速累積。正確觀點是「數量 + 治理並重」。"
      why_not_a: "數量只是表面指標，沒有治理框架的成長可能帶來更大風險。"
      why_not_b: "Gartner 預測 80% LCNC 使用者來自非 IT 部門，IT 的角色是治理與賦能，不是限制人數。"
      why_not_d: "全程監督違背公民開發者核心價值，正確做法是建立框架後授權自主。"
    keywords: ["公民開發者治理", "Shadow IT", "治理框架"]
    exam_trap: true

  # ============================================================
  # Difficulty 4 — Analyze (Bloom's: 分析) — 3 questions
  # ============================================================

  - id: L12102-Q21
    difficulty: 4
    question: "比較 Vendor Lock-in 與 Shadow IT 兩大 LCNC 風險，下列分析何者最正確？"
    options:
      a: "Vendor Lock-in 是組織治理問題，Shadow IT 是技術架構問題"
      b: "兩者本質相同，都是因為使用 LCNC 而產生的安全漏洞"
      c: "Vendor Lock-in 是技術遷移困難，Shadow IT 是組織治理缺失，性質不同但可能同時存在"
      d: "Vendor Lock-in 只影響大企業，Shadow IT 只影響中小企業"
    correct: c
    explanation:
      why_correct: "Vendor Lock-in 本質是技術問題（無法匯出原始碼、遷移等於重寫）；Shadow IT 本質是組織治理問題（非 IT 部門繞過監管自建系統）。兩者可同時發生——例如非 IT 部門自建的系統（Shadow IT）又被鎖定在特定平台（Vendor Lock-in）。"
      why_not_a: "選項顛倒了兩者的性質。Vendor Lock-in 是技術遷移問題，Shadow IT 才是組織治理問題。"
      why_not_b: "兩者性質完全不同，不能混為一談。"
      why_not_d: "兩種風險不分企業規模，大企業同樣有 Shadow IT，中小企業也會遇到 Vendor Lock-in。"
    keywords: ["Vendor Lock-in", "Shadow IT", "風險比較"]
    exam_trap: true

  - id: L12102-Q22
    difficulty: 4
    question: "某企業同時面臨兩個需求：(1) 行銷部門需快速建置促銷活動頁面；(2) 核心交易系統需處理每秒數千筆訂單。下列開發策略最合理的是？"
    options:
      a: "兩個需求都使用 No Code 以統一技術標準"
      b: "兩個需求都使用傳統程式碼確保品質一致"
      c: "核心交易系統用 No Code，活動頁面用傳統開發"
      d: "活動頁面用 No Code 快速建置，核心交易系統用傳統程式碼開發"
    correct: d
    explanation:
      why_correct: "依場景特性選工具：活動頁面需快速上線、變動頻繁 → No Code（簡單選 No）；核心交易系統高并發需求 → 傳統開發（核心選 Traditional）。LCNC 與傳統開發是互補關係。"
      why_not_a: "核心交易系統的高并發需求超出 No Code 能力範圍，統一 No Code 會導致效能問題。"
      why_not_b: "活動頁面用傳統開發浪費資源，不符合快速上線需求。"
      why_not_c: "完全錯配——把 No Code 用在最需要效能的系統，傳統開發用在最需要速度的頁面。"
    keywords: ["場景匹配", "混合策略", "擴展性"]
    exam_trap: false

  - id: L12102-Q23
    difficulty: 4
    question: "某企業各部門紛紛使用不同 No Code 工具自建系統，半年後 IT 部門發現已有超過 30 個未受管理的應用。下列哪個風險組合最能描述此情境？"
    options:
      a: "僅有技術債問題"
      b: "僅有 Vendor Lock-in 問題"
      c: "僅有 API 相容性問題"
      d: "Shadow IT 導致安全與合規風險，並可能同時產生多重 Vendor Lock-in"
    correct: d
    explanation:
      why_correct: "各部門自建且未經 IT 監管（Shadow IT）；使用不同平台又造成多重 Vendor Lock-in。兩個風險疊加——安全合規無人把關，且未來整合或遷移都極為困難。"
      why_not_a: "技術債可能存在，但核心問題是 Shadow IT 與分散平台鎖定，不只是程式碼品質問題。"
      why_not_b: "Vendor Lock-in 只是問題的一部分，更根本的問題是 Shadow IT（30 個未受管理的應用）。"
      why_not_c: "API 相容性只是表面現象，根本原因是缺乏統一 IT 治理策略。"
    keywords: ["Shadow IT", "Vendor Lock-in", "風險疊加"]
    exam_trap: false

  # ============================================================
  # Difficulty 5 — Evaluate/Create (Bloom's: 評鑑/創造) — 2 questions
  # ============================================================

  - id: L12102-Q24
    difficulty: 5
    question: "某台灣中型零售企業面臨三項約束：(1) IT 部門僅 3 人；(2) 需在 2 個月內上線會員系統；(3) 年營業額超過 5 億需符合資安法規。下列策略最能同時滿足三項條件的是？"
    options:
      a: "全面採用 No Code，由業務部門自行開發，IT 部門專注資安審查"
      b: "延後上線至 IT 部門擴編完成，以傳統方式開發確保合規"
      c: "使用 Low Code，業務部門負責主要流程搭建，IT 3 人專注資安合規審查與少量客製程式碼"
      d: "外包給軟體公司全權開發，IT 部門完全不參與"
    correct: c
    explanation:
      why_correct: "資安法規是硬約束，「安全選 Low」。Low Code 讓業務部門拖拉搭建主要流程（解決人力與時限），同時 IT 3 人可用少量程式碼加入資安控制（加密、權限、稽核日誌）確保合規。No Code 在資安客製化上力不從心。"
      why_not_a: "No Code 在資安客製化能力有限，面對資安法規要求（加密、存取日誌、權限分級），缺乏程式碼層級控制。"
      why_not_b: "延後無法滿足 2 個月時限，IT 擴編本身需要更長時間。"
      why_not_d: "外包且 IT 完全不參與會造成嚴重資安合規風險，不符合年營業額超過 5 億的法規要求。"
    keywords: ["多約束評估", "IT治理", "資安合規", "Low Code"]
    exam_trap: false

  - id: L12102-Q25
    difficulty: 5
    question: "某金融科技公司想導入 LCNC，主管有三項顧慮：(1) 客戶個資保護（法規要求）；(2) 核心交易邏輯的效能需求；(3) 業務部門的快速開發需求。下列架構設計最能同時回應三項顧慮的是？"
    options:
      a: "全部使用傳統開發，確保安全與效能，犧牲開發速度"
      b: "全部使用 LCNC，以開發速度為最高優先"
      c: "採用分層架構：LCNC 用於業務部門前端應用與流程自動化，核心交易與資料處理用傳統開發，IT 部門建立統一資安治理框架"
      d: "外包核心系統開發，內部只用 LCNC 做非關鍵應用"
    correct: c
    explanation:
      why_correct: "分層架構（Layered Architecture）是最佳解：LCNC 滿足業務部門快速開發需求（回應第 3 點）、核心交易用傳統開發確保效能（回應第 2 點）、統一資安治理框架保護客戶個資（回應第 1 點）。三者兼顧，無需犧牲任何一項。"
      why_not_a: "全部傳統開發確實安全，但犧牲業務部門敏捷性，未回應第 3 項快速開發需求。"
      why_not_b: "全部 LCNC 無法滿足金融業效能要求和嚴格個資法規，風險過高。"
      why_not_d: "外包核心系統讓企業失去關鍵技術掌控力，外包方的資安管控可能不符合金融法規要求。"
    keywords: ["分層架構", "金融科技", "資安治理", "多約束"]
    exam_trap: false
