topic: L11401
topic_name: 鑑別式AI與生成式AI的基本原理
level: beginner
questions:
  - id: L11401-Q01
    stem: "鑑別式AI（Discriminative AI）的核心任務是什麼？"
    options:
      a: "生成全新的圖像和文字內容"
      b: "學習資料的整體分布以模擬新樣本"
      c: "對輸入資料進行分類或數值預測"
      d: "透過多個模型相互對抗來提升品質"
    answer: "c"
    explanation: "鑑別式AI的核心是找到決策邊界，將輸入資料分類到對應類別或預測數值。生成全新內容（選項a/b）是生成式AI的任務；多模型對抗（選項d）是GAN的概念。"
    difficulty: 1
    tags: ["discriminative-ai", "core-task"]

  - id: L11401-Q02
    stem: "下列哪個模型屬於生成式AI（Generative AI）？"
    options:
      a: "支援向量機（SVM）"
      b: "邏輯迴歸（Logistic Regression）"
      c: "隨機森林（Random Forest）"
      d: "生成對抗網路（GAN）"
    answer: "d"
    explanation: "GAN（Generative Adversarial Network，生成對抗網路）是典型的生成式模型，名字第一個字 Generative 就說明了它的任務。SVM、邏輯迴歸、隨機森林都是鑑別式模型，用於分類或預測，不生成新內容。"
    difficulty: 1
    tags: ["model-classification", "gan", "discriminative-vs-generative"]

  - id: L11401-Q03
    stem: "下列哪個說法正確描述了「幻覺（Hallucination）」？"
    options:
      a: "鑑別式AI將資料誤分類到錯誤的類別"
      b: "生成式AI生成了看似合理但實際上是錯誤或虛構的資訊"
      c: "模型在訓練資料上表現太好，卻在新資料上失敗"
      d: "部署後真實世界資料和訓練資料產生差距"
    answer: "b"
    explanation: "幻覺（Hallucination）是生成式AI的主要缺陷：模型生成看似合理但實際上錯誤或虛構的資訊，且通常語氣非常自信。選項a是分類錯誤；選項c是過度擬合；選項d是資料漂移。"
    difficulty: 1
    tags: ["hallucination", "generative-ai", "limitations"]

  - id: L11401-Q04
    stem: "以下哪種部署方式最適合對延遲要求極低的工廠產線即時瑕疵檢測系統？"
    options:
      a: "雲端部署（Cloud Deployment）"
      b: "邊緣部署（Edge Deployment）"
      c: "內部部署（On-Premise Deployment）"
      d: "以上皆可，延遲差異不大"
    answer: "b"
    explanation: "邊緣部署在靠近資料來源的設備上直接運行模型，延遲極低，不需要網路往返。工廠產線即時檢測需要毫秒級回應，雲端部署需要資料傳輸有延遲，不適合即時場景。"
    difficulty: 1
    tags: ["model-deployment", "edge-deployment", "latency"]

  - id: L11401-Q05
    stem: "「概念驗證（PoC，Proof of Concept）」在 AI 導入流程中主要的目的是什麼？"
    options:
      a: "在模型上線後持續監控其效能變化"
      b: "在投入大量資源前，用小規模實驗確認方向可行"
      c: "選擇最終的模型部署方式"
      d: "計算模型的推理成本"
    answer: "b"
    explanation: "PoC（概念驗證）是上線前的小規模可行性測試，目的是在大量投入前確認方向正確。選項a是部署後監控；選項c和d是後續決策，不是PoC的主要目的。"
    difficulty: 1
    tags: ["poc", "testing-validation"]

  - id: L11401-Q06
    stem: "鑑別式AI最主要的資料需求是什麼？"
    options:
      a: "需要大量未標註的資料"
      b: "需要有標註的資料（Labeled Data）"
      c: "不需要任何訓練資料"
      d: "只需要少量的強化學習反饋"
    answer: "b"
    explanation: "鑑別式AI透過監督式學習找決策邊界，需要每筆資料都附上正確的標籤（答案）。生成式AI才可以使用未標註的資料。"
    difficulty: 1
    tags: ["discriminative-ai", "labeled-data", "supervised-learning"]

  - id: L11401-Q07
    stem: "「VAE（Variational Autoencoder，變分自動編碼器）」屬於哪種類型的 AI 模型？"
    options:
      a: "鑑別式AI，因為名字有 Encoder"
      b: "強化學習模型"
      c: "生成式AI，學習資料分布後能生成新資料"
      d: "半監督式學習模型"
    answer: "c"
    explanation: "VAE（變分自動編碼器）是生成式模型，儘管名字包含 Encoder，但它的目的是學習資料的潛在分布並生成新樣本。這是常見的考試陷阱——名字有 Autoencoder 不代表是鑑別式。"
    difficulty: 1
    tags: ["vae", "generative-ai", "model-classification"]

  - id: L11401-Q08
    stem: "生成式AI的「學習邏輯」與鑑別式AI最大的不同是什麼？"
    options:
      a: "生成式AI學習找到最佳的決策邊界"
      b: "生成式AI學習資料的整體分布（Data Distribution）"
      c: "生成式AI只使用監督式學習"
      d: "生成式AI需要更多標註資料"
    answer: "b"
    explanation: "鑑別式AI學習找決策邊界（區分類別的線）；生成式AI學習資料分布（資料整體長什麼樣子），然後從這個分布中生成新樣本。"
    difficulty: 1
    tags: ["generative-ai", "data-distribution", "discriminative-vs-generative"]

  - id: L11401-Q09
    stem: "下列哪個效能指標描述的是「模型從收到輸入到開始回應所需的時間」？"
    options:
      a: "吞吐量（Throughput）"
      b: "延遲（Latency）"
      c: "成本（Cost）"
      d: "有效吞吐量（Goodput）"
    answer: "b"
    explanation: "延遲（Latency）是從輸入資料到模型開始回應所經過的時間，直接影響使用者體驗。吞吐量是單位時間的處理量；成本是費用；有效吞吐量是維持品質下的真實產出量。"
    difficulty: 1
    tags: ["performance-management", "latency"]

  - id: L11401-Q10
    stem: "「資料漂移（Data Drift）」最容易在什麼時候出現？"
    options:
      a: "模型訓練階段，資料清理不完整時"
      b: "模型上線前的測試驗證階段"
      c: "模型部署後，真實世界資料隨時間改變時"
      d: "選擇模型架構的設計階段"
    answer: "c"
    explanation: "資料漂移是部署後才出現的問題：真實世界的資料隨時間變化，和原先的訓練資料產生差距，導致模型效能下降。這是模型監控的重要議題，不是上線前的問題。"
    difficulty: 1
    tags: ["data-drift", "model-monitoring", "performance-management"]

  - id: L11401-Q11
    stem: "某公司的信用卡詐騙偵測系統，在 100,000 筆交易中只有 50 筆是詐騙。若模型把所有交易都預測為「正常」，正確率（Accuracy）約為 99.95%，但這個模型有什麼根本問題？"
    options:
      a: "正確率太低，無法使用"
      b: "沒有問題，99.95% 的正確率已經很高了"
      c: "模型漏掉了所有真實詐騙交易，Recall（召回率）為 0%"
      d: "過度擬合，需要更多訓練資料"
    answer: "c"
    explanation: "這是不平衡資料陷阱。當資料極端不平衡時，全猜多數類別也有超高正確率，但模型對少數類別（詐騙）毫無辨識能力。Recall = 真正詐騙中模型抓到的比例 = 0/50 = 0%。詐騙偵測應優先看 Recall。"
    difficulty: 2
    tags: ["recall", "imbalanced-data", "accuracy-trap", "discriminative-ai"]

  - id: L11401-Q12
    stem: "GPT 系列模型（如 GPT-4）屬於哪種架構，主要用於什麼任務？"
    options:
      a: "Encoder-only（僅編碼器），主要用於文字理解和分類"
      b: "Encoder-Decoder，主要用於機器翻譯"
      c: "Decoder-only（僅解碼器），主要用於文字生成"
      d: "雙向（Bidirectional）架構，主要用於填空預測"
    answer: "c"
    explanation: "GPT（Generative Pre-trained Transformer，生成式預訓練變換器）系列採用 Decoder-only 架構，透過自迴歸方式（預測下一個 token）生成文字，屬於生成式AI。Encoder-only 雙向架構是 BERT；Encoder-Decoder 是機器翻譯模型如 T5。"
    difficulty: 2
    tags: ["gpt", "llm", "decoder-only", "architecture"]

  - id: L11401-Q13
    stem: "BERT（Bidirectional Encoder Representations from Transformers，雙向編碼器表徵）與 GPT 最主要的架構差異是什麼？"
    options:
      a: "BERT 是 Decoder-only，GPT 是 Encoder-only"
      b: "BERT 是雙向（Bidirectional）Encoder，GPT 是單向 Decoder"
      c: "BERT 用於圖像生成，GPT 用於文字分類"
      d: "BERT 和 GPT 架構完全相同，只是訓練資料不同"
    answer: "b"
    explanation: "BERT 採用 Encoder-only 雙向架構，同時看一個句子的左右文字，擅長文字理解和分類；GPT 採用 Decoder-only 單向架構，從左到右自迴歸生成文字。兩者架構根本不同。"
    difficulty: 2
    tags: ["bert", "gpt", "llm", "architecture", "bidirectional"]

  - id: L11401-Q14
    stem: "「基礎模型（Foundation Model）」的主要特點是什麼？"
    options:
      a: "只能解決單一特定任務，不適合跨領域應用"
      b: "在大規模資料上預訓練，可透過微調適應多種下游任務"
      c: "不需要訓練，直接使用規則庫回答問題"
      d: "僅用於圖像識別，不適用於文字任務"
    answer: "b"
    explanation: "基礎模型（Foundation Model）的核心概念：在海量資料上做大規模預訓練（Pre-training），獲得通用能力，然後用少量任務資料進行微調（Fine-tuning），快速適應特定應用。ChatGPT、GPT-4、BERT 都是基礎模型。"
    difficulty: 2
    tags: ["foundation-model", "pre-training", "fine-tuning"]

  - id: L11401-Q15
    stem: "「微調（Fine-tuning）」與「提示工程（Prompt Engineering）」的主要差異是什麼？"
    options:
      a: "微調不改變模型參數，只改變輸入；提示工程改變模型參數"
      b: "微調改變模型的權重參數；提示工程不改變模型，只改變輸入指令"
      c: "兩者都需要重新訓練模型架構"
      d: "微調適合通用任務；提示工程適合特定領域任務"
    answer: "b"
    explanation: "微調（Fine-tuning）使用少量標記資料繼續訓練，更新模型的權重參數；提示工程（Prompt Engineering）不改變模型本身，只透過設計輸入指令來引導模型輸出。微調成本高但效果好；提示工程成本低但依賴設計技巧。"
    difficulty: 2
    tags: ["fine-tuning", "prompt-engineering", "foundation-model"]

  - id: L11401-Q16
    stem: "某醫院要導入一個分析病患 CT 影像的 AI 系統，該系統的訓練資料和模型都高度機密，且不能讓病患資料離開醫院的資訊系統。最適合的部署方式是？"
    options:
      a: "雲端部署，因為需要大量算力"
      b: "邊緣部署，因為 CT 機台需要即時回應"
      c: "內部部署（On-Premise），因為資料機密且不能離場"
      d: "混合架構，雲端訓練後部署到 CT 機台"
    answer: "c"
    explanation: "病患醫療資料高度機密，且法規要求不能離場，內部部署（On-Premise）將模型放在醫院自己的伺服器上運行，資料完全不離場。雖然初期投資高，但符合安全和法規需求。"
    difficulty: 2
    tags: ["model-deployment", "on-premise", "data-security"]

  - id: L11401-Q17
    stem: "擴散模型（Diffusion Model）主要用於哪種類型的任務？它屬於哪種 AI 類別？"
    options:
      a: "文字分類；鑑別式AI"
      b: "圖像生成；生成式AI"
      c: "異常偵測；鑑別式AI"
      d: "語音辨識；鑑別式AI"
    answer: "b"
    explanation: "擴散模型（Diffusion Model）是生成式AI，主要用於高品質圖像生成（如 Stable Diffusion、DALL-E 3 使用的核心技術）。概念是逐步去雜訊以生成圖像。初級只需知道它是生成式且用於圖像生成。"
    difficulty: 2
    tags: ["diffusion-model", "generative-ai", "image-generation"]

  - id: L11401-Q18
    stem: "在效能管理中，「吞吐量（Throughput）」描述的是什麼？"
    options:
      a: "模型從收到輸入到開始回應所需的時間"
      b: "運行模型所需的計算費用"
      c: "單位時間內模型能處理或生成的數量"
      d: "模型訓練完成需要的總時間"
    answer: "c"
    explanation: "吞吐量（Throughput）是系統在單位時間內能處理/產出的量（如每秒回答的請求數、每秒生成的 token 數），越高代表系統服務能力越強。延遲是等待時間；成本是費用；訓練時間不是吞吐量的定義。"
    difficulty: 2
    tags: ["performance-management", "throughput"]

  - id: L11401-Q19
    stem: "為什麼「過度擬合（Overfitting）」的模型在實際使用時效果不佳？"
    options:
      a: "模型太簡單，無法學到資料的規律（高偏差）"
      b: "模型記住了訓練資料的細節和雜訊，無法泛化到未見過的新資料（高變異）"
      c: "模型的訓練資料量太少，學不到足夠的知識"
      d: "模型沒有足夠的計算資源進行訓練"
    answer: "b"
    explanation: "過度擬合（Overfitting）= 高變異（High Variance）= 模型把訓練資料的細節甚至雜訊都記下來，對訓練資料表現很好，但對未見過的新資料泛化能力差。模型太簡單是欠擬合（Underfitting）= 高偏差。"
    difficulty: 2
    tags: ["overfitting", "bias-variance", "testing-validation"]

  - id: L11401-Q20
    stem: "多模態AI（Multimodal AI）的定義是什麼？"
    options:
      a: "只能處理單一類型資料但有多種模型版本的 AI"
      b: "能同時處理和理解多種媒體類型（如文字、圖像、音頻）的 AI"
      c: "使用多個獨立模型分別處理不同任務的 AI 系統"
      d: "專門用於多國語言翻譯的 AI"
    answer: "b"
    explanation: "多模態AI（Multimodal AI）能同時接受和處理多種媒體類型（文字+圖像+音頻等）。例如 GPT-4o 能看圖回答問題（視覺+語言），Gemini Ultra 能理解影片內容（視覺+音頻+語言）。"
    difficulty: 2
    tags: ["multimodal-ai", "generative-ai"]

  - id: L11401-Q21
    stem: "某 AI 助理在回答用戶關於台灣法律的問題時，引用了一篇「2025 年《人工智慧應用法》第 42 條」——但這條法律根本不存在。這種現象叫什麼？如何避免？"
    options:
      a: "資料漂移（Data Drift）；定期更新訓練資料"
      b: "過度擬合（Overfitting）；增加訓練資料多樣性"
      c: "幻覺（Hallucination）；建立人工審核或使用 RAG 檢索實際文件"
      d: "偏差問題（Bias）；去除訓練資料中的偏見"
    answer: "c"
    explanation: "AI 生成看似合理但實際虛構的法條引用，這是幻覺（Hallucination）。常見的緩解方法包括人工審核輸出、使用 RAG（Retrieval-Augmented Generation）讓模型引用真實文件，以及提醒用戶核實 AI 提供的事實性資訊。"
    difficulty: 2
    tags: ["hallucination", "generative-ai", "limitations"]

  - id: L11401-Q22
    stem: "「即時推論（Real-time Inference）」和「批次推論（Batch Inference）」的最主要差異是什麼？"
    options:
      a: "即時推論使用更大的模型；批次推論使用較小的模型"
      b: "即時推論每個請求立刻回應；批次推論累積一批後一次處理"
      c: "即時推論在雲端執行；批次推論在邊緣執行"
      d: "兩者沒有實質差異，只是名稱不同"
    answer: "b"
    explanation: "即時推論（Real-time Inference）每個請求到達立刻回應，延遲低，適合聊天機器人、即時偵測；批次推論（Batch Inference）累積一批資料再一次處理，效率高但不即時，適合每日報表、大量郵件分類。"
    difficulty: 2
    tags: ["model-deployment", "real-time-inference", "batch-inference"]

  - id: L11401-Q23
    stem: "GAN（Generative Adversarial Network，生成對抗網路）中包含哪兩個關鍵角色？"
    options:
      a: "編碼器（Encoder）和解碼器（Decoder）"
      b: "生成器（Generator）和鑑別器（Discriminator）"
      c: "訓練器（Trainer）和評估器（Evaluator）"
      d: "輸入層（Input Layer）和輸出層（Output Layer）"
    answer: "b"
    explanation: "GAN（生成對抗網路）包含兩個角色：生成器（Generator）負責生成假資料，鑑別器（Discriminator）負責判斷資料是真實還是偽造，兩者相互對抗訓練。初級考試需記住有這兩個角色，但不需了解訓練細節。"
    difficulty: 2
    tags: ["gan", "generator", "discriminator", "generative-ai"]

  - id: L11401-Q24
    stem: "推理成本（Inference Cost）與訓練成本（Training Cost）的主要差異是什麼？"
    options:
      a: "訓練成本持續累積；推理成本是一次性的"
      b: "訓練成本是一次性的；推理成本隨使用量持續累積"
      c: "兩者都是一次性成本，訓練完就不用再付錢"
      d: "只有訓練成本，推理不需要計算資源"
    answer: "b"
    explanation: "訓練成本是一次性的（訓練完就結束）；推理成本是持續性的（每次呼叫模型都在累積費用）。對大規模 AI 應用，推理成本才是長期最大的開銷。常見陷阱：以為訓練完就不用花錢。"
    difficulty: 2
    tags: ["performance-management", "inference-cost", "training-cost"]

  - id: L11401-Q25
    stem: "下列哪個情境最適合使用「混合架構（Hybrid Deployment）」？"
    options:
      a: "只需要處理少量資料的小型個人應用"
      b: "模型訓練需要大量算力，但推理需要在工廠現場即時執行"
      c: "所有資料都可以傳到雲端，不需要任何本地處理"
      d: "只需要做一次預測，之後不再使用模型"
    answer: "b"
    explanation: "混合架構最典型的使用情境是「雲端訓練 + 邊緣推理」：大型模型訓練需要大量 GPU（適合雲端），但部署後的推理需要在現場即時執行（適合邊緣），兩者取其優點。"
    difficulty: 2
    tags: ["hybrid-deployment", "model-deployment"]

  - id: L11401-Q26
    stem: "一個公司的 AI 客服機器人使用 2023 年的資料訓練。到了 2026 年，發現機器人對很多問題的回答越來越不準確，即使沒有任何技術故障。這最可能是什麼問題？"
    options:
      a: "過度擬合，需要減少模型複雜度"
      b: "幻覺（Hallucination），需要人工審核所有回答"
      c: "資料漂移（Data Drift），真實世界資料已和訓練資料不同"
      d: "欠擬合，需要增加模型複雜度"
    answer: "c"
    explanation: "模型部署後，隨時間推移，真實世界的資料分布（用戶問題模式、語言習慣、新知識等）和訓練資料漸漸不同，導致效能下降——這就是資料漂移。解決方法是定期用新資料重新訓練或微調。"
    difficulty: 3
    tags: ["data-drift", "model-monitoring", "performance-management"]

  - id: L11401-Q27
    stem: "一個電商平台想讓 AI 根據顧客的購買歷史，自動生成個性化的商品推薦說明文字（每位顧客收到不同的描述）。這個系統需要結合哪兩種 AI 能力？"
    options:
      a: "只需要鑑別式AI（推薦系統本質是分類）"
      b: "只需要生成式AI（生成文字說明）"
      c: "鑑別式AI（分析購買歷史判斷偏好）+ 生成式AI（生成個性化說明文字）"
      d: "強化學習模型（從用戶反饋優化推薦）"
    answer: "c"
    explanation: "這是整合應用情境。鑑別式AI分析購買歷史、預測偏好（判斷用戶喜歡什麼）；生成式AI根據判斷結果生成個性化的說明文字。現代 AI 產品常結合兩種能力：一個判斷、一個創造。"
    difficulty: 3
    tags: ["discriminative-ai", "generative-ai", "integration", "scenario"]

  - id: L11401-Q28
    stem: "在模型部署後的效能管理中，「有效吞吐量（Goodput）」與「吞吐量（Throughput）」的主要差異是什麼？"
    options:
      a: "兩者定義相同，只是測量單位不同"
      b: "Goodput 是在維持服務品質前提下的真實有效產出量；Throughput 是不考慮品質的總處理量"
      c: "Throughput 考慮延遲；Goodput 只看生成的 token 數"
      d: "Goodput 是生成式AI專用指標；Throughput 是鑑別式AI專用指標"
    answer: "b"
    explanation: "吞吐量（Throughput）是系統總處理量，不管品質好壞；有效吞吐量（Goodput）是在維持目標品質（如延遲要求）下真正有效的產出量。例如系統每秒處理 100 個請求，但 20 個因為超時被取消，有效吞吐量就是 80。"
    difficulty: 3
    tags: ["performance-management", "throughput", "goodput"]

  - id: L11401-Q29
    stem: "下列關於 BERT（Bidirectional Encoder Representations from Transformers，雙向編碼器表徵）的敘述，哪一個正確？"
    options:
      a: "BERT 是 Decoder-only 模型，主要用於文字生成"
      b: "BERT 是雙向 Encoder 模型，擅長文字理解和分類任務，不是主要的文字生成模型"
      c: "BERT 和 GPT 架構相同，只是訓練資料不同"
      d: "BERT 屬於生成式AI，常用於寫文章和聊天"
    answer: "b"
    explanation: "BERT 使用雙向 Encoder-only 架構，同時看一個句子的左右文字，擅長理解文字、情感分析、問答和文字分類（鑑別式任務）。GPT 是 Decoder-only，用於生成。BERT 雖然是語言模型，但主要做理解而非生成。"
    difficulty: 3
    tags: ["bert", "llm", "architecture", "discriminative-vs-generative"]

  - id: L11401-Q30
    stem: "一家新創公司要驗證「用生成式AI自動回覆客戶詢問」這個想法是否可行，在投入大量開發資源前。最合適的第一步是什麼？"
    options:
      a: "直接全面部署到雲端，測試真實用戶反應"
      b: "先做概念驗證（PoC），用小規模測試確認方向可行性"
      c: "立即進行大規模的偏差-變異分析"
      d: "選擇內部部署以確保資料安全"
    answer: "b"
    explanation: "概念驗證（PoC，Proof of Concept）就是在投入大量資源前，先用小規模實驗確認方向可行。確認 AI 能達到業務目標後，再決定全面投入開發和部署。這是 AI 導入的標準第一步。"
    difficulty: 3
    tags: ["poc", "testing-validation", "scenario"]

  - id: L11401-Q31
    stem: "下列哪一項屬於生成式AI的「計算成本高」限制的具體表現？"
    options:
      a: "鑑別式模型的分類準確率低於人工標準"
      b: "訓練大型語言模型（LLM）需要數週時間和大量 GPU 資源，且每次用戶對話都在累積推理費用"
      c: "邊緣設備的計算能力不足以運行複雜模型"
      d: "資料標註成本高，需要大量人力"
    answer: "b"
    explanation: "生成式AI（特別是大型語言模型 LLM）的計算成本高表現在兩方面：訓練成本（需要數週時間、數百至數千張 GPU，成本可達數百萬美元）和推理成本（每次對話都消耗 GPU 算力，累積起來是巨大開銷）。"
    difficulty: 3
    tags: ["generative-ai", "limitations", "cost", "llm"]

  - id: L11401-Q32
    stem: "某開發者想讓一個預訓練的大型語言模型（LLM，Large Language Model）專門回答台灣稅務法規的問題，且希望模型能反映最新的法規更新。下列哪種方式最能有效達到這個目標？"
    options:
      a: "換一個更大的基礎模型，因為越大的模型知識越豐富"
      b: "使用提示工程加上 RAG（Retrieval-Augmented Generation），在每次查詢時檢索最新法規文件"
      c: "將所有稅務法規塞進一個超長的提示詞（Prompt）"
      d: "只依賴基礎模型的原有知識，不做任何修改"
    answer: "b"
    explanation: "RAG（檢索增強生成）結合提示工程，能在不重新訓練模型的情況下，讓模型引用最新的外部文件（如剛更新的稅務法規）回答問題，有效解決基礎模型知識截止日期問題和幻覺問題。僅換更大模型無法解決時效性問題。"
    difficulty: 3
    tags: ["rag", "prompt-engineering", "foundation-model", "llm", "scenario"]

  - id: L11401-Q33
    stem: "在 AI 系統部署後，工程師發現模型在週末和工作日表現差異很大，工作日的準確率比訓練時低了 15%。進一步分析後發現，週間的用戶行為模式和週末完全不同。這最可能是什麼問題？應如何解決？"
    options:
      a: "模型過度擬合週末資料；增加週末訓練資料比例"
      b: "幻覺問題；加入更嚴格的輸出過濾"
      c: "資料漂移（Data Drift）；收集工作日資料重新訓練或微調模型"
      d: "延遲問題；升級雲端伺服器配置"
    answer: "c"
    explanation: "訓練資料和真實部署環境的資料分布不一致（訓練資料可能以週末為主），導致工作日效能下降——這是資料漂移的一種形式（稱為 covariate shift）。解法是收集有代表性的工作日資料，重新訓練或進行微調。"
    difficulty: 3
    tags: ["data-drift", "model-monitoring", "fine-tuning"]

  - id: L11401-Q34
    stem: "一個線上教育平台要建立一個 AI 系統，根據學生的歷史作答記錄和學習風格，自動生成專屬的考題讓學生練習。這個系統最核心的 AI 能力是什麼？"
    options:
      a: "鑑別式AI，因為需要分析學生的答對率"
      b: "生成式AI，因為需要創造以前不存在的新考題"
      c: "強化學習，因為需要從學生反饋中持續優化"
      d: "規則型 AI，因為考題有固定格式"
    answer: "b"
    explanation: "自動生成「以前不存在的新考題」是生成式AI的核心能力——根據學生輪廓（輸入），創造全新的考題內容（輸出）。分析學生作答記錄（選項a）也涉及鑑別式，但題目問的是「最核心的 AI 能力」，是生成新考題。"
    difficulty: 3
    tags: ["generative-ai", "scenario", "content-generation"]

  - id: L11401-Q35
    stem: "以下關於「幻覺（Hallucination）」的說法，哪一項最正確？"
    options:
      a: "幻覺只出現在英文輸入，中文輸入的 AI 不會有此問題"
      b: "幻覺是 AI 回應速度太慢導致的問題，增加算力即可解決"
      c: "幻覺是生成式AI的系統性問題：模型學習統計規律而非真正理解事實，會自信地輸出錯誤資訊"
      d: "幻覺只在模型尚未微調時出現，微調後可完全消除"
    answer: "c"
    explanation: "幻覺是生成式AI的系統性問題，不論語言、不論是否微調都可能發生。根本原因是模型學的是語言的統計模式（什麼字後面接什麼字），而非真正理解事實，因此可能自信地輸出虛構但語法通順的資訊。微調可以減少但無法完全消除幻覺。"
    difficulty: 3
    tags: ["hallucination", "generative-ai", "limitations"]

  - id: L11401-Q36
    stem: "「LLM（Large Language Model，大型語言模型）」中，哪種架構更適合用來做情感分析（判斷一段文字是正面還是負面評論）？"
    options:
      a: "GPT 系列（Decoder-only），因為它能生成更詳細的解釋"
      b: "BERT（Encoder-only 雙向），因為它更擅長理解和分類文字"
      c: "VAE（Variational Autoencoder，變分自動編碼器），因為它能捕捉語義"
      d: "擴散模型（Diffusion Model），因為它能生成多種答案"
    answer: "b"
    explanation: "情感分析是分類任務（鑑別式）——判斷文字屬於哪個類別（正面/負面/中性）。BERT 採用雙向 Encoder-only 架構，擅長理解文字、做分類和理解任務，適合情感分析。GPT 適合生成；VAE 和 Diffusion Model 主要用於圖像/資料生成。"
    difficulty: 4
    tags: ["bert", "gpt", "sentiment-analysis", "discriminative-ai", "llm"]

  - id: L11401-Q37
    stem: "某企業 AI 系統在訓練時使用了大量客服對話資料，其中大多數是男性主管的語言風格。部署後發現，AI 生成的回覆對女性用戶的建議偏向刻板印象。這個問題屬於生成式AI的哪種限制？"
    options:
      a: "幻覺（Hallucination）——AI 編造了不存在的資訊"
      b: "計算成本高——需要更多算力來修正偏見"
      c: "訓練資料偏見（Bias）——訓練資料中的偏見被模型學習並放大"
      d: "資料漂移（Data Drift）——用戶資料隨時間改變"
    answer: "c"
    explanation: "這是訓練資料偏見（Bias）問題：訓練資料中已存在的性別偏見被模型學習，生成內容時被放大輸出。生成式AI的風險之一就是可能放大訓練資料中的偏見。這與幻覺（虛構事實）、資料漂移（時間變化）不同。"
    difficulty: 4
    tags: ["bias", "generative-ai", "limitations", "training-data"]

  - id: L11401-Q38
    stem: "一個新聞媒體公司考慮兩種 AI 系統：系統 A 分析讀者行為資料，自動將新聞分類為「高點擊率」或「低點擊率」；系統 B 根據標題生成摘要文字，供讀者快速瀏覽。關於這兩個系統的可解釋性（Explainability），下列哪個敘述最準確？"
    options:
      a: "兩者可解釋性相同，因為都是語言相關任務"
      b: "系統 A（鑑別式）通常可解釋性較高（可解釋為什麼分類為高點擊率）；系統 B（生成式）可解釋性較低（難以說明為何生成那個特定摘要）"
      c: "系統 B（生成式）可解釋性更高，因為可以看到輸出的文字"
      d: "兩者都無法解釋，是所有 AI 的共同問題"
    answer: "b"
    explanation: "鑑別式AI（如分類器）通常可解釋性較高——可以分析哪些特徵影響了分類決策（如標題長度、關鍵字）。生成式AI（如摘要生成）可解釋性較低——難以精確說明為何從無數可能性中生成了那個特定的摘要文字。這是兩類 AI 的重要特性差異。"
    difficulty: 4
    tags: ["explainability", "discriminative-ai", "generative-ai", "comparison"]

  - id: L11401-Q39
    stem: "下列哪個說法最準確地描述了 GAN（Generative Adversarial Network，生成對抗網路）中生成器（Generator）和鑑別器（Discriminator）的關係？"
    options:
      a: "生成器負責分類真實資料；鑑別器負責生成假資料"
      b: "兩者合作共同訓練，共用相同的損失函數"
      c: "生成器嘗試生成以假亂真的資料；鑑別器嘗試分辨真實和生成資料——兩者相互對抗，共同進步"
      d: "生成器只在訓練時使用；鑑別器是最終部署的模型"
    answer: "c"
    explanation: "GAN 的核心是對抗機制：生成器（Generator）嘗試生成讓鑑別器無法辨識的假資料（以假亂真）；鑑別器（Discriminator）嘗試分辨哪些是真實資料、哪些是生成的假資料。兩者相互競爭推動彼此進步。初級知道兩個角色和對抗概念即可，不需了解數學細節。"
    difficulty: 4
    tags: ["gan", "generator", "discriminator", "generative-ai", "adversarial"]

  - id: L11401-Q40
    stem: "一家金融機構要部署一個 AI 風險評估系統，需要同時滿足：（1）每秒要處理上千筆即時交易；（2）涉及客戶機密財務資料不能離場；（3）部分複雜的風險分析需要高算力。最適合的部署架構是？"
    options:
      a: "純雲端部署，因為算力最強且可彈性擴充"
      b: "純邊緣部署，因為可即時處理且資料不離場"
      c: "純內部部署，因為資料最安全"
      d: "混合架構（Hybrid）：內部部署處理即時交易和機密資料，雲端負責高算力的複雜分析（使用去識別化資料）"
    answer: "d"
    explanation: "這個場景有衝突的需求：低延遲+資料機密（適合內部部署或邊緣）、高算力複雜分析（適合雲端）。混合架構取各自優點：機密即時交易在內部處理（資料不離場、低延遲），去識別化的複雜分析在雲端執行（大算力）。現實中的企業 AI 系統常採用此模式。"
    difficulty: 5
    tags: ["hybrid-deployment", "model-deployment", "scenario", "multi-constraint"]
