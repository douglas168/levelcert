topic: L12201
topic_name: 生成式AI應用領域與常見工具
level: beginner
questions:

  # ============================================================
  # D1 — 記憶（Remember）× 8
  # ============================================================

  - id: L12201-Q01
    difficulty: D1
    question: "Midjourney 屬於生成式AI的哪個應用領域？"
    options:
      a: "文字生成（Text Generation）"
      b: "圖像生成（Image Generation）"
      c: "程式碼生成（Code Generation）"
      d: "聲音生成（Audio Generation）"
    correct: b
    explanation:
      why_correct: "Midjourney 是專門的圖像生成工具，使用者透過文字提示詞生成高品質圖像。"
      why_not_a: "文字生成的代表是 ChatGPT、Gemini，Midjourney 不處理文字內容。"
      why_not_c: "程式碼生成的代表是 GitHub Copilot、Cursor，Midjourney 與程式碼無關。"
      why_not_d: "聲音生成的代表是 ElevenLabs（TTS）、Whisper（STT），Midjourney 專注圖像。"
    keywords:
      - Midjourney
      - 圖像生成
    exam_trap: false

  - id: L12201-Q02
    difficulty: D1
    question: "ElevenLabs 的主要AI應用定位為下列何者？"
    options:
      a: "語音合成（Text-to-Speech，TTS）"
      b: "圖像風格轉換"
      c: "文字摘要生成"
      d: "程式碼自動補全"
    correct: a
    explanation:
      why_correct: "ElevenLabs 是語音合成（TTS）領域的領導品牌，提供高品質的文字轉語音服務。"
      why_not_b: "圖像風格轉換屬於圖像生成領域，與 ElevenLabs 的語音技術無關。"
      why_not_c: "文字摘要是 ChatGPT 等文字生成工具的功能。"
      why_not_d: "程式碼補全是 GitHub Copilot 等工具的功能。"
    keywords:
      - ElevenLabs
      - TTS
      - 語音合成
    exam_trap: false

  - id: L12201-Q03
    difficulty: D1
    question: "TAIDE 是由台灣哪個政府機關主導開發的大型語言模型？"
    options:
      a: "經濟部"
      b: "教育部"
      c: "國家科學及技術委員會（國科會）"
      d: "數位發展部"
    correct: c
    explanation:
      why_correct: "TAIDE（Trustworthy AI Dialogue Engine）由國科會（NSTC）主導開發，目的是建立台灣本土可信賴繁體中文AI對話引擎。"
      why_not_a: "經濟部負責產業政策，iPAS 鑑定由經濟部產業發展署推動，但 TAIDE 非其專案。"
      why_not_b: "教育部負責教育政策，與 TAIDE 開發無關。"
      why_not_d: "數位發展部負責數位治理，但 TAIDE 是國科會主導的研發專案。"
    keywords:
      - TAIDE
      - 國科會
      - 台灣LLM
    exam_trap: false

  - id: L12201-Q04
    difficulty: D1
    question: "OpenAI API 的計費方式為下列何者？"
    options:
      a: "按 Token 用量計費"
      b: "一次性買斷制"
      c: "月費訂閱制"
      d: "完全免費開放"
    correct: a
    explanation:
      why_correct: "OpenAI API 採用按 Token 計費模式，依模型等級不同費率各異，開發者依實際用量付費。"
      why_not_b: "AI API 服務採持續性計費，不會一次買斷。"
      why_not_c: "月費訂閱制是 ChatGPT 產品的計費方式，API 則按用量計費，兩者獨立。"
      why_not_d: "OpenAI API 有初始免費額度，但正式使用需付費，並非完全免費。"
    keywords:
      - OpenAI API
      - Token 計費
    exam_trap: true

  - id: L12201-Q05
    difficulty: D1
    question: "LLaMA（Large Language Model Meta AI）大型語言模型是由哪家公司開發？"
    options:
      a: "OpenAI"
      b: "Google"
      c: "Meta"
      d: "Microsoft"
    correct: c
    explanation:
      why_correct: "LLaMA 是 Meta（Facebook 母公司）開發的開源大型語言模型，可免費下載並在本地部署。"
      why_not_a: "OpenAI 開發的是 GPT 系列（ChatGPT 背後的模型），屬閉源模型。"
      why_not_b: "Google 開發的是 Gemini 系列。"
      why_not_d: "Microsoft 開發的是 Copilot 系列工具，使用 OpenAI 模型。"
    keywords:
      - LLaMA
      - Meta
      - 開源LLM
    exam_trap: true

  - id: L12201-Q06
    difficulty: D1
    question: "Suno 主要的生成式AI應用為下列何者？"
    options:
      a: "文字翻譯"
      b: "AI 音樂創作"
      c: "3D模型生成"
      d: "影片剪輯"
    correct: b
    explanation:
      why_correct: "Suno 是 AI 音樂創作平台，使用者可透過文字描述生成完整音樂作品，屬聲音生成領域。"
      why_not_a: "文字翻譯是 ChatGPT、DeepL 等工具的功能。"
      why_not_c: "3D 模型生成屬不同的 AI 應用領域。"
      why_not_d: "影片剪輯屬影片處理領域，Suno 專注音樂生成。"
    keywords:
      - Suno
      - 音樂生成
      - 聲音生成
    exam_trap: false

  - id: L12201-Q07
    difficulty: D1
    question: "Stable Diffusion 是一種什麼類型的AI工具？"
    options:
      a: "閉源付費的圖像生成工具"
      b: "開源可免費本地部署的圖像生成模型"
      c: "語音合成工具"
      d: "程式碼補全工具"
    correct: b
    explanation:
      why_correct: "Stable Diffusion 是 Stability AI 開發的開源圖像生成模型，可免費下載在本地電腦運行，是開源圖像生成的代表。"
      why_not_a: "Midjourney 才是閉源付費圖像工具；Stable Diffusion 是開源免費的。"
      why_not_c: "ElevenLabs、Whisper 才是聲音相關工具。"
      why_not_d: "GitHub Copilot、Cursor 才是程式碼補全工具。"
    keywords:
      - Stable Diffusion
      - 開源
      - 圖像生成
    exam_trap: false

  - id: L12201-Q08
    difficulty: D1
    question: "生成式AI的「三大」基礎應用領域，下列何者不屬於其中？"
    options:
      a: "文字生成（Text Generation）"
      b: "圖像生成（Image Generation）"
      c: "影片生成（Video Generation）"
      d: "聲音生成（Audio Generation）"
    correct: c
    explanation:
      why_correct: "生成式AI三大基礎應用領域為「文、圖、聲」—文字生成、圖像生成、聲音生成。影片生成雖存在（如 Sora），但在 iPAS 考試架構中歸屬進階應用。"
      why_not_a: "文字生成是三大領域之一，代表工具有 ChatGPT、Gemini 等。"
      why_not_b: "圖像生成是三大領域之一，代表工具有 Midjourney、Stable Diffusion 等。"
      why_not_d: "聲音生成是三大領域之一，代表工具有 ElevenLabs（TTS）、Whisper（STT）等。"
    keywords:
      - 三大領域
      - 生成式AI
    exam_trap: false

  # ============================================================
  # D2 — 理解（Understand）× 9
  # ============================================================

  - id: L12201-Q09
    difficulty: D2
    question: "關於 ChatGPT 與 OpenAI API 的差異，下列敘述何者正確？"
    options:
      a: "ChatGPT Pro $200/月方案已包含 API 存取額度"
      b: "OpenAI API 只提供舊版模型，最新模型僅限 ChatGPT"
      c: "兩者使用相同的付費帳號與額度"
      d: "ChatGPT 採月費訂閱制，OpenAI API 採按 Token 計費，兩者獨立計費"
    correct: d
    explanation:
      why_correct: "ChatGPT 是終端使用者月費訂閱產品，OpenAI API 是開發者按 Token 計費平台，兩者完全獨立計費，Pro $200/月不含 API 額度。"
      why_not_a: "ChatGPT Pro 不包含 API 存取，兩者獨立計費——這是最常見的考試陷阱。"
      why_not_b: "OpenAI API 同樣可用最新模型，並非只有舊版。"
      why_not_c: "兩者使用不同計費系統，額度互不影響。"
    keywords:
      - ChatGPT
      - OpenAI API
      - 計費差異
    exam_trap: true

  - id: L12201-Q10
    difficulty: D2
    question: "關於 Cursor 的正確描述，下列何者最準確？"
    options:
      a: "Cursor 是 VS Code 的擴充套件（Extension）"
      b: "Cursor 是基於 VS Code 分支（fork）的獨立 AI 程式碼編輯器"
      c: "Cursor 主要用於圖像生成與設計"
      d: "Cursor 是 Microsoft 開發的低程式碼平台"
    correct: b
    explanation:
      why_correct: "Cursor 是基於 VS Code fork 的獨立 AI 程式碼編輯器，支援用自然語言描述需求（Vibe Coding），是完整 IDE 而非外掛。"
      why_not_a: "GitHub Copilot 才是 VS Code 擴充套件，Cursor 是獨立 IDE——這是最關鍵差異。"
      why_not_c: "Cursor 專注程式碼撰寫，與圖像生成無關。"
      why_not_d: "Microsoft 的低程式碼平台是 Copilot Studio，非 Cursor。"
    keywords:
      - Cursor
      - VS Code fork
      - Vibe Coding
    exam_trap: true

  - id: L12201-Q11
    difficulty: D2
    question: "Whisper（OpenAI）的功能定位是下列何者？"
    options:
      a: "語音轉文字（STT，Speech-to-Text）"
      b: "AI 音樂創作"
      c: "文字轉語音（TTS，Text-to-Speech）"
      d: "圖像生成"
    correct: a
    explanation:
      why_correct: "Whisper 是 OpenAI 的 STT（語音轉文字）工具，功能是將語音「辨識」成文字，常用於會議錄音轉逐字稿。它是語音「辨識」不是語音「合成」。"
      why_not_b: "AI 音樂創作是 Suno 的功能。"
      why_not_c: "TTS（文字轉語音）是 ElevenLabs 等工具的功能，Whisper 恰好相反——它是 STT。"
      why_not_d: "圖像生成是 Midjourney、Stable Diffusion 等工具的功能。"
    keywords:
      - Whisper
      - STT
      - Speech-to-Text
    exam_trap: true

  - id: L12201-Q12
    difficulty: D2
    question: "關於 Midjourney 的使用方式，下列敘述何者正確？"
    options:
      a: "Midjourney 提供免費方案，每月可生成 25 張圖片"
      b: "Midjourney 是開源工具，可以免費下載本地使用"
      c: "Midjourney 無免費方案，需付費訂閱才能使用"
      d: "Midjourney 主要透過獨立桌面應用程式使用"
    correct: c
    explanation:
      why_correct: "Midjourney 無免費方案，最低 Basic $10/月起。透過 Discord 或官方 Web 介面操作。"
      why_not_a: "Midjourney 目前沒有免費方案，早期曾短暫開放已取消。"
      why_not_b: "Midjourney 是閉源付費服務；Stable Diffusion 才是開源免費可本地部署的圖像工具。"
      why_not_d: "Midjourney 沒有獨立桌面應用，主要透過 Discord 伺服器或官方 Web 介面操作。"
    keywords:
      - Midjourney
      - 付費方案
      - 無免費方案
    exam_trap: true

  - id: L12201-Q13
    difficulty: D2
    question: "Google Gemini 在考試中最常被強調的特色為下列何者？"
    options:
      a: "僅支援純文字輸入輸出"
      b: "專為程式碼生成設計的開發者工具"
      c: "僅限企業用戶使用的付費服務"
      d: "多模態能力（文字、圖片、影片理解）與 Google 生態系整合"
    correct: d
    explanation:
      why_correct: "Gemini 的考試定位為多模態 AI（同時理解文字、圖片、影片），以及與 Gmail、Drive、Docs 等 Google 生態系的深度整合。"
      why_not_a: "Gemini 正是以多模態能力著稱，能處理多種格式輸入，並非僅限文字。"
      why_not_b: "Gemini 是通用多模態 AI，雖能輔助寫程式，但並非專為程式碼設計。"
      why_not_c: "Gemini 提供免費方案（Gemini 2.5 Flash），並非只有企業付費。"
    keywords:
      - Gemini
      - 多模態
      - Google生態
    exam_trap: false

  - id: L12201-Q14
    difficulty: D2
    question: "「Vibe Coding（氛圍程式設計）」的核心含義為下列何者？"
    options:
      a: "使用傳統程式語言搭配音樂節奏來寫程式"
      b: "用自然語言描述架構意圖，由 AI 工具生成完整程式碼"
      c: "完全不使用任何 AI 工具，回歸手動編碼"
      d: "專門針對遊戲開發的一種設計方法論"
    correct: b
    explanation:
      why_correct: "Vibe Coding 由 Andrej Karpathy 於 2025 年 2 月提出，指開發者用自然語言下達架構意圖，搭配 Cursor 等工具自動生成程式碼。"
      why_not_a: "Vibe Coding 的「Vibe」指直覺和意圖驅動開發，與音樂節奏無關。"
      why_not_c: "Vibe Coding 恰好相反，高度依賴 AI 工具生成程式碼。"
      why_not_d: "Vibe Coding 適用於各種軟體開發，並非僅限遊戲。"
    keywords:
      - Vibe Coding
      - Cursor
      - 自然語言開發
    exam_trap: false

  - id: L12201-Q15
    difficulty: D2
    question: "VS Code for Copilot 指的是下列何者？"
    options:
      a: "一個全新的獨立 AI IDE 產品"
      b: "微軟推出的圖像生成外掛"
      c: "GitHub Copilot 在 VS Code 中的整合介面"
      d: "Copilot Studio 在 VS Code 中的版本"
    correct: c
    explanation:
      why_correct: "VS Code for Copilot 就是 GitHub Copilot 在 VS Code 編輯器中的整合介面，並非獨立產品。"
      why_not_a: "VS Code for Copilot 不是獨立 IDE；Cursor 才是獨立 IDE（VS Code fork）。"
      why_not_b: "VS Code for Copilot 是程式碼輔助功能，與圖像生成無關。"
      why_not_d: "Copilot Studio 是 Microsoft 365/Power Platform 的低程式碼平台，與 VS Code for Copilot 完全不同。"
    keywords:
      - VS Code for Copilot
      - GitHub Copilot
      - IDE整合
    exam_trap: false

  - id: L12201-Q16
    difficulty: D2
    question: "Amazon CodeWhisperer 現在的正式名稱為何？"
    options:
      a: "Amazon AI Coder"
      b: "AWS Copilot"
      c: "AWS CodeAssist"
      d: "Amazon Q Developer"
    correct: d
    explanation:
      why_correct: "Amazon CodeWhisperer 已於 2024 年更名為 Amazon Q Developer，是 AWS 生態的 AI 程式碼輔助工具。考試若出現兩個名稱，視為同一工具。"
      why_not_a: "Amazon AI Coder 並非官方名稱。"
      why_not_b: "AWS Copilot 是容器部署工具，與程式碼 AI 輔助無關。"
      why_not_c: "AWS CodeAssist 並非官方產品名稱。"
    keywords:
      - Amazon Q Developer
      - CodeWhisperer
      - 更名
    exam_trap: true

  - id: L12201-Q17
    difficulty: D2
    question: "關於開源（Open Source）與閉源（Proprietary）AI工具，下列配對何者正確？"
    options:
      a: "ChatGPT（開源）、LLaMA（閉源）"
      b: "Midjourney（開源）、Stable Diffusion（閉源）"
      c: "所有主流AI工具均為閉源"
      d: "LLaMA（開源，Meta）、Stable Diffusion（開源，Stability AI）"
    correct: d
    explanation:
      why_correct: "LLaMA 是 Meta 發布的開源 LLM（可本地部署），Stable Diffusion 是 Stability AI 的開源圖像生成模型（可本地免費使用）——兩者都是開源代表。"
      why_not_a: "完全相反：ChatGPT 是閉源，LLaMA 是開源。"
      why_not_b: "完全相反：Midjourney 是閉源付費，Stable Diffusion 才是開源免費。"
      why_not_c: "LLaMA 和 Stable Diffusion 都是知名開源 AI 工具。"
    keywords:
      - 開源
      - LLaMA
      - Stable Diffusion
    exam_trap: false

  # ============================================================
  # D3 — 應用（Apply）× 10
  # ============================================================

  - id: L12201-Q18
    difficulty: D3
    question: "一家台灣補習班想建立線上評鑑平台，需要將AI功能整合進自有系統，讓學生輸入問題後自動產生解答。最適合使用下列何者？"
    options:
      a: "OpenAI API"
      b: "ChatGPT Plus 訂閱方案"
      c: "Midjourney Standard 方案"
      d: "ElevenLabs Pro 方案"
    correct: a
    explanation:
      why_correct: "補習班需要將AI整合進自有系統（非直接讓學生用 ChatGPT），OpenAI API 正是為開發者設計的程式介面，可嵌入任何系統，按 Token 計費適合不確定用量的初期開發。"
      why_not_b: "ChatGPT Plus 是終端使用者月費訂閱，無法整合進補習班自有系統。"
      why_not_c: "Midjourney 是圖像生成工具，與文字問答系統無關。"
      why_not_d: "ElevenLabs 是語音合成工具，不適合文字問答評鑑系統。"
    keywords:
      - OpenAI API
      - 系統整合
      - 開發者工具
    exam_trap: false

  - id: L12201-Q19
    difficulty: D3
    question: "某企業行銷團隊需要快速產生大量高品質產品情境圖用於社群媒體。團隊成員不具備程式設計能力。下列哪個工具最適合？"
    options:
      a: "GitHub Copilot"
      b: "OpenAI API"
      c: "Azure AI Speech"
      d: "Midjourney"
    correct: d
    explanation:
      why_correct: "Midjourney 專長照片級真實感圖像，透過 Discord/Web 操作不需程式能力，非常適合行銷團隊快速產生產品情境圖。"
      why_not_a: "GitHub Copilot 是程式碼輔助工具，無法生成圖像。"
      why_not_b: "OpenAI API 雖可呼叫 DALL-E 生成圖像，但需程式設計能力，不適合非技術行銷團隊直接使用。"
      why_not_c: "Azure AI Speech 是語音工具，無法生成圖像。"
    keywords:
      - Midjourney
      - 圖像生成
      - 行銷應用
    exam_trap: false

  - id: L12201-Q20
    difficulty: D3
    question: "客服部門主管（無工程師）想建立AI聊天機器人自動回覆客戶常見問題。下列哪個工具最適合？"
    options:
      a: "Cursor"
      b: "Copilot Studio"
      c: "GitHub Copilot"
      d: "Gemini Advanced"
    correct: b
    explanation:
      why_correct: "Copilot Studio 是低程式碼 AI Agent 建置平台，專門用於建立聊天機器人和自動化流程，不需程式設計背景，最適合非技術客服團隊。"
      why_not_a: "Cursor 是程式碼編輯器，仍需基本開發知識，產出是程式碼而非直接可用的聊天機器人。"
      why_not_c: "GitHub Copilot 是程式碼補全工具，需在 IDE 中使用，不適合無工程師的客服團隊。"
      why_not_d: "Gemini Advanced 是通用型 AI 助手，無法直接建立獨立部署的客服聊天機器人。"
    keywords:
      - Copilot Studio
      - 低程式碼
      - 聊天機器人
    exam_trap: false

  - id: L12201-Q21
    difficulty: D3
