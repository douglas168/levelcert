  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 3
  question: "一家電商公司想知道「為什麼上個月退貨率突然升高」，這屬於哪一種資料分析類型？"
  options:
    a: "描述性分析（Descriptive Analytics）"
    b: "診斷性分析（Diagnostic Analytics）"
    c: "預測性分析（Predictive Analytics）"
    d: "指示性分析（Prescriptive Analytics）"
  correct: "b"
  explanation:
    why_correct: "「為什麼退貨率突然升高」是在探究原因，屬於診斷性分析（Diagnostic Analytics）——回答「Why did it happen?」。"
    why_not_a: "描述性分析只回答「發生了什麼」（例如退貨率是多少），不探究原因。"
    why_not_c: "預測性分析回答「未來會發生什麼」（例如下個月退貨率會是多少），不是找原因。"
    why_not_d: "指示性分析回答「應該怎麼做」（例如如何降低退貨率），比找原因更進一步。"
  keywords:
    - "診斷性分析"
    - "Diagnostic Analytics"
  exam_trap: false

- id: "L11202-Q15"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 3
  question: "某手搖飲品牌的資料集中，「飲料甜度」欄位的值有「全糖、半糖、微糖、無糖」四種。若要將此資料用於機器學習模型，最適合使用下列哪種方法？"
  options:
    a: "資料標準化（Standardization）"
    b: "正規化（Normalization）"
    c: "獨熱編碼（One-Hot Encoding）"
    d: "缺失值填補（Imputation）"
  correct: "c"
  explanation:
    why_correct: "「全糖、半糖、微糖、無糖」是類別型資料，需要使用獨熱編碼（One-Hot Encoding）將每個類別轉換為獨立的二元欄位（0 或 1），模型才能處理。"
    why_not_a: "標準化適用於連續型數值資料的縮放，無法處理文字類別。"
    why_not_b: "正規化同樣適用於連續型數值資料，無法將文字轉為數值。"
    why_not_d: "缺失值填補是處理空值問題，此處的欄位有值但為文字類別，不需要填補。"
  keywords:
    - "獨熱編碼"
    - "One-Hot Encoding"
    - "類別型資料"
  exam_trap: false

- id: "L11202-Q16"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 3
  question: "小明正在分析公司員工資料，發現「年薪」欄位中有一筆資料為「-50000 元」。他應該如何判斷這筆資料？"
  options:
    a: "這是缺失值，應該直接刪除"
    b: "這是不一致問題，需要統一格式"
    c: "這是異常值，需要進一步調查是否為輸入錯誤"
    d: "這是正常資料，無需處理"
  correct: "c"
  explanation:
    why_correct: "年薪為負值明顯偏離正常範圍，屬於異常值（Outlier）。應先調查是否為輸入錯誤（如漏了正號或多打了負號），再決定修正或刪除。"
    why_not_a: "此欄位有值（-50000），不是空白，所以不是缺失值。"
    why_not_b: "不一致問題是指同一事物的不同表達方式（如格式、命名不同），負數年薪是數值本身不合理。"
    why_not_d: "年薪為負數在現實中不合理，不應視為正常資料直接使用。"
  keywords:
    - "異常值"
    - "Outlier"
    - "資料清理"
  exam_trap: false

