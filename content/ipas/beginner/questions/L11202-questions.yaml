  question: "某健身房的會員資料中，「體重（公斤）」範圍約 40–120，「每月消費金額（元）」範圍約 500–5000。教練想用這兩個特徵預測會員續約率。最適合先做什麼處理？"
  options:
    a: "將體重欄位刪除，只保留消費金額"
    b: "對兩個欄位進行正規化（Normalization）或標準化（Standardization），使數值範圍一致"
    c: "對兩個欄位進行獨熱編碼（One-Hot Encoding）"
    d: "不需要任何處理，模型會自動調整數值範圍"
  correct: "b"
  explanation:
    why_correct: "體重和消費金額的數值範圍差距大，直接使用可能導致消費金額主導模型學習。正規化或標準化可以讓兩者的尺度一致，確保模型公平對待每個特徵。"
    why_not_a: "體重可能是影響續約率的重要特徵（如健身目標），不應輕易刪除。"
    why_not_c: "獨熱編碼用於類別型資料，體重和消費金額都是連續型數值，不適用。"
    why_not_d: "雖然部分模型（如決策樹）不受尺度影響，但多數模型（如距離計算類模型）需要先做特徵縮放才能正確運作。"
