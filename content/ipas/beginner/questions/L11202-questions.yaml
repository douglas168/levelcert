    a: "網路爬蟲（Web Scraping）收集的資料都是結構化的，可以直接使用"
    b: "問卷調查屬於主動式資料收集，可針對特定需求設計收集項目"
    c: "開放資料集（Open Data）不需要考慮資料品質問題"
    d: "API 收集的資料一定是即時且完整的"
  correct: "b"
  explanation:
    why_correct: "問卷調查是主動式資料收集方法，研究者可以根據分析需求自行設計問題與選項，針對性地收集所需資訊。"
    why_not_a: "網路爬蟲收集的資料通常是半結構化或非結構化的（如 HTML 網頁），需要經過解析與清理才能使用。"
    why_not_c: "開放資料集雖然免費可得，但仍可能存在缺失值、過時資訊等品質問題，必須經過評估與清理。"
    why_not_d: "API 回傳的資料可能有延遲、缺漏或欄位限制，不保證即時且完整。"
