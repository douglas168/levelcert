- id: "L11202-Q01"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "資料處理流程的正確順序為何？"
  options:
    a: "資料清理→資料收集→資料分析→資料呈現"
    b: "資料收集→資料分析→資料清理→資料呈現"
    c: "資料收集→資料清理→資料分析→資料呈現"
    d: "資料分析→資料收集→資料清理→資料呈現"
  correct: "c"
  explanation:
    why_correct: "標準的資料處理流程依序為：收集（Collection）→ 清理（Cleaning）→ 分析（Analysis）→ 呈現（Presentation），先有資料才能清理，清理後才能正確分析並呈現結果。"
    why_not_a: "清理必須在收集之後才能進行，因為沒有資料就無法清理。"
    why_not_b: "尚未清理的資料直接分析會導致結果不可靠，清理應在分析之前。"
    why_not_d: "分析不可能在收集之前進行，必須先有資料才能分析。"
  keywords:
    - "資料處理流程"
    - "Data Pipeline"
  exam_trap: false

- id: "L11202-Q02"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "在資料清理中，「缺失值（Missing Value）」指的是什麼？"
  options:
    a: "資料欄位中出現極端的數值"
    b: "同一筆資料在資料集中出現了兩次以上"
    c: "資料欄位中應該有值但實際上為空白的狀況"
    d: "不同資料來源對同一事物的描述方式不一致"
  correct: "c"
  explanation:
    why_correct: "缺失值（Missing Value）是指資料表中某些欄位本應有值卻為空白（如 NULL 或空字串），是資料清理中最常見的問題之一。"
    why_not_a: "極端數值屬於「異常值（Outlier）」問題，不是缺失值。"
    why_not_b: "同一筆資料出現多次屬於「重複值（Duplicate）」問題。"
    why_not_d: "描述方式不一致屬於「不一致（Inconsistency）」問題，例如同一城市寫成「台北」和「臺北」。"
  keywords:
    - "缺失值"
    - "Missing Value"
    - "資料清理"
  exam_trap: false

- id: "L11202-Q03"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "特徵工程（Feature Engineering）的主要目的為何？"
  options:
    a: "將資料儲存到資料庫中"
    b: "從原始資料中建構出更有利於模型學習的特徵"
    c: "將分析結果製作成視覺化圖表"
    d: "刪除資料集中所有的異常值"
  correct: "b"
  explanation:
    why_correct: "特徵工程（Feature Engineering）是從原始資料中選擇、萃取或轉換出更有利於機器學習模型學習與預測的特徵，是提升模型效能的關鍵步驟。"
    why_not_a: "資料儲存屬於資料管理範疇，不是特徵工程的目的。"
    why_not_c: "製作視覺化圖表屬於「資料呈現」階段，與特徵工程無關。"
    why_not_d: "刪除異常值屬於「資料清理」階段，特徵工程的重點是建構更好的特徵，而非單純刪除資料。"
  keywords:
    - "特徵工程"
    - "Feature Engineering"
  exam_trap: false

- id: "L11202-Q04"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "下列何者屬於資料分析四大類型之一？"
  options:
    a: "結構化分析（Structured Analysis）"
    b: "預測性分析（Predictive Analytics）"
    c: "關聯式分析（Relational Analysis）"
    d: "迴歸式分析（Regression Analysis）"
  correct: "b"
  explanation:
    why_correct: "資料分析四大類型為：描述性分析（Descriptive）、診斷性分析（Diagnostic）、預測性分析（Predictive）、指示性分析（Prescriptive），預測性分析是其中之一。"
    why_not_a: "「結構化分析」並非四大類型之一，容易與結構化資料混淆。"
    why_not_c: "「關聯式分析」不屬於四大分析類型，這是資料庫相關的術語。"
    why_not_d: "「迴歸式分析」是統計方法的一種，不是四大分析類型的分類名稱。"
  keywords:
    - "預測性分析"
    - "Predictive Analytics"
    - "資料分析四大類型"
  exam_trap: false

- id: "L11202-Q05"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "獨熱編碼（One-Hot Encoding）主要用來處理哪一種資料？"
  options:
    a: "時間序列資料"
    b: "連續型數值資料"
    c: "類別型資料"
    d: "影像型資料"
  correct: "c"
  explanation:
    why_correct: "獨熱編碼（One-Hot Encoding）是將類別型資料（如「紅、藍、綠」）轉換為二元向量的方法，讓機器學習模型能夠處理非數值的類別變數。"
    why_not_a: "時間序列資料通常需要的是時間特徵萃取（如年、月、星期幾），而非獨熱編碼。"
    why_not_b: "連續型數值資料已經是數字，不需要獨熱編碼，通常使用標準化或正規化處理。"
    why_not_d: "影像型資料通常透過卷積神經網路等技術處理，不使用獨熱編碼。"
  keywords:
    - "獨熱編碼"
    - "One-Hot Encoding"
    - "類別型資料"
  exam_trap: false

- id: "L11202-Q06"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 1
  question: "資料標準化（Standardization）的核心概念為何？"
  options:
    a: "將所有數值壓縮到 0 和 1 之間"
    b: "將資料轉換為平均值為 0、標準差為 1 的分布"
    c: "將類別型資料轉換為數值"
    d: "移除資料中的重複記錄"
  correct: "b"
  explanation:
    why_correct: "資料標準化（Standardization）又稱 Z-Score 標準化，會將資料轉換為平均值為 0、標準差為 1 的標準分布，使不同量級的特徵具有可比較性。"
    why_not_a: "將數值壓縮到 0 和 1 之間是「正規化（Normalization）」的做法，常見方法為 Min-Max Scaling，與標準化不同。"
    why_not_c: "將類別型資料轉換為數值是「編碼（Encoding）」的工作，如獨熱編碼，不是標準化。"
    why_not_d: "移除重複記錄是「資料清理」中的去重操作，與標準化無關。"
  keywords:
    - "標準化"
    - "Standardization"
    - "Z-Score"
  exam_trap: true

