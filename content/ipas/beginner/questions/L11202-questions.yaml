- id: "L11202-Q08"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 2
  question: "描述性分析（Descriptive Analytics）與診斷性分析（Diagnostic Analytics）的主要差異為何？"
  options:
    a: "描述性分析回答「發生了什麼」，診斷性分析回答「為什麼發生」"
    b: "描述性分析使用 AI 模型，診斷性分析只使用統計方法"
    c: "描述性分析著重未來預測，診斷性分析著重歷史回顧"
    d: "兩者沒有實質差異，只是不同廠商的命名方式"
  correct: "a"
  explanation:
    why_correct: "描述性分析（Descriptive）回答「What happened?（發生了什麼）」，例如上月銷售額為多少；診斷性分析（Diagnostic）回答「Why did it happen?（為什麼發生）」，例如銷售額下降的原因。"
    why_not_b: "兩者都可以使用統計方法或 AI 模型，差異在於分析的「目的」而非「工具」。"
    why_not_c: "描述性分析著重「過去發生了什麼」而非未來預測；未來預測屬於「預測性分析」的範疇。"
    why_not_d: "這是國際通用的分類方式（Gartner 分析模型），不是廠商自定的命名。"
  keywords:
    - "描述性分析"
    - "診斷性分析"
    - "Descriptive Analytics"
    - "Diagnostic Analytics"
  exam_trap: false

- id: "L11202-Q09"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 2
  question: "特徵工程中的「特徵選擇（Feature Selection）」與「特徵萃取（Feature Extraction）」有何不同？"
  options:
    a: "特徵選擇是從現有特徵中挑選重要的，特徵萃取是創造全新的特徵"
    b: "特徵選擇只能手動進行，特徵萃取只能由 AI 自動完成"
    c: "特徵選擇用於數值資料，特徵萃取用於文字資料"
    d: "兩者是相同概念的不同名稱"
  correct: "a"
  explanation:
    why_correct: "特徵選擇（Feature Selection）是從已有的特徵中挑選出最重要、最相關的子集；特徵萃取（Feature Extraction）則是透過組合或轉換原始特徵來創造出新的特徵。"
    why_not_b: "兩者都可以手動或自動進行。特徵選擇可用演算法（如相關性分析），特徵萃取也可手動設計。"
    why_not_c: "兩者都適用於各種資料類型，不存在數值與文字的限制。"
    why_not_d: "兩者概念不同——選擇是「挑」現有特徵，萃取是「造」新特徵。"
  keywords:
    - "特徵選擇"
    - "Feature Selection"
    - "特徵萃取"
    - "Feature Extraction"
  exam_trap: false

- id: "L11202-Q10"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 2
  question: "下列關於正規化（Normalization）的說明，何者正確？"
  options:
    a: "正規化後的資料平均值一定為 0"
    b: "正規化會將數值縮放到固定範圍內，常見為 0 到 1 之間"
    c: "正規化只適用於類別型變數"
    d: "正規化與標準化完全相同，可以互相替換"
  correct: "b"
  explanation:
    why_correct: "正規化（Normalization），如 Min-Max Scaling，會將數值線性縮放到固定範圍內，最常見的範圍為 [0, 1]。"
    why_not_a: "平均值為 0 是「標準化（Standardization）」的特徵，不是正規化。正規化後的平均值取決於原始資料分布。"
    why_not_c: "正規化適用於連續型數值變數，類別型變數需要使用編碼（如 One-Hot Encoding）來處理。"
    why_not_d: "正規化與標準化是兩種不同的縮放方法，適用場景不同，不能隨意互換。"
  keywords:
    - "正規化"
    - "Normalization"
    - "Min-Max Scaling"
  exam_trap: true

- id: "L11202-Q11"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 2
  question: "下列關於資料收集（Data Collection）的敘述，何者正確？"
  options:
    a: "資料收集只能使用單一來源，避免格式不一致"
    b: "資料收集階段應考慮資料的代表性與涵蓋範圍，以確保後續分析結果的可靠性"
    c: "資料收集完成後即可直接進行分析，不需要其他前置步驟"
    d: "資料收集階段不需要考慮資料品質，品質問題留到清理階段處理即可"
  correct: "b"
  explanation:
    why_correct: "資料收集階段就應該考慮資料的代表性（是否涵蓋目標群體）和涵蓋範圍（是否包含所需的維度和時間跨度），否則後續分析再精確也可能因為取樣偏差而不可靠。"
    why_not_a: "實務上常需要整合多種資料來源（如資料庫、問卷、API 等），多來源可以互相補充提升完整性。"
    why_not_c: "收集後通常需要資料清理（處理缺失值、異常值等），才能進入分析階段。"
    why_not_d: "雖然清理階段會處理品質問題，但收集時就應初步評估來源可靠性，避免收集到根本無用的資料。"
  keywords:
    - "資料收集"
    - "Data Collection"
    - "代表性"
  exam_trap: false

