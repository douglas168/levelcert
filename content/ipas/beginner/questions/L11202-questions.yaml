  item_code: "L11202"
  difficulty: 5
  question: "某資料科學團隊在建模時，發現「客戶年齡」與「客戶出生年」這兩個特徵高度相關（相關係數接近 -1）。從特徵工程的角度，最適當的處理方式為何？"
  options:
    a: "保留兩個特徵，讓模型自己判斷哪個重要"
    b: "透過特徵選擇（Feature Selection），僅保留其中一個特徵，避免多重共線性問題"
    c: "將兩個特徵相加，創造一個新特徵"
    d: "對兩個特徵分別進行獨熱編碼"
  correct: "b"
  explanation:
    why_correct: "當兩個特徵高度相關時，它們提供的資訊幾乎重複（年齡 ≈ 當前年份 - 出生年），保留兩者會造成多重共線性（Multicollinearity），影響模型的穩定性。透過特徵選擇保留其一即可。"
    why_not_a: "保留高度相關的兩個特徵會增加多重共線性風險，可能讓模型係數不穩定，不是最佳做法。"
    why_not_c: "年齡加出生年的結果接近一個常數（約等於當前年份），沒有實際分析意義。"
    why_not_d: "年齡和出生年是連續型數值，不適合使用獨熱編碼（獨熱編碼適用於類別型資料）。"
  keywords:
    - "特徵選擇"
    - "Feature Selection"
    - "多重共線性"
    - "Multicollinearity"
  exam_trap: false

- id: "L11202-Q29"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 5
  question: "某新創公司的行銷團隊想呈現以下三項資訊：(1) 各通路的廣告花費金額、(2) 各通路帶來的轉換率、(3) 各通路轉換率隨月份的變化趨勢。下列哪種圖表組合最適當？"
  options:
    a: "三張圓餅圖"
    b: "一張長條圖呈現花費金額、一張散佈圖呈現轉換率、一張折線圖呈現趨勢"
    c: "一張長條圖呈現花費金額、一張長條圖呈現轉換率、一張折線圖呈現趨勢"
    d: "一張圓餅圖呈現花費金額、一張箱型圖呈現轉換率、一張散佈圖呈現趨勢"
  correct: "c"
  explanation:
    why_correct: "各通路花費金額適合用長條圖比較大小；各通路轉換率也適合用長條圖比較；轉換率隨月份的變化趨勢適合用折線圖呈現。三者搭配最能清楚傳達各項資訊。"
    why_not_a: "圓餅圖只適合呈現佔比，無法有效呈現金額比較或時間趨勢。"
    why_not_b: "散佈圖適合呈現兩個連續變數的相關性，用來呈現各通路轉換率的比較不夠直覺，長條圖更適合。"
    why_not_d: "圓餅圖不是比較金額的最佳選擇；箱型圖用於呈現資料分布而非各通路間的比較；散佈圖不適合呈現時間趨勢。"
  keywords:
    - "資料呈現"
    - "圖表選擇"
    - "長條圖"
    - "折線圖"
  exam_trap: false

- id: "L11202-Q30"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 5
  question: "某保險公司正在開發理賠風險預測模型。資料集中「客戶月收入」有 15% 的缺失值，且已知收入分布嚴重右偏（少數高收入者拉高平均值）。下列哪種缺失值處理方式最適合此情境？"
  options:
    a: "刪除所有含缺失值的資料列"
    b: "使用全體客戶的平均月收入填補"
    c: "使用全體客戶的中位數月收入填補"
    d: "統一填入 0 元"
  correct: "c"
  explanation:
    why_correct: "當資料分布嚴重右偏時，平均值會被少數極端高值拉高，不能代表多數人的收入水準。中位數不受極端值影響，更能反映「典型」收入，因此是右偏分布下填補缺失值的較佳選擇。"
    why_not_a: "15% 的缺失率相當高，直接刪除會損失大量有效資料，影響模型的訓練品質與代表性。"
    why_not_b: "右偏分布下平均值偏高，用平均值填補會讓缺失值客戶的「收入」普遍被高估，引入系統性偏差。"
    why_not_d: "填入 0 元代表「沒有收入」，但缺失不等於沒有收入，這樣填補會嚴重扭曲資料分布並誤導模型。"
  keywords:
    - "缺失值"
    - "Missing Value"
    - "中位數填補"
    - "右偏分布"
  exam_trap: true

