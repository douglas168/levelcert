- id: "L11202-Q13"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 3
  question: "小華在整理客戶資料時發現，「地址」欄位中同一個地點有「台北市」和「臺北市」兩種寫法。這屬於哪一種資料清理問題？"
  options:
    a: "缺失值（Missing Value）"
    b: "重複值（Duplicate）"
    c: "異常值（Outlier）"
    d: "不一致（Inconsistency）"
  correct: "d"
  explanation:
    why_correct: "同一個地點使用不同的寫法（「台北市」vs「臺北市」）是典型的不一致（Inconsistency）問題，需要統一格式才能正確分析。"
    why_not_a: "這些欄位有值，只是寫法不同，不是缺失值。"
    why_not_b: "重複值是指整筆資料重複，而非單一欄位的寫法不同。"
    why_not_c: "異常值是指數值上偏離正常範圍的資料（如年齡 -5），地址寫法差異不屬於異常值。"
  keywords:
    - "不一致"
    - "Inconsistency"
    - "資料清理"
  exam_trap: false

