- id: "L11202-Q19"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "某 AI 專案團隊的資料集中，「身高（公分）」的範圍約 150–190，而「月薪（元）」的範圍約 30000–120000。若不做任何縮放處理，直接餵入模型訓練，最可能產生什麼問題？"
  options:
    a: "模型會自動忽略月薪欄位"
    b: "月薪數值較大，會主導模型的學習過程，導致身高的影響被低估"
    c: "身高欄位會被視為異常值而自動刪除"
    d: "模型訓練速度會加快但準確度不變"
  correct: "b"
  explanation:
    why_correct: "當不同特徵的數值範圍差異懸殊時，數值較大的特徵（月薪）會在距離計算或梯度更新中佔主導地位，導致數值較小的特徵（身高）對模型的影響被嚴重低估。這就是需要標準化或正規化的原因。"
    why_not_a: "模型不會自動忽略任何欄位，但會因為數值尺度差異而產生偏差。"
    why_not_c: "身高的數值在正常範圍內，模型不會將其視為異常值。異常值判斷與特徵間的相對大小無關。"
    why_not_d: "尺度差異通常會讓梯度下降收斂變慢，而且準確度也可能受影響，不是「加快且不變」。"
  keywords:
    - "特徵縮放"
    - "Feature Scaling"
    - "標準化"
    - "正規化"
  exam_trap: true

- id: "L11202-Q20"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "在特徵工程的三個類別中，「從日期欄位中提取出星期幾」屬於哪一種操作？"
  options:
    a: "特徵選擇（Feature Selection）"
    b: "特徵萃取（Feature Extraction）"
    c: "特徵轉換（Feature Transformation）"
    d: "資料清理（Data Cleaning）"
  correct: "b"
  explanation:
    why_correct: "從日期欄位中「提取出星期幾」是根據原始特徵創造出新的衍生特徵，屬於特徵萃取（Feature Extraction）。原始的日期欄位經過加工產生了新的有意義特徵。"
    why_not_a: "特徵選擇是從已有特徵中「挑選」重要的子集，而非創造新特徵。"
    why_not_c: "特徵轉換是改變現有特徵的「表示方式」（如對數轉換、編碼），而非從中萃取新資訊。"
    why_not_d: "資料清理處理的是缺失值、異常值等品質問題，提取星期幾是為了增加模型可用的資訊。"
  keywords:
    - "特徵萃取"
    - "Feature Extraction"
    - "特徵工程"
  exam_trap: false

- id: "L11202-Q21"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "下列哪一組分析類型的描述完全正確？"
  options:
    a: "描述性分析回答「為什麼」，預測性分析回答「會怎樣」"
    b: "診斷性分析回答「為什麼」，指示性分析回答「該怎麼做」"
    c: "預測性分析回答「發生了什麼」，指示性分析回答「為什麼」"
    d: "描述性分析回答「該怎麼做」，診斷性分析回答「會怎樣」"
  correct: "b"
  explanation:
    why_correct: "診斷性分析（Diagnostic）回答「Why did it happen?（為什麼發生）」；指示性分析（Prescriptive）回答「What should we do?（該怎麼做）」。這兩個對應關係完全正確。"
    why_not_a: "描述性分析回答的是「發生了什麼（What happened?）」而非「為什麼」。"
    why_not_c: "預測性分析回答的是「未來會發生什麼（What will happen?）」，不是「發生了什麼」；指示性分析回答的是「該怎麼做」，不是「為什麼」。"
    why_not_d: "描述性分析回答「發生了什麼」而非「該怎麼做」；診斷性分析回答「為什麼」而非「會怎樣」。"
  keywords:
    - "資料分析四大類型"
    - "Descriptive"
    - "Diagnostic"
    - "Predictive"
    - "Prescriptive"
  exam_trap: true

- id: "L11202-Q22"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "下列關於標準化（Standardization）與正規化（Normalization）的比較，何者正確？"
  options:
    a: "標準化將資料縮放到 [0,1]，正規化將資料轉換為平均值 0、標準差 1"
    b: "標準化適合所有模型，正規化只適合神經網路"
    c: "標準化轉換後的資料可能出現負值，正規化轉換後的資料都在 [0,1] 之間"
    d: "兩者的數學公式完全相同，只是名稱不同"
  correct: "c"
  explanation:
    why_correct: "標準化（Z-Score）以平均值為中心，低於平均值的資料會轉換為負數，因此結果可能包含負值。正規化（Min-Max Scaling）將資料線性映射到 [0,1]，結果都在 0 到 1 之間。"
    why_not_a: "剛好相反——標準化是轉換為平均值 0、標準差 1 的分布；正規化才是縮放到 [0,1] 的範圍。這是考試中常見的混淆陷阱。"
    why_not_b: "兩種方法都可用於多種模型，並非正規化只適合神經網路。選擇哪種取決於資料特性（如是否有異常值）。"
    why_not_d: "兩者的公式不同——標準化使用平均值和標準差，正規化使用最大值和最小值。"
  keywords:
    - "標準化"
    - "Standardization"
    - "正規化"
    - "Normalization"
  exam_trap: true

- id: "L11202-Q23"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "標準化（Standardization）與正規化（Normalization）都是特徵縮放方法。當資料中存在極端異常值時，哪種方法受影響較小？為什麼？"
  options:
    a: "正規化受影響較小，因為它使用固定範圍 [0,1]"
    b: "標準化受影響較小，因為它使用平均值和標準差，能分散異常值的影響"
    c: "兩者受影響程度完全相同"
    d: "正規化受影響較大，因為異常值會嚴重改變最大值和最小值，進而壓縮正常資料的分布範圍"
  correct: "d"
  explanation:
    why_correct: "正規化（Min-Max Scaling）使用最大值和最小值計算，異常值會極端拉大範圍，導致正常資料被壓縮到很窄的區間。相較之下，標準化使用平均值和標準差，受單一異常值的影響相對較小。因此正規化受影響較大，標準化是較穩健的選擇。"
    why_not_a: "正規化正是因為使用 [0,1] 固定範圍，異常值會將其他正常數據壓縮到極小區間，所以反而更容易受影響。"
    why_not_b: "標準化確實受影響較小，但選項 B 的解釋不夠精確——平均值和標準差也會被異常值影響，只是相較 Min-Max 而言程度較輕。且本題問的是「哪種受影響較小」，選項 D 更完整地解釋了原因。"
    why_not_c: "兩種方法的計算方式不同，受異常值影響的程度也不同。"
  keywords:
    - "標準化"
    - "正規化"
    - "異常值"
    - "Feature Scaling"
  exam_trap: true

- id: "L11202-Q24"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 4
  question: "某醫療研究團隊在收集資料時，同時使用了醫院病歷系統、患者問卷調查以及穿戴裝置的生理數據。這種做法在資料收集階段的主要好處是什麼？"
  options:
    a: "可以完全避免資料清理的需求"
    b: "多元來源可以互相補充與交叉驗證，提升資料的完整性與可信度"
    c: "多來源資料不需要任何整合即可直接分析"
    d: "使用越多資料來源，分析結果一定越準確"
  correct: "b"
  explanation:
    why_correct: "多元資料來源的優勢在於互相補充（如問卷可補充病歷未記錄的主觀感受）與交叉驗證（如穿戴裝置數據可驗證患者自述的活動量），提升整體資料的完整性與可信度。"
    why_not_a: "多來源資料反而可能增加不一致和重複值等清理需求，不可能完全避免清理。"
    why_not_c: "多來源資料格式通常不同，必須經過整合與清理才能一起分析。"
    why_not_d: "資料來源多不一定等於更準確，如果來源品質差或整合不當，反而可能引入更多雜訊。"
  keywords:
