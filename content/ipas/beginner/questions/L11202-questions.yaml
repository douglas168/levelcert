- id: "L11202-Q27"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 5
  question: "某電商平台的資料集中，「商品類別」有 500 種不同的值。若直接對該欄位使用獨熱編碼（One-Hot Encoding），最可能產生什麼問題？應如何改善？"
  options:
    a: "不會有任何問題，獨熱編碼可以處理任意數量的類別"
    b: "會產生 500 個新欄位，導致維度爆炸（Curse of Dimensionality），應考慮先進行類別合併或使用其他編碼方式"
    c: "獨熱編碼無法處理超過 100 個類別，系統會自動報錯"
    d: "會導致所有欄位的值都變成 0，模型無法學習"
  correct: "b"
  explanation:
    why_correct: "對 500 種類別進行獨熱編碼會產生 500 個新的二元欄位，大幅增加資料維度，可能導致維度災難（Curse of Dimensionality），使模型訓練效率下降且容易過擬合。改善方式包括：將低頻類別合併為「其他」、使用目標編碼（Target Encoding）等替代方法。"
    why_not_a: "雖然技術上獨熱編碼可以處理任意數量的類別，但類別數過多會造成嚴重的維度問題，實務上不建議直接使用。"
    why_not_c: "獨熱編碼沒有類別數量上限的技術限制，但不代表高類別數就沒有問題。"
    why_not_d: "獨熱編碼會讓每筆資料在對應類別的欄位為 1、其餘為 0，不會全部變成 0。"
  keywords:
    - "獨熱編碼"
    - "One-Hot Encoding"
    - "維度災難"
    - "Curse of Dimensionality"
  exam_trap: false

- id: "L11202-Q28"
