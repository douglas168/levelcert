- id: "L11202-Q25"
  topic_code: "L11202"
  item_code: "L11202"
  difficulty: 5
  question: "某銀行正在建立信用卡詐欺偵測的 AI 模型。在訓練模型時，團隊不小心將「交易是否被標記為詐欺（結果標籤）」這個欄位的衍生特徵也放入了訓練資料中。這最可能導致什麼問題？"
  options:
    a: "模型訓練速度會大幅降低"
    b: "模型在訓練集表現極好，但實際上線後偵測效果很差——這就是資料洩漏（Data Leakage）"
    c: "模型會自動忽略該欄位"
    d: "模型會因為特徵太多而無法收斂"
  correct: "b"
  explanation:
    why_correct: "資料洩漏（Data Leakage）是指訓練資料中包含了不應該知道的未來資訊或結果資訊。將「是否為詐欺」的衍生特徵放入訓練集，模型等於直接「偷看答案」，訓練表現虛高但上線後面對真實交易卻無法有效偵測。"
    why_not_a: "資料洩漏不會讓訓練變慢，反而會讓模型更快「學到」捷徑，收斂更快。"
    why_not_c: "模型不會自動識別並忽略洩漏的特徵，它會把所有輸入的特徵都納入學習。"
    why_not_d: "特徵數量多可能造成過擬合，但資料洩漏的問題本質不是特徵數量多，而是特徵包含了不合法的資訊。"
  keywords:
    - "資料洩漏"
    - "Data Leakage"
  exam_trap: true

