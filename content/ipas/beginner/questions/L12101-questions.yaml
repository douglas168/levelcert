  - id: L12101-Q01
    stem: "No Code（無程式碼）開發工具的核心特徵為何？"
    options:
      a: "完全不需要撰寫程式碼，透過拖放（Drag-and-Drop）與視覺化配置建構應用"
      b: "需要撰寫少量程式碼來處理複雜邏輯"
      c: "僅適用於機器學習模型的自動化訓練流程"
      d: "必須由專業軟體工程師操作才能使用"
    answer: "a"
    explanation: "No Code 的定義就是「零程式碼」，使用者透過拖放元件與視覺化配置即可建構應用程式。撰寫少量程式碼（選項 b）是 Low Code 的特徵；自動化 ML 訓練（選項 c）是 AutoML；NC 的目標用戶恰恰是非技術業務人員（否定選項 d）。"
    difficulty: 1
    tags: ["no-code", "definition"]

  - id: L12101-Q02
    stem: "下列哪一個平台屬於 Low Code（低程式碼）開發工具？"
    options:
      a: "Zapier"
      b: "Airtable"
      c: "Bubble"
      d: "Power Apps（Microsoft）"
    answer: "d"
    explanation: "Power Apps 是 Microsoft Power Platform 的 Low Code 平台，支援視覺化開發為主並可加入少量程式碼，深度整合 M365/Azure。Zapier、Airtable、Bubble 均為 No Code 平台。"
    difficulty: 1
    tags: ["low-code", "platform-recognition"]

  - id: L12101-Q03
    stem: "Gartner 定義的「公民開發者（Citizen Developer）」是指什麼角色？"
    options:
      a: "在 IT 部門以外，使用組織核可的 NC/LC 工具建構應用的非專業開發人員"
      b: "政府機關中負責開放資料平台維運的公務員"
      c: "專門負責程式碼審查（Code Review）的資深工程師"
      d: "參與開源社群貢獻程式碼的志願者"
    answer: "a"
    explanation: "Gartner 定義公民開發者為在 IT 部門以外，使用組織核可工具建構應用的非專業開發人員。「公民」指「非 IT 專業的組織成員」，與政府無關（否定選項 b），與程式碼審查和開源貢獻者無關（否定選項 c/d）。"
    difficulty: 1
    tags: ["citizen-developer", "definition"]

  - id: L12101-Q04
    stem: "根據 Gartner 預測，公民開發者（Citizen Developer）的數量將達到專業軟體工程師的幾倍？"
    options:
      a: "2 倍"
      b: "4 倍"
      c: "10 倍"
      d: "與專業工程師相同"
    answer: "b"
    explanation: "Gartner 預測公民開發者數量將達到專業工程師的 4 倍。這個數據反映 NC/LC 工具讓非技術人員也能開發應用的廣大潛力。記憶法：4 倍——不是 2 倍（太少），不是 10 倍（太多），4 倍是 Gartner 的具體預測值。"
    difficulty: 1
    tags: ["citizen-developer", "gartner", "market-data"]

  - id: L12101-Q05
    stem: "下列哪一個平台屬於 No Code（無程式碼）工具，且主要用於「試算表直接轉換為行動/網頁 App」？"
    options:
      a: "AppSheet（Google）"
      b: "OutSystems"
      c: "Power Apps"
      d: "Mendix"
    answer: "a"
    explanation: "AppSheet 是 Google 旗下的 No Code 平台，核心功能是從 Google Sheets 等試算表直接轉換為行動或網頁 App。Power Apps、OutSystems、Mendix 均為 Low Code 平台，且面向企業級複雜應用，不以「試算表轉 App」為主打功能。"
    difficulty: 1
    tags: ["no-code", "platform-recognition", "appsheet"]

  - id: L12101-Q06
    stem: "「視覺化開發（Visual Development）」在 No Code / Low Code 中的角色為何？"
    options:
      a: "僅用於製作行銷圖表，不用於應用開發"
      b: "以圖形介面（拖放元件、流程圖、表單設計器）取代傳統程式碼撰寫的核心開發方式"
      c: "是額外進階功能，不是核心開發方式"
      d: "專指使用 Tableau 或 Power BI 進行資料視覺化"
    answer: "b"
    explanation: "視覺化開發是 NC/LC 的核心開發範式，透過圖形介面取代傳統程式碼撰寫，讓非技術人員也能建構應用。Tableau/Power BI 是資料視覺化（data visualization）工具（選項 d），與軟體開發的視覺化開發（visual development）是不同概念。"
    difficulty: 1
    tags: ["visual-development", "definition"]

