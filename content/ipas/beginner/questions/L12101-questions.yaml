  - id: L12101-Q07
    stem: "關於 No Code 與 Low Code 的主要差異，下列哪個敘述最正確？"
    options:
      a: "No Code 客製化受限於平台模板，Low Code 可透過撰寫程式碼擴展功能"
      b: "No Code 和 Low Code 完全相同，只是不同廠商的不同命名"
      c: "No Code 適合企業核心系統，Low Code 只適合簡單表單"
      d: "No Code 需要 IT 部門全程監督，Low Code 則無需技術管理"
    answer: "a"
    explanation: "NC 的客製化受限於平台提供的模板和元件；LC 允許開發者撰寫程式碼擴展功能，客製化程度更高。選項 c 恰好相反（NC 適合簡單場景，LC 才適合複雜應用）；選項 d 也相反（NC 因門檻低反而有更高的影子 IT 風險）。"
    difficulty: 2
    tags: ["nc-vs-lc", "comparison"]

  - id: L12101-Q08
    stem: "為什麼 No Code 工具比 Low Code 工具更容易引發「影子 IT（Shadow IT）」風險？"
    options:
      a: "因為所有 Low Code 平台都有內建資安審計功能，No Code 則完全沒有"
      b: "因為 No Code 目標用戶是非技術業務人員，更可能繞過 IT 部門自行部署未經核可的應用"
      c: "因為 No Code 工具的安全設計本質上比 Low Code 差"
      d: "因為 No Code 只能建構網頁，無法建構行動 App"
    answer: "b"
    explanation: "影子 IT 的核心風險來自「使用者行為」——非技術業務人員在不知會 IT 的情況下自行部署工具。No Code 門檻低，更容易發生這種情況。安全設計缺陷（選項 c）和平台能力限制（選項 d）都不是影子 IT 風險的成因；一概而論說所有 LC 都有資安審計（選項 a）也不正確。"
    difficulty: 2
    tags: ["shadow-it", "no-code", "governance"]

  - id: L12101-Q09
    stem: "AutoML（自動化機器學習）與 No Code / Low Code 開發工具的關係為何？"
    options:
      a: "AutoML 是 No Code 工具的一種，兩者同屬視覺化開發類別"
      b: "AutoML 是 Low Code 平台的核心功能模組"
      c: "AutoML 專注於自動化 ML 模型的建構，與 NC/LC 應用開發工具是不同概念"
      d: "AutoML 和 NC/LC 完全相同，只是應用在不同產業"
    answer: "c"
    explanation: "AutoML 的目標產物是機器學習模型（Model），NC/LC 的目標產物是應用程式（App）。兩者雖然都降低技術門檻，但解決的問題完全不同。考試常把 AutoML 混入 NC/LC 選項作為陷阱——不能因為「都不需要太多程式碼」就歸為同類。"
    difficulty: 2
    tags: ["automl", "trap", "nc-lc-definition"]

  - id: L12101-Q10
    stem: "有人說：「No Code 平台背後完全沒有程式碼在運行，所以叫 No Code。」這個說法正確嗎？"
    options:
      a: "正確，「No Code」代表系統內部也沒有程式碼"
      b: "正確。No Code 平台從前端到後端都是純圖形化運算"
      c: "不正確。No Code 平台其實需要使用者撰寫少量 Python 腳本"
      d: "不正確。使用者不需要撰寫程式碼，但平台背後仍自動產生程式碼執行應用邏輯"
    answer: "d"
    explanation: "「No Code」中的「No」是指使用者不需撰寫程式碼，而非平台內部沒有程式碼。No Code 平台背後仍將使用者的拖放操作自動轉換為程式碼執行。「沒有程式碼」是最常見的名稱誤解；說需要 Python 腳本（選項 c）混淆了 LC 的定義。"
    difficulty: 2
    tags: ["no-code", "misconception", "trap"]

  - id: L12101-Q11
    stem: "小美想自動化工作流程：每當 Google 表單收到新回覆，就自動寄通知信給主管。她完全沒有程式背景。以下哪個工具最適合？"
    options:
      a: "OutSystems — 開發完整的表單管理系統"
      b: "Python 腳本 — 用 Google API 撰寫自動寄信程式"
      c: "Zapier — 設定 Google Forms → Gmail 的自動化流程"
      d: "Power Apps — 建構企業級表單應用並設定通知"
    answer: "c"
    explanation: "Zapier 是 No Code 流程自動化工具，專門處理「當 A 事件發生 → 自動執行 B 動作」的跨應用串接。對無程式背景的使用者最佳。Power Apps 和 OutSystems 是 Low Code，需要技術背景；Python 腳本需要程式能力，違背「完全沒有程式背景」的前提。"
    difficulty: 2
    tags: ["zapier", "no-code", "scenario"]

  - id: L12101-Q12
    stem: "下列關於 Low Code 目標用戶的敘述，何者正確？"
    options:
      a: "Low Code 的目標用戶是具備一定技術知識的開發者或公民開發者"
      b: "Low Code 的目標用戶與 No Code 完全相同，沒有差異"
      c: "Low Code 主要針對無技術背景的行銷與企劃人員設計"
      d: "Low Code 專供雲端架構師進行底層基礎設施部署"
    answer: "a"
    explanation: "Low Code 的目標用戶是具備基礎技術知識的開發者或公民開發者，他們可透過視覺化開發並在需要時加入程式碼。無技術背景的業務人員更適合 No Code（否定選項 c）；LC 和 NC 有明確的目標用戶差異（否定選項 b）；雲端架構師負責底層基礎設施，不是 LC 的主要用戶（否定選項 d）。"
    difficulty: 2
    tags: ["low-code", "target-user"]

  - id: L12101-Q13
    stem: "根據 Gartner 預測，2026 年新應用開發將使用低程式碼（Low Code）技術的比例約為多少？"
    options:
      a: "95%"
      b: "50%"
      c: "75%"
      d: "25%"
    answer: "c"
    explanation: "Gartner 預測 2026 年 75% 的新應用開發將使用低程式碼技術。記憶法：75% 反映高速滲透但非完全取代傳統開發——25% 太低（選項 d），95% 太極端（選項 a），50% 是保守陷阱（選項 b），75% 是正確數值。"
    difficulty: 2
    tags: ["market-data", "gartner", "low-code"]

