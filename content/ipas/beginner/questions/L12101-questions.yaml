  - id: L12101-Q22
    stem: "Gartner 預測公民開發者將達到專業工程師的 4 倍。從企業 IT 治理角度分析，這個趨勢帶來的最核心挑戰為何？"
    options:
      a: "伺服器負載會因大量公民開發者的應用而過重"
      b: "企業需要建立機制管理大量非 IT 人員建構的應用，避免資安漏洞與資料孤島"
      c: "Gartner 的預測不準確，數量不會達到 4 倍"
