    tags: ["shadow-it", "citizen-developer", "governance", "scenario"]

  - id: L12101-Q19
    stem: "相較於傳統軟體開發，No Code / Low Code 在哪個維度的表現最差？"
    options:
      a: "開發速度"
      b: "維護成本"
      c: "彈性（Flexibility）與客製化程度"
      d: "技術門檻"
    answer: "c"
    explanation: "NC/LC 在彈性與客製化程度上不如傳統開發——NC/LC 受限於平台功能，無法完全自由地實作任意邏輯。傳統開發可完全客製化，這是它的核心優勢。NC/LC 在速度（最快）、門檻（最低）、維護成本（最低）上都優於傳統開發。"
    difficulty: 3
    tags: ["nc-lc-vs-traditional", "comparison", "flexibility"]

