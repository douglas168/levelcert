  - id: L12101-Q18
    stem: "行銷部門同事未知會 IT 部門，就自行下載免費第三方工具追蹤客戶資料，並存放在個人雲端帳號。這個行為屬於什麼問題？"
    options:
      a: "影子 IT（Shadow IT），帶來資安與合規風險"
      b: "Low Code 開發，屬於正常的企業數位化做法"
      c: "公民開發者（Citizen Developer）行為，受組織治理保護"
      d: "AutoML 應用，需要額外的機器學習資源"
    answer: "a"
