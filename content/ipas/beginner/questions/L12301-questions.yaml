  - id: L12301-Q10
    topic_code: L12301
    subtopic: four-phase-framework
    difficulty: 2
    bloom: understand
    question: "《AI導入指引》強調各階段「循序漸進」，這個原則最主要是要防止什麼風險？"
    options:
      a: "防止AI模型的準確率不達標"
      b: "防止員工對AI的抵抗情緒"
      c: "防止供應商選擇錯誤"
      d: "防止在未驗證可行性前就全面投入資源，造成浪費"
    correct: d
    explanation:
      why_correct: "循序漸進的設計是為了「在全面投入資源前，先透過POC小規模驗證可行性」。如果跳過驗證直接實施，萬一系統不可行，已投入的大量資源將付諸流水。"
      why_not_a: "模型準確率問題透過模型面評估和POC測試來發現，不是「循序漸進」原則本身要防止的。"
      why_not_b: "員工抵抗是工具評估（使用者介面與人員適配）和導入規劃要處理的問題，不是循序漸進的主要設計目的。"
      why_not_c: "供應商選擇錯誤是工具評估和方案設計要解決的，不是循序漸進的主要設計目的。"
    keywords: ["循序漸進", "POC", "可行性驗證"]
    exam_trap: false

