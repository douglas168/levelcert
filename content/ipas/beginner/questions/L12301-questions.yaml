    subtopic: kpi-design
    difficulty: 2
    bloom: understand
    question: "Exit Criteria（退出標準）在POC中的作用是什麼？"
    options:
      a: "決定POC達到何種條件才算成功或應停止"
      b: "定義AI系統的最終功能規格"
      c: "設計AI模型的訓練和測試資料集"
      d: "評估導入後員工的使用滿意度"
    correct: a
