      why_not_a: "5–15% 是顯性成本（如API費用、授權費）的典型佔比，不是隱藏成本。"
      why_not_b: "30–50% 低估了隱藏成本的規模；隱藏成本遠大於顯性成本。"
      why_not_c: "50–70% 仍然低估了實際的隱藏成本比例。"
    keywords: ["隱藏成本", "TCO", "Total Cost of Ownership"]
    exam_trap: true

