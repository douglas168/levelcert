    bloom: remember
    question: "POC（Proof of Concept，概念驗證）在《AI導入指引》四階段中位於哪個階段？"
    options:
      a: "第三階段：驗證"
      b: "第一階段：構想"
      c: "第二階段：方案"
      d: "第四階段：實施"
    correct: a
    explanation:
      why_correct: "POC（概念驗證）是第三階段「驗證（Validation）」的核心活動，目的是在小規模測試技術可行性，確認方案可行後再進入正式實施。"
      why_not_b: "構想階段的核心是痛點分析、場景選定，尚未到設計和測試的階段。"
      why_not_c: "方案階段是設計解決方案、定義KPI、估算成本，還沒有實際執行測試。"
      why_not_d: "實施階段是POC驗證通過後才進入的全面部署階段，不是做POC的地方。"
    keywords: ["POC", "Proof of Concept", "概念驗證", "驗證階段"]
    exam_trap: false

