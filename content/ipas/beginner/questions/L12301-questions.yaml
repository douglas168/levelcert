      why_not_a: "雖然使用量增加會使API費用成長，但這不是「冰山一角」比喻的核心含義。隱藏成本才是大頭。"
      why_not_b: "稅務問題與冰山比喻無關，且不是成本被低估的主要原因。"
      why_not_c: "計算複雜度與成本佔比無關，冰山比喻說的是「容易被忽略的大量成本」。"
    keywords: ["隱藏成本", "冰山", "TCO", "顯性成本"]
    exam_trap: false

