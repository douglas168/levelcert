    question: "TCO（Total Cost of Ownership，總持有成本）的概念是指什麼？"
    options:
      a: "系統生命週期內所有成本的總和，包含顯性和隱藏成本"
      b: "只計算AI系統第一年的直接費用"
      c: "只計算API使用費用和軟體授權費"
      d: "只計算硬體採購和雲端運算費用"
    correct: a
    explanation:
      why_correct: "TCO（總持有成本）是從長期視角評估所有成本的框架，包含顯性成本（API費、授權費、硬體）和隱藏成本（整合開發、培訓、維護等）的總和。"
      why_not_b: "TCO 是長期概念，不只看第一年。隱藏成本往往在系統上線後才逐年浮現。"
      why_not_c: "API費用和授權費只是顯性成本的一部分，不等於TCO。"
      why_not_d: "硬體費用只是顯性成本的一小部分，TCO遠不止這些。"
    keywords: ["TCO", "Total Cost of Ownership", "總持有成本"]
