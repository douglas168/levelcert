    question: "企業在評估AI導入成本時，為什麼說「API費用只是冰山一角」？"
    options:
      a: "因為API費用會隨使用量增加而呈指數成長"
      b: "因為API費用需要依照法規繳稅，增加了總體成本"
      c: "因為API費用計算方式複雜，容易計算錯誤"
