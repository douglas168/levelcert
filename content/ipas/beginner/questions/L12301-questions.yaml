      why_correct: "AI Agent 的核心特徵是「自主多步驟執行 + 工具呼叫 + 跨步驟記憶」，這是與單次輸入輸出的一般 GenAI 工具最根本的差異。"
      why_not_b: "Agent 架構與模型參數量無關，小型模型也能作為 Agent 的推理核心。"
      why_not_c: "回答品質取決於底層 LLM，不是 Agent 架構帶來的差異。Agent 的核心差異是自主性和多步驟。"
      why_not_d: "與處理模態（文字/圖片）無關；Agent 的核心是自主性，不是模態限制。"
