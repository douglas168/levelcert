topic: L11301
topic_name: 機器學習基本原理
level: beginner
questions:
  # answer: a (target ~9)
  - id: L11301-Q01
    stem: "下列哪一項最能描述機器學習（Machine Learning）與傳統程式設計的最大差別？"
    options:
      a: "傳統程式設計由人類手寫規則，機器學習從資料中自動學習規則"
      b: "傳統程式設計需要大量資料，機器學習不需要"
      c: "機器學習速度比傳統程式設計快，所以取代了後者"
      d: "傳統程式設計只能處理文字，機器學習可以處理圖像"
    answer: "a"
    explanation: "機器學習的核心差別：傳統程式是「規則 + 資料 → 答案」，機器學習是「資料 + 答案 → 規則（模型）」。規則的產生方式不同是關鍵。"
    difficulty: 1
    tags: ["ML定義", "典範轉移"]

  - id: L11301-Q02
    stem: "訓練集（Training Set）的主要用途是什麼？"
    options:
      a: "讓模型從中學習，調整內部參數"
      b: "用來做訓練完成後的最終評估，衡量泛化能力"
      c: "用來在訓練過程中調整超參數"
      d: "用來和其他模型進行比較，選出最佳方案"
    answer: "a"
    explanation: "訓練集是讓模型實際學習用的——模型在訓練集上反覆調整內部參數。驗證集才是用來調整超參數，測試集才是做最終評估。"
    difficulty: 1
    tags: ["資料切分", "訓練集"]

  - id: L11301-Q03
    stem: "下列哪個情境最適合使用監督式學習（Supervised Learning）？"
    options:
      a: "根據歷史房屋買賣資料（含成交價標籤）預測新房子的售價"
      b: "把一萬篇新聞文章自動分成數個話題群組，事先沒有預設標籤"
      c: "AI 學下圍棋，透過不斷對弈來提升棋力"
      d: "分析客戶購買記錄，找出潛在的消費族群（無標籤）"
    answer: "a"
    explanation: "監督式學習需要有標籤的訓練資料。房價預測使用歷史成交價（標籤）訓練模型，是典型的監督式回歸任務。選項 B、D 是無標籤的分群（非監督式），選項 C 是強化學習。"
    difficulty: 1
    tags: ["三大學習範式", "監督式學習"]

  - id: L11301-Q04
    stem: "強化學習（Reinforcement Learning）的核心學習機制是什麼？"
    options:
      a: "分析無標籤資料中的隱藏結構，自動發現群組"
      b: "用交叉驗證評估模型在不同資料子集上的穩定性"
      c: "代理人在環境中試錯，根據獎勵或懲罰調整行為策略"
      d: "透過大量已標記的正確答案資料，讓模型學習輸入到輸出的對應"
    answer: "c"
    explanation: "強化學習的核心：代理人（Agent）在環境（Environment）中透過試錯，依據獎勵（Reward）訊號學習最佳策略。不需要預先標記的資料集。"
    difficulty: 1
    tags: ["三大學習範式", "強化學習"]

  - id: L11301-Q05
    stem: "關於機器學習的「泛化（Generalization）」，下列敘述何者正確？"
    options:
      a: "泛化是指模型的參數數量越多越好的特性"
      b: "泛化是指模型在訓練資料上表現完美的能力"
      c: "泛化是指一個模型可以同時解決多種不同任務"
      d: "泛化是指模型在沒看過的新資料上仍能正確預測的能力"
    answer: "d"
    explanation: "泛化（Generalization）是 ML 的終極目標：模型從訓練資料中學到的規律，能夠成功套用到沒見過的新資料上。訓練資料上的高分不等於泛化好。"
    difficulty: 1
    tags: ["泛化", "ML目標"]

  - id: L11301-Q06
    stem: "以下哪個問題最適合使用機器學習來解決？"
    options:
      a: "計算台股每日成交量的加總"
      b: "根據健保投保金額依法計算應繳保費"
      c: "根據固定的兌換率將美元轉換為新台幣"
      d: "分析大量用戶的 LINE 聊天習慣，預測哪些人即將取消訂閱"
    answer: "d"
    explanation: "機器學習適合處理「規則複雜、難以手寫」的問題。分析使用行為模式需要從大量資料中學習，是 ML 的典型應用。其他選項都有明確公式，用傳統程式即可。"
    difficulty: 1
    tags: ["ML適用場景", "ML定義"]

  - id: L11301-Q07
    stem: "模型訓練（Model Training）和模型推論（Inference）最主要的差異是什麼？"
    options:
      a: "訓練發生在模型上線之後，推論發生在上線之前"
      b: "訓練是用歷史資料學習調整參數，推論是用已訓練好的模型對新資料做預測"
      c: "訓練和推論都是在對新資料做預測，只是資料量不同"
      d: "推論比訓練需要更多算力和時間"
    answer: "b"
    explanation: "訓練是「學習階段」——上線前，用歷史資料讓模型調整內部參數；推論是「使用階段」——上線後，用訓練好的模型對每個新查詢做出預測。兩者發生的時機和目的都不同。"
    difficulty: 1
    tags: ["訓練", "推論", "模型訓練"]

  - id: L11301-Q08
    stem: "超參數（Hyperparameter）的特性是什麼？"
    options:
      a: "超參數的值越大，模型表現一定越好"
      b: "超參數是模型在訓練過程中自動調整的內部數值"
      c: "超參數是人類在訓練開始之前事先設定的，訓練過程中不會改變"
      d: "超參數只在推論時才有用，訓練時不重要"
    answer: "c"
    explanation: "超參數（Hyperparameter）是人類在訓練前設定的，訓練過程中不會自動改變。與之對比，參數（Parameter）是模型在訓練中自動學到的。口訣：人設的是超，自學的是參。"
    difficulty: 1
    tags: ["參數", "超參數"]

  - id: L11301-Q09
    stem: "某模型在訓練集的準確率為 97%，但在測試集的準確率只有 58%。這個模型最可能遇到什麼問題？"
    options:
      a: "資料切分比例不正確，應改為 8:1:1"
      b: "擬合不足（Underfitting）——模型還沒學到資料的規律"
      c: "模型的超參數設定過低，需要提高"
      d: "過度擬合（Overfitting）——模型把訓練資料的細節和雜訊都記下來了"
    answer: "d"
    explanation: "訓練集高（97%）、測試集低（58%），高低落差極大，是典型的過度擬合（Overfitting）症狀。模型把訓練資料背下來了，但遇到新資料就失效。若是擬合不足，訓練集和測試集都會差。"
    difficulty: 2
    tags: ["Overfitting", "Underfitting", "泛化"]

  - id: L11301-Q10
    stem: "關於驗證集（Validation Set）和測試集（Test Set），下列說明何者正確？"
    options:
      a: "兩者都是在訓練過程中使用，可以互換"
      b: "驗證集在訓練完成後使用一次，測試集在訓練過程中反覆使用"
      c: "驗證集在訓練過程中反覆使用來調整超參數；測試集在訓練完成後只用一次做最終評估"
      d: "驗證集和測試集可以是同一份資料，沒有本質差異"
    answer: "c"
    explanation: "驗證集（Validation Set）在訓練過程中反覆用來調整超參數和比較不同模型。測試集（Test Set）在訓練全部完成後只用一次，衡量最終泛化能力，不能用測試集結果回頭調模型（會造成資料洩漏）。"
    difficulty: 2
    tags: ["資料切分", "驗證集", "測試集"]

  - id: L11301-Q11
    stem: "非監督式學習（Unsupervised Learning）最適合解決下列哪種問題？"
    options:
      a: "根據大量已標記的貓狗照片，訓練模型分辨新照片"
      b: "AI 學習玩電玩，透過得分多寡改進策略"
      c: "預測某股票明天的收盤價，使用過去三年的歷史價格資料"
      d: "分析一萬筆客戶消費記錄，自動找出潛在的消費行為族群（無預設標籤）"
    answer: "d"
    explanation: "非監督式學習適合無標籤資料、目標是探索資料內在結構的任務。自動分群客戶（Clustering）是典型的非監督式應用。A 是監督式分類，B 是強化學習，C 是監督式回歸。"
    difficulty: 2
    tags: ["非監督式學習", "三大學習範式"]

  - id: L11301-Q12
    stem: "醫院使用 AI 模型篩檢 X 光片中的肺癌。相比於準確率（Accuracy），為什麼召回率（Recall）在此情境中更重要？"
    options:
      a: "因為 Recall 的計算比 Accuracy 簡單"
      b: "因為漏診一個真正的癌症患者（FN）的代價遠大於多送一個正常人去複查（FP）"
      c: "因為 Recall 高代表誤報率低，病人不會被誤診"
      d: "因為在所有情境下 Recall 都比 Accuracy 更重要"
    answer: "b"
    explanation: "Recall（召回率）衡量「實際為正的患者中，模型找出了多少」。在癌症篩檢中，漏診（FN）代價極高；Recall 高意味著盡量不漏診任何真的癌症患者。Precision 和 Recall 是 Trade-off，哪個更重要取決於情境。"
    difficulty: 2
    tags: ["評估指標", "Recall", "Precision"]

  - id: L11301-Q13
    stem: "下列哪一項是「擬合不足（Underfitting）」的典型症狀？"
    options:
      a: "訓練集準確率 98%，測試集準確率 61%"
      b: "訓練集準確率 60%，測試集準確率 58%"
      c: "訓練集準確率 91%，測試集準確率 89%"
      d: "測試集準確率比訓練集準確率高出 10 個百分點"
    answer: "b"
    explanation: "擬合不足（Underfitting）的典型症狀：訓練集和測試集表現都差（兩邊都低）。選項 A 是 Overfitting（訓練高、測試低），選項 C 是 Good Fit（兩者都高）。"
    difficulty: 2
    tags: ["Underfitting", "Overfitting", "泛化"]

  - id: L11301-Q14
    stem: "在機器學習工作流程中，特徵工程（Feature Engineering）主要在哪個階段進行？"
    options:
      a: "資料蒐集與準備階段，在模型訓練之前"
      b: "模型部署之後，用來監控線上效能"
      c: "模型訓練之後，用來解釋模型的預測結果"
      d: "只在測試集評估時才進行"
    answer: "a"
    explanation: "特徵工程（Feature Engineering）屬於資料準備的一部分，在模型訓練之前進行。它將原始資料轉換成模型更容易學習的形式（特徵選擇、特徵萃取、特徵轉換）。"
    difficulty: 2
    tags: ["特徵工程", "ML流程"]

  - id: L11301-Q15
    stem: "工程師在訓練模型時，用測試集的結果回頭調整超參數，然後再測試，重複了幾次。這個做法有什麼主要問題？"
    options:
      a: "沒有問題，使用測試集評估越多次越準確"
      b: "這樣做的計算成本太高，不符合效益"
      c: "這樣做會造成資料洩漏（Data Leakage），讓測試集分數虛高，上線後效能可能遠低預期"
      d: "這樣做會導致擬合不足，因為測試集太小"
    answer: "c"
    explanation: "測試集原則上只能用一次。反覆用測試集結果調模型等於讓模型間接「學到」測試集的資訊——這是資料洩漏（Data Leakage）。應該用驗證集來調整超參數，保持測試集的「全程未知性」。"
    difficulty: 2
    tags: ["測試集", "資料洩漏", "資料切分"]

  - id: L11301-Q16
    stem: "關於「精確率（Precision）」和「召回率（Recall）」的關係，下列何者最正確？"
    options:
      a: "Precision 和 Recall 通常是 Trade-off：提高其中一個往往會降低另一個"
      b: "Precision 和 Recall 總是同方向變化——Precision 高時，Recall 也高"
      c: "Precision 和 Recall 是完全獨立的指標，互不影響"
      d: "只要準確率（Accuracy）高，Precision 和 Recall 必定也高"
    answer: "a"
    explanation: "Precision 和 Recall 通常存在 Trade-off（此消彼長）。提高 Recall（減少漏報）往往需要放寬判斷標準，會增加 FP（誤報），導致 Precision 下降。F1 Score 就是為了在兩者之間取得平衡而設計的。"
    difficulty: 2
    tags: ["Precision", "Recall", "F1", "評估指標"]

  - id: L11301-Q17
    stem: "關於機器學習的「資料切分比例」，下列哪個說法正確？"
    options:
      a: "必須使用 70:15:15（訓練:驗證:測試），否則結果不可靠"
      b: "比例並無硬性規定，常見有 70/15/15 或 80/10/10，依資料量與問題調整"
      c: "測試集必須佔全部資料的一半以上，才能確保評估準確"
      d: "驗證集和測試集可以合併為一個，不需要分開"
    answer: "b"
    explanation: "訓練:驗證:測試的切分比例沒有硬性規定。70/15/15、80/10/10、60/20/20 都是常見例示，實際比例依資料量和問題類型調整。記住原則而非特定數字。"
    difficulty: 2
    tags: ["資料切分", "訓練集", "測試集"]

  - id: L11301-Q18
    stem: "下列哪個例子最能說明「強化學習（Reinforcement Learning）」的應用？"
    options:
      a: "使用一萬張貓咪照片和標籤，訓練模型辨識貓的品種"
      b: "分析顧客購買記錄，自動分群找出高價值客群"
      c: "使用歷史銷售資料預測下個月的業績數字"
      d: "機器人手臂透過不斷嘗試，在摔倒後調整平衡策略，最終學會走路"
    answer: "d"
    explanation: "強化學習的特徵：代理人（機器人）在環境中試錯，透過獎懲（摔倒 = 懲罰；走穩 = 獎勵）調整策略，逐步學會複雜行為。選項 A 是監督式分類，B 是非監督式分群，C 是監督式回歸。"
    difficulty: 2
    tags: ["強化學習", "三大學習範式"]

  - id: L11301-Q19
    stem: "關於機器學習工作流程的特性，下列何者正確？"
    options:
      a: "ML 工作流程是一次性的直線流程，從資料收集到部署，每個步驟只走一次"
      b: "ML 工作流程是循環迭代的，評估不佳或上線後效能退化都需要回頭重新訓練"
      c: "ML 工作流程中，部署是最後一步，部署後就不需要再維護模型"
      d: "ML 工作流程的第一步是模型訓練，訓練完成後再收集資料"
    answer: "b"
    explanation: "ML 工作流程是循環迭代的（iterative loop）。模型評估不佳時回頭訓練；上線後因資料分布改變（概念漂移）效能退化時，需要重新收集資料和重新訓練。不是一次性直線。"
    difficulty: 2
    tags: ["ML流程", "循環迭代"]

  - id: L11301-Q20
    stem: "混淆矩陣（Confusion Matrix）中，「假正例（FP, False Positive）」代表什麼？"
    options:
      a: "模型預測為「正」，且實際上也是「正」的案例（TP）"
      b: "模型預測為「負」，但實際上是「正」的案例（FN）"
      c: "模型預測為「正」，但實際上是「負」的案例（誤報）"
      d: "模型預測為「負」，且實際上也是「負」的案例（TN）"
    answer: "c"
    explanation: "FP（False Positive，假正例）= 模型預測為「正」，但實際為「負」——也就是「誤報」（把無辜的人抓進來）。在垃圾郵件情境中，就是把正常郵件誤判為垃圾信。"
    difficulty: 2
    tags: ["混淆矩陣", "評估指標", "FP", "FN"]

  - id: L11301-Q21
    stem: "某電商平台的詐欺偵測模型，使用了所有歷史交易資料（包括訓練集和測試集）一起訓練後，測試結果非常好。但上線後實際表現很差。最可能的原因是什麼？"
    options:
      a: "模型太簡單，導致擬合不足"
      b: "訓練資料品質太差，需要重新蒐集"
      c: "資料洩漏：測試集和訓練集重疊，模型等於「偷看過」測試答案，評估結果虛胖"
      d: "部署環境和訓練環境的超參數設定不同"
    answer: "c"
    explanation: "若訓練時把測試集也包含進去，模型已經「見過」測試資料，測試分數自然虛高。但上線後遇到真正未見過的資料，表現就會崩盤。這是典型的資料洩漏（Data Leakage）問題——訓練集和測試集不能重疊。"
    difficulty: 3
    tags: ["資料洩漏", "資料切分", "測試集"]

  - id: L11301-Q22
    stem: "一個 AI 模型用來過濾社群媒體上的仇恨言論。目前 Precision = 0.70，Recall = 0.95。若要降低對一般用戶的誤傷（減少正常內容被錯誤刪除），應該優化哪個指標？"
    options:
      a: "提高 Precision——目前有 30% 被標記的內容其實不是仇恨言論（FP 多），提高 Precision 可降低誤傷"
      b: "繼續保持，目前誤傷率已很低（FP 少），不需要調整"
      c: "提高 Recall，讓它更高，才能減少誤傷"
      d: "Precision 和 Recall 已經完美，不需要調整"
    answer: "a"
    explanation: "Precision = 0.70 表示被模型標記為「仇恨言論」的帖子中有 30% 其實是正常內容（FP = 30%）——這就是誤傷。Recall = 0.95 表示幾乎不漏（只漏了 5% 的真實仇恨言論）。要降低誤傷（降低 FP），需要提高 Precision。"
    difficulty: 3
    tags: ["Precision", "Recall", "評估指標", "Trade-off"]

  - id: L11301-Q23
    stem: "為什麼在資料量較少的情況下，K 折交叉驗證（K-Fold Cross-Validation）比單次訓練/驗證切分更受青睞？"
    options:
      a: "因為 K 折可以完全消除過度擬合的問題"
      b: "因為 K 折可以增加訓練資料的總量，讓模型學到更多"
      c: "因為 K 折讓每份資料都輪流當過驗證集，評估結果更穩定可靠，不依賴單次切分的偶然性"
      d: "因為 K 折不需要測試集，節省資料"
    answer: "c"
    explanation: "K-Fold Cross-Validation 把訓練資料分成 K 份，每次用 K-1 份訓練、1 份驗證，重複 K 次後取平均。每份資料都輪流被評估過，結果比單次切分更穩定。特別適合資料量不多時。"
    difficulty: 3
    tags: ["交叉驗證", "K-fold", "評估"]

  - id: L11301-Q24
    stem: "假設你要訓練一個模型偵測生產線上的瑕疵品。訓練集有 10,000 個樣本，其中 9,800 個是良品、200 個是瑕疵品。以下哪個情況最值得警惕？"
    options:
      a: "模型在測試集的 F1 Score 是 0.85，介於 Precision 和 Recall 之間"
      b: "訓練集的準確率比測試集高 2%，有輕微的過度擬合跡象"
      c: "模型在測試集的準確率高達 98%，但所有瑕疵品都被預測為良品（Recall 為 0）"
      d: "模型在測試集的準確率（Accuracy）只有 75%，需要改進"
    answer: "c"
    explanation: "這是類別不均衡（Class Imbalance）的典型陷阱。若模型把所有樣本都預測為良品，Accuracy = 98%（因為良品佔 98%），但 Recall = 0（沒有抓到任何瑕疵品）。在瑕疵偵測中，這等於完全失效。Accuracy 高不代表模型有用——此情境應優先看 Recall。"
    difficulty: 3
    tags: ["評估指標", "Accuracy", "Recall", "類別不均衡"]

  - id: L11301-Q25
    stem: "關於監督式學習中「分類（Classification）」和「回歸（Regression）」的差別，下列何者正確？"
    options:
      a: "分類預測連續數值（如房價），回歸預測離散類別（如是否為垃圾信）"
      b: "分類預測離散類別（如貓/狗），回歸預測連續數值（如明天氣溫）"
      c: "分類需要標籤資料，回歸不需要標籤資料"
      d: "分類和回歸都是非監督式學習的子任務"
    answer: "b"
    explanation: "分類（Classification）輸出離散類別（垃圾信/正常信、良品/瑕疵、貓/狗）；回歸（Regression）輸出連續數值（房價、氣溫、銷售額）。兩者都是監督式學習，都需要標籤資料。"
    difficulty: 3
    tags: ["監督式學習", "分類", "回歸"]

  - id: L11301-Q26
    stem: "一位工程師想判斷模型是否開始過度擬合。在訓練過程中，他應該觀察什麼訊號？"
    options:
      a: "測試集的準確率和模型的參數數量"
      b: "訓練集表現持續改善、但驗證集表現開始變差（損失上升），是開始過度擬合的訊號"
      c: "超參數的數量和訓練資料量是否增加"
      d: "F1 Score 和混淆矩陣中的 FP 數量"
    answer: "b"
    explanation: "過度擬合的訊號：訓練集表現持續改善，但驗證集表現開始變差。這代表模型開始記住訓練資料的細節而失去泛化能力。工程師應在此時點考慮提前停止（Early Stopping）。"
    difficulty: 3
    tags: ["Overfitting", "驗證集", "訓練過程"]

  - id: L11301-Q27
    stem: "線上學習（Online Learning）和批次學習（Batch Learning）的主要差別是什麼？"
    options:
      a: "線上學習只能用在網路相關的應用，批次學習可以用在任何應用"
      b: "批次學習的準確率總是比線上學習高"
      c: "線上學習不需要任何訓練資料，批次學習需要大量資料"
      d: "線上學習每來一筆（或一小批）新資料就即時更新模型；批次學習一次訓練完才部署"
    answer: "d"
    explanation: "批次學習（Batch Learning）一次使用全部資料訓練完畢再上線；線上學習（Online Learning）在上線後持續從新資料更新模型，接近即時。串流平台的即時推薦、詐欺偵測系統是線上學習的典型應用。"
    difficulty: 3
    tags: ["批次學習", "線上學習"]

  - id: L11301-Q28
    stem: "機器學習中的「資料洩漏（Data Leakage）」指的是什麼？"
    options:
      a: "訓練資料從伺服器被外部人員竊取"
      b: "訓練或評估過程中使用了測試集（或未來資訊），導致評估結果虛高，實際上線效能遠差於預期"
      c: "模型的參數被公開，導致競爭對手可以複製"
      d: "特徵工程做得太多，導致資料集太大"
    answer: "b"
    explanation: "資料洩漏（Data Leakage）是指訓練或評估過程中，「不該看到的資訊」（測試集資料、未來資訊）被模型間接接觸，導致評估結果虛胖。上線後遇到真正全新的資料，效能往往遠不如測試時的數字。"
    difficulty: 3
    tags: ["資料洩漏", "測試集", "資料切分"]

  - id: L11301-Q29
    stem: "關於非監督式學習的「降維（Dimensionality Reduction）」，下列何者最能說明其用途？"
    options:
      a: "把高維度的資料壓縮成低維度，保留主要結構，用於視覺化或去除冗餘特徵"
      b: "降低模型的參數數量，讓訓練速度更快"
      c: "把訓練資料量減少，防止過度擬合"
      d: "把分類問題轉換為回歸問題"
    answer: "a"
    explanation: "降維（Dimensionality Reduction）是非監督式學習的子任務之一，將高維資料壓縮成低維空間，保留重要結構。常用於資料視覺化或作為其他 ML 任務的前置處理。"
    difficulty: 3
    tags: ["非監督式學習", "降維", "特徵工程"]

  - id: L11301-Q30
    stem: "在機器學習流程中，模型部署上線後若發現效能逐漸下降（例如：六個月後預測準確率從 91% 降到 74%），最可能的原因是什麼？"
    options:
      a: "伺服器硬體老化，導致計算速度變慢"
      b: "概念漂移（Concept Drift）——現實世界的資料分布隨時間改變，原本的模型越來越不符合現況"
      c: "測試集太小，無法準確預測長期效能"
      d: "模型的超參數在部署後自動改變了"
    answer: "b"
    explanation: "概念漂移（Concept Drift）指現實世界的資料分布隨時間改變，導致用舊資料訓練的模型越來越不適用。解決方法是定期重新訓練。"
    difficulty: 3
    tags: ["ML流程", "部署", "概念漂移"]

  - id: L11301-Q31
    stem: "工程師 A 說：「我們的模型在測試集的 F1 Score 是 0.82，應該可以上線了。」工程師 B 說：「等一下，我想先確認 Precision 和 Recall 各是多少。」工程師 B 為什麼這樣說？"
    options:
      a: "因為 F1 Score 是兩者的調和平均，無法看出兩者個別的情況；某些業務情境下 Recall 極低可能比整體 F1 更關鍵"
      b: "因為 F1 Score 越高代表 Precision 和 Recall 都越高，確認是多此一舉"
      c: "因為 F1 Score 只適用於多分類問題，對二分類問題沒有意義"
      d: "因為只有 Precision 和 Recall 都達到 100% 才代表模型完美"
    answer: "a"
    explanation: "F1 是 Precision 和 Recall 的調和平均，單看 F1 看不出兩者的個別分配。例如 Precision = 0.98、Recall = 0.70，F1 約 0.82，但若業務對 Recall 有嚴格要求（如癌症篩檢不能漏診），這樣的 Recall 可能不達標。"
    difficulty: 5
    tags: ["F1", "Precision", "Recall", "評估指標"]

  - id: L11301-Q32
    stem: "某 ML 模型在測試集上的準確率（Accuracy）達到 99%，但工程師決定不上線使用。以下哪個情況最能解釋這個決定？"
    options:
      a: "模型的訓練時間太長，無法滿足部署需求"
      b: "99% 的準確率對所有情境來說都夠好，工程師決定不對"
      c: "測試集的類別比例嚴重不均衡（99% 是負例），模型全部預測負例就能得到 99% Accuracy，但 Recall 為 0，沒有捕捉到任何正例"
      d: "測試集太大，99% 的 Accuracy 不夠可靠"
    answer: "c"
    explanation: "當資料嚴重不均衡時（如 99% 是負例），一個「永遠預測負例」的模型就能達到 99% Accuracy，但 Recall = 0（正例完全沒被找到）。這種模型毫無用處。說明 Accuracy 在不均衡資料下不可靠，必須配合 Precision/Recall/F1 一起看。"
    difficulty: 5
    tags: ["Accuracy", "Recall", "類別不均衡", "評估指標"]

  - id: L11301-Q33
    stem: "如果一個機器學習模型的訓練集和測試集表現都很差（訓練集 58%、測試集 56%），工程師應該優先採取哪種改善策略？"
    options:
      a: "增加測試集的比例，讓評估更準確"
      b: "使用正則化（Regularization）降低模型複雜度"
      c: "換用更複雜的模型、增加特徵、或延長訓練時間（因為兩邊都差是擬合不足，模型能力不足）"
      d: "只收集更多訓練資料（因為擬合不足往往是資料量不足造成的）"
    answer: "c"
    explanation: "訓練集和測試集都差 → 擬合不足（Underfitting）。原因是模型太簡單，還沒學到資料的規律。解法是增加模型複雜度、改善特徵、延長訓練。（正則化是用來減少 Overfitting 的，在這裡是反效果。）"
    difficulty: 3
    tags: ["Underfitting", "解決策略", "模型訓練"]

  - id: L11301-Q34
    stem: "「半監督式學習（Semi-supervised Learning）」最能描述下列哪種情境？"
    options:
      a: "完全依賴強化學習的獎懲機制，不使用任何標籤資料"
      b: "只使用訓練集，完全不用驗證集或測試集"
      c: "使用 K 折交叉驗證代替傳統的訓練/測試集切分"
      d: "少量已標記資料加上大量未標記資料一起訓練，結合監督式和非監督式的優點"
    answer: "d"
    explanation: "半監督式學習（Semi-supervised Learning）結合少量有標籤資料和大量無標籤資料一起學習，適合「標記資料昂貴但未標記資料豐富」的情境（如醫療影像：有標記的診斷記錄少，但未標記的 X 光片多）。"
    difficulty: 5
    tags: ["半監督式學習", "三大學習範式"]

  - id: L11301-Q35
    stem: "以下哪個描述最能說明「好的特徵工程（Feature Engineering）」對機器學習模型的重要性？"
    options:
      a: "特徵工程只是把資料格式統一，對模型的預測效果影響不大"
      b: "特徵工程等同於資料清理，主要是刪除缺失值"
      c: "特徵工程只在深度學習中重要，傳統機器學習不需要"
      d: "特徵工程能把原始資料中對預測有用的訊號提煉出來，讓模型更容易學到規律；好的特徵設計有時比換用更複雜的模型效果更顯著"
    answer: "d"
    explanation: "特徵工程是把原始資料轉換成模型更容易學習的形式（選擇、萃取、轉換有用特徵）。從「日期」欄位衍生出「是否為週末」「是否為節日」等特徵，對銷售預測模型有很大幫助。好的特徵設計有時能超越純粹換更大模型帶來的效果提升。"
    difficulty: 4
    tags: ["特徵工程", "ML流程", "模型效能"]
