    difficulty: 4
    tags: ["差分隱私", "PET", "初級範圍邊界"]

  - id: L11203-Q28
    stem: "某公司在蒐集用戶個資時，隱私政策措辭模糊，使用「提升服務品質」作為唯一的蒐集目的說明。此行為違反了OECD隱私原則中的哪一項，以及對應的台灣個資法哪個條文精神？"
    options:
