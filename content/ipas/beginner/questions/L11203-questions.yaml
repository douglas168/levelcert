  - id: L11203-Q32
    stem: "一家新創公司正在設計用戶資料管理系統，他們面臨以下決策：蒐集盡可能多的用戶資料以便未來分析，還是僅蒐集服務運作所需的最少資料。從GDPR「資料最小化原則（Data Minimisation）」和OECD「限制蒐集原則（Collection Limitation）」的角度，哪種決策符合兩套框架的精神？"
    options:
      a: "蒐集盡可能多的資料，以最大化未來商業價值"
      b: "僅蒐集服務運作所必要的最少資料，符合兩套框架的精神"
      c: "GDPR和OECD在此問題上立場相反，需分別處理"
      d: "只要有用戶同意，蒐集多少資料都合法"
    answer: "b"
    explanation: "GDPR的「資料最小化原則」和OECD的「限制蒐集原則」精神一致：只蒐集達成特定目的所必要的個資，不得過度蒐集（即使用戶同意也不能無限蒐集，需有合理目的）。「存起來以後再說」的心態違反這兩個原則。符合規定的做法是識別必要資料範圍後只蒐集必要的。"
    difficulty: 4
    tags: ["資料最小化", "GDPR原則", "OECD原則", "設計決策"]

  - id: L11203-Q33
    stem: "一家醫療AI公司計劃使用匿名化後的病患資料訓練疾病診斷模型。研究人員指出，雖然直接識別符（姓名、身分證號）已刪除，但結合「年齡、稀有疾病類別、特定縣市」這三項資訊，仍可能再識別出部分特殊病患。此情境最準確說明了什麼問題？"
    options:
      a: "即使已刪除識別符，若仍有交叉比對再識別的可能，資料可能並非真正的匿名化，隱私風險仍存在"
      b: "只要刪除了直接識別符，資料就自動達到匿名化標準，不需再考慮隱私問題"
      c: "這只是技術問題，法律上只要刪除姓名身分證就算匿名化"
      d: "此情境與假名化相同，因為有可能透過輔助資訊還原"
    answer: "a"
    explanation: "此題說明匿名化的真正標準：不只是刪除直接識別符，而是確保透過任何合理手段（包含交叉比對）都無法重新識別特定個人。若仍有再識別可能（如結合稀有疾病+年齡+縣市），則資料尚未達到真正匿名化。這是資料去識別化實務中的核心挑戰。資料若有再識別可能，仍在個資法管轄範圍內。"
    difficulty: 5
    tags: ["匿名化", "再識別風險", "去識別化標準", "評估"]

