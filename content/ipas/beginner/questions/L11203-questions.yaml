  - id: L11203-Q27
    stem: "某研究機構希望利用「差分隱私（Differential Privacy）」技術對人口統計資料集進行隱私保護後公開發布。從初級IPAS考試範圍的角度，以下哪項陳述最能說明差分隱私在資料隱私保護中的概念定位？"
    options:
      a: "差分隱私是假名化的另一種稱呼，屬於可逆的資料保護技術"
