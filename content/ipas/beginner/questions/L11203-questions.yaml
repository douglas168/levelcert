  - id: L11203-Q30
    stem: "以下關於「隱私設計（Privacy by Design）」核心概念的描述，哪一項最符合其精神？"
    options:
      a: "先快速推出產品，等收到用戶投訴後再修正隱私問題"
      b: "隱私保護措施只需在涉及敏感資料時才需要考慮"
      c: "在系統和產品設計的最初階段就將隱私保護納入，而非事後補救"
      d: "隱私保護只是法律合規問題，技術設計人員不需要關心"
    answer: "c"
    explanation: "隱私設計（Privacy by Design，PbD）的核心精神是「主動預防而非事後補救（Proactive not Reactive）」，要求在系統、產品或服務設計的最早階段就將隱私保護機制內嵌其中，而非在功能開發完成後或問題發生後才處理隱私問題。這是目前全球主流隱私保護框架（包括GDPR）認可的設計原則。"
    difficulty: 4
    tags: ["隱私設計", "Privacy by Design", "設計原則"]

