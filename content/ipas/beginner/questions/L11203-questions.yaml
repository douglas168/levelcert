      c: "違反資料品質原則，對應個資法第11條"
      d: "違反責任原則，對應個資法第47、48條"
    answer: "b"
    explanation: "OECD目的明確化原則要求蒐集個資前，必須明確說明（不能模糊）具體的使用目的。「提升服務品質」過於籠統，不符合此原則。對應台灣個資法第5條（特定目的）和第8條（告知義務）——蒐集個資必須有明確且具體的特定目的，並在蒐集時告知當事人。"
    difficulty: 4
    tags: ["OECD原則", "目的明確化原則", "告知義務", "個資法第8條"]

  - id: L11203-Q29
    stem: "某企業同時面向台灣市場和歐盟市場提供服務，需同時符合台灣個資法與GDPR。下列哪項說法正確描述了兩套法規的主要差異，並能幫助企業做出正確的合規決策？"
    options:
      a: "GDPR比台灣個資法多了資料可攜權（Right to Data Portability）和更多特種個資類別（含種族/宗教/政治），合規標準通常更高"
