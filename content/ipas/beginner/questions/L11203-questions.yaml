      c: "因為資料是從公開網路爬取，所以不受個資法管轄"
      d: "這只是GDPR的問題，台灣個資法不管AI模型"
    answer: "b"
    explanation: "這是典型的「模型記憶（Model Memorization）」問題：AI模型將訓練資料中的個資記憶下來，可被誘導輸出，直接破壞個資的機密性（CIA中的C）。依台灣個資法第20-1條（2025年修法後條號，原第27條已刪除），非公務機關持有個資必須採取適當安全措施防止個資外洩，因此AI公司可能違反安全維護義務。即使資料來自公開網路，個人的個資仍受個資法保護。"
