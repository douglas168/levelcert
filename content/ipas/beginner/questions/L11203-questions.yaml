topic: L11203
topic_name: 資料隱私與安全
level: beginner
questions:
  - id: L11203-Q01
    stem: "依台灣《個人資料保護法》（個資法，Personal Data Protection Act）第6條，下列哪一類別「不屬於」特種個資？"
    options:
      a: "病歷資料"
      b: "基因資料"
      c: "宗教信仰"
      d: "犯罪前科"
    answer: "c"
    explanation: "台灣個資法第6條特種個資只有6類：病歷、醫療、基因、性生活、健康檢查、犯罪前科。宗教信仰是GDPR第9條的敏感類別，但台灣個資法刻意未納入，是最常見的考試陷阱。"
    difficulty: 1
    tags: ["特種個資", "個資法第6條", "GDPR差異"]

  - id: L11203-Q02
    stem: "資訊安全CIA三元素（CIA Triad）包含哪三個核心要素？"
    options:
      a: "機密性（Confidentiality）、完整性（Integrity）、可用性（Availability）"
      b: "機密性（Confidentiality）、認證性（Authentication）、可用性（Availability）"
      c: "機密性（Confidentiality）、完整性（Integrity）、當責性（Accountability）"
      d: "保密性（Secrecy）、完整性（Integrity）、可用性（Availability）"
    answer: "a"
    explanation: "CIA三元素是資訊安全的核心框架：C=機密性（只有授權者能存取）、I=完整性（資料未被未授權修改）、A=可用性（授權者在需要時能正常使用）。認證性和當責性不在CIA三元素之列。"
    difficulty: 1
    tags: ["CIA三元素", "資訊安全基礎"]

  - id: L11203-Q03
    stem: "OECD（Organisation for Economic Co-operation and Development，經濟合作暨發展組織）隱私保護指導原則共有幾項？"
    options:
      a: "5項"
      b: "7項"
      c: "8項"
      d: "9項"
    answer: "c"
    explanation: "OECD於1980年發布（2013年修訂）的隱私保護指導原則共有8項，包括限制蒐集、資料品質、目的明確化、限制利用、安全保護、公開、個人參加、責任原則。7項是GDPR的原則數量，是常見混淆點。"
    difficulty: 1
    tags: ["OECD原則", "數字陷阱"]

  - id: L11203-Q04
    stem: "依台灣《個人資料保護法》第2條定義，「蒐集（Collection）」是指下列何種行為？"
    options:
      a: "以任何方式取得個人資料"
      b: "為建立個資檔案所為的輸入、儲存、編輯、刪除等內部操作"
      c: "將個人資料提供給第三方使用"
      d: "對個人資料進行加密或去識別化處理"
    answer: "a"
    explanation: "個資法第2條定義：蒐集是指「以任何方式取得個人資料」，是取得資料的行為。輸入/儲存/編輯等內部操作是「處理」，提供給第三方是「利用」，這三個定義不可混淆。"
    difficulty: 1
    tags: ["蒐集處理利用", "個資法第2條"]

  - id: L11203-Q05
    stem: "台灣《個人資料保護法》第3條賦予當事人的法定權利共有幾項？"
    options:
      a: "3項"
      b: "8項"
      c: "7項"
      d: "5項"
    answer: "d"
    explanation: "個資法第3條規定當事人享有5項法定權利：查詢或請求閱覽、請求製給複製本、請求補充或更正、請求停止蒐集處理或利用、請求刪除。口訣「查複補停刪」。7項是GDPR的資料主體權利數量。"
    difficulty: 1
    tags: ["當事人權利", "個資法第3條", "數字陷阱"]

  - id: L11203-Q06
    stem: "GDPR（General Data Protection Regulation，一般資料保護規則）共規定了幾項個人資料處理原則？"
    options:
      a: "6項"
      b: "9項"
      c: "8項"
      d: "7項"
    answer: "d"
    explanation: "GDPR第5條規定7項個人資料處理原則：合法性/公平性/透明性、目的限制、資料最小化、正確性、儲存期限限制、完整性與機密性、當責性。OECD有8項，GDPR有7項，「OECD 8，GDPR 7，老多新少」。"
    difficulty: 1
    tags: ["GDPR原則", "數字陷阱", "OECD比較"]

  - id: L11203-Q07
    stem: "下列關於「匿名化（Anonymization）」的敘述，何者正確？"
    options:
      a: "匿名化後的資料仍受台灣個資法保護"
      b: "匿名化是可逆的，持有鑰匙者可還原原始資料"
      c: "匿名化後資料無法再識別個人，脫離個資法保護範圍"
      d: "匿名化與假名化的法律效果相同"
    answer: "c"
    explanation: "真正的匿名化指資料與個人的連結被永久且不可逆地切斷，無法透過任何手段重新識別當事人，因此脫離個資法和GDPR的管轄範圍。假名化是可逆的（對照表存在），仍受法律管轄，與匿名化效果不同。"
    difficulty: 1
    tags: ["匿名化", "去識別化", "個資法範圍"]

  - id: L11203-Q08
    stem: "台灣個資法保護的對象為何？"
    options:
      a: "僅保護自然人的個人資料"
      b: "自然人與法人均受保護"
      c: "僅保護本國國民，不含外籍人士"
      d: "僅保護在台灣境內的個人資料"
    answer: "a"
    explanation: "台灣個資法第2條明確定義個人資料是「自然人」的資料。法人（公司、機構、社團等）的相關資料不在個資法保護範圍內。公司財務資料由公司法、商業秘密法等其他法律保護。"
    difficulty: 1
    tags: ["個資法定義", "自然人", "個資法第2條"]

  - id: L11203-Q09
    stem: "依台灣《個人資料保護法》第2條，下列何者屬於「處理（Processing）」的行為？"
    options:
      a: "填寫報名表單，取得個人資料"
      b: "將客戶資料寄給合作廠商使用"
      c: "將個人資料輸入資料庫並更新地址欄位"
      d: "請求刪除不正確的個人資料"
    answer: "c"
    explanation: "個資法第2條定義「處理」為：為建立或利用個資檔案所為的記錄、輸入、儲存、編輯、更正、複製、檢索、刪除、輸出、連結或內部傳送。輸入資料庫並更新是內部資料操作，屬於「處理」。選A是「蒐集」，選B是「利用」。"
    difficulty: 2
    tags: ["蒐集處理利用", "個資法第2條", "處理定義"]

  - id: L11203-Q10
    stem: "下列哪一項屬於台灣個資法第6條所定義的「特種個資（Sensitive Personal Data）」？"
    options:
      a: "政治立場"
      b: "種族背景"
      c: "健康檢查報告"
      d: "宗教信仰"
    answer: "c"
    explanation: "台灣個資法第6條特種個資只有6類：病歷、醫療、基因、性生活、健康檢查、犯罪前科。健康檢查報告屬於「健康檢查」類。政治立場、種族背景、宗教信仰是GDPR的敏感類別，但台灣個資法刻意未納入。"
    difficulty: 2
    tags: ["特種個資", "個資法第6條", "GDPR差異"]

  - id: L11203-Q11
    stem: "依OECD「限制利用原則（Use Limitation Principle）」，下列哪一場景違反了此原則？"
    options:
      a: "醫院將病患就醫紀錄用於院內品質改善（屬於告知目的範圍）"
      b: "政府機關依法將公民資料提供給其他機關辦理社福業務"
      c: "企業將員工通訊資料用於告知的資訊安全稽核"
      d: "電商平台未經顧客同意，將購物資料轉售給保險公司用於核保"
    answer: "d"
    explanation: "OECD限制利用原則要求個人資料不得用於超出蒐集時特定目的以外的用途，除非獲得當事人同意或有法律依據。將購物資料未經同意轉售給保險公司，明顯超出原始目的，違反此原則。"
    difficulty: 2
    tags: ["OECD原則", "限制利用原則", "目的限制"]

  - id: L11203-Q12
    stem: "下列關於「假名化（Pseudonymization）」的描述，哪一項正確？"
    options:
      a: "假名化後的資料在GDPR下仍屬個人資料"
      b: "假名化後的資料，任何人都無法還原原始身分"
      c: "台灣個資法明確定義了假名化的操作標準"
      d: "假名化後的資料與匿名化後的資料法律效果相同"
    answer: "a"
    explanation: "假名化是將識別符替換成假名，但對照表另外保存（可逆）。GDPR明確規定假名化資料仍屬個人資料，GDPR依然適用。台灣個資法未明確定義假名化術語。只有完全匿名化（對照表永久銷毀）才脫離個資法。"
    difficulty: 2
    tags: ["假名化", "去識別化", "GDPR"]

  - id: L11203-Q13
    stem: "DAD威脅模型中，「Alteration（竄改）」對應CIA三元素的哪一項？"
    options:
      a: "機密性（Confidentiality）"
      b: "當責性（Accountability）"
      c: "可用性（Availability）"
      d: "完整性（Integrity）"
    answer: "d"
    explanation: "DAD（Disclosure/Alteration/Denial）是CIA的對立威脅模型：D洩漏威脅機密性C、A竄改威脅完整性I、D阻斷威脅可用性A。竄改（Alteration）指未授權修改資料，直接破壞資料的完整性（Integrity）。"
    difficulty: 2
    tags: ["DAD威脅模型", "CIA三元素", "完整性"]

  - id: L11203-Q14
    stem: "台灣設立「個人資料保護委員會（PDPC）」的主要法律依據來自何處？"
    options:
      a: "2022年憲法法庭判決要求設立獨立個資監督機關"
      b: "2010年個資法大修時即明定，設於行政院下"
      c: "因應GDPR施行而自動比照歐盟設立"
      d: "數位發展部2023年依職權自行設立"
    answer: "a"
    explanation: "2022年憲法法庭111年憲判字第13號判決認定缺乏獨立個資監督機關有違憲之虞，要求設立。2023年5月立法院通過修法，同年12月5日個資會籌備處正式揭牌。觸發成立的是憲法法庭判決，非GDPR或主動修法。"
    difficulty: 2
    tags: ["PDPC", "個資保護委員會", "憲法法庭"]

  - id: L11203-Q15
    stem: "個資法第3條規定，當事人請求「查詢或請求閱覽」個資時，企業最遲應在幾天內回應？"
    options:
      a: "7天"
      b: "60天"
      c: "30天"
      d: "15天"
    answer: "d"
    explanation: "個資法第10條規定，對於查詢、閱覽、製給複製本的請求，應在15天內為之（若有正當理由得延長15天並書面通知）。補充/更正/刪除/停止的請求，依第11條規定為30天。"
    difficulty: 2
    tags: ["當事人權利", "回應期限", "個資法第10條"]

  - id: L11203-Q16
    stem: "依2025年修法後的台灣個資法，企業發生個資外洩，知悉後多少時間內必須完成雙軌通報？"
    options:
      a: "知悉後24小時"
      b: "知悉後48小時"
      c: "知悉後7個工作日"
      d: "知悉後72小時"
    answer: "d"
    explanation: "2025年修法新增72小時雙軌通報義務：知悉個資外洩後72小時內，必須同時（1）通知受影響當事人，（2）向個資保護委員會（PDPC）報告。時限從「知悉」起算，假日不停計。修法前無此固定期限。"
    difficulty: 2
    tags: ["資料外洩通報", "72小時通報", "2025修法"]

  - id: L11203-Q17
    stem: "某公司網站遭受DDoS（Distributed Denial of Service，分散式阻斷服務）攻擊，導致網站連續6小時無法存取。以CIA三元素分析，此攻擊主要破壞了哪項安全性質？"
    options:
      a: "機密性（Confidentiality）"
      b: "完整性（Integrity）"
      c: "可用性（Availability）"
      d: "以上三項均等破壞"
    answer: "c"
    explanation: "DDoS攻擊透過大量請求使服務癱瘓，目的是讓授權用戶無法正常使用系統，直接破壞可用性（Availability）。對應DAD威脅模型中的「Denial（阻斷）」。此攻擊本身不竊取資料（不破壞機密性），也不修改資料（不破壞完整性）。"
    difficulty: 3
    tags: ["CIA三元素", "可用性", "DDoS", "情境判斷"]

  - id: L11203-Q18
    stem: "一位員工在處理客戶服務時，將包含100位客戶姓名、電話、購買紀錄的Excel檔案，複製貼上到免費版ChatGPT對話框中，請ChatGPT協助撰寫個別化感謝信。這個行為最可能違反台灣個資法的哪項規定？"
    options:
      a: "第6條——涉及特種個資蒐集"
      b: "第8條——未履行告知義務"
      c: "第20-1條——未採取適當安全措施維護個資（2025修法，原第27條已刪除）"
      d: "第3條——侵害客戶的查詢閱覽權"
    answer: "c"
    explanation: "個資法第20-1條（2025年修法後條號，原第27條已刪除）要求非公務機關須採取適當安全措施防止個資遭未授權存取或外洩。將客戶個資上傳至外部AI服務（免費版可能用於訓練或資料外洩），等於未盡安全維護義務，違反第20-1條。姓名、電話、購買紀錄不屬於特種個資，故A錯。"
    difficulty: 3
    tags: ["AI隱私風險", "個資法第20-1條", "情境判斷"]

  - id: L11203-Q19
    stem: "某醫院進行大型流行病學研究，將所有病患資料中的姓名、身分證號、聯絡方式全部刪除，並銷毀所有對照表，只保留「患者代碼、疾病類別、年齡範圍、縣市」等統計資料，提供給學術機構研究。此資料處理方式對個資法的法律意涵為何？"
    options:
      a: "屬於真正匿名化，資料已脫離個資法保護範圍"
      b: "仍屬假名化，對照表雖然銷毀但仍受個資法管轄"
      c: "違反個資法第8條，未告知資料主體利用目的"
      d: "僅適用GDPR，台灣個資法不適用此情境"
    answer: "a"
    explanation: "對照表已永久銷毀、識別符完全刪除，任何人都無法透過合理手段重新識別特定個人，這符合「真正匿名化（Anonymization）」的定義。真正匿名化後的資料不再是個人資料，脫離個資法管轄範圍，可自由用於學術研究。"
    difficulty: 3
    tags: ["匿名化", "去識別化", "個資法範圍", "情境判斷"]

  - id: L11203-Q20
    stem: "某銀行在會員申請書中加入條款：「本人同意放棄《個人資料保護法》第3條所賦予之所有資料權利。」此條款的法律效力為何？"
    options:
      a: "有效，當事人已明示同意放棄"
      b: "部分有效，只有刪除權可以預先放棄"
      c: "有效，但僅限金融機構適用此例外"
      d: "無效，第3條明定這些權利不得以契約預先排除"
    answer: "d"
    explanation: "個資法第3條明確規定，當事人依該條所享有的5項法定權利（查詢閱覽、製給複製本、補充更正、停止蒐集處理利用、刪除）「不得預先拋棄或以特約限制之」。因此讓當事人預先簽名放棄這些權利的合約條款，對此部分無效。"
    difficulty: 3
    tags: ["當事人權利", "個資法第3條", "合約限制"]

  - id: L11203-Q21
    stem: "某電商平台在隱私政策中聲明蒐集用戶的購物行為資料「用於個人化推薦服務」。三年後，該平台決定將這批歷史購物資料出售給保險公司，用於風險評估模型訓練。此行為違反了哪項隱私保護原則？"
    options:
      a: "限制蒐集原則（Collection Limitation）"
      b: "安全保護原則（Security Safeguards）"
      c: "資料品質原則（Data Quality）"
      d: "目的明確化原則（Purpose Specification）與限制利用原則（Use Limitation）"
    answer: "d"
    explanation: "電商平台已明確告知蒐集目的為「個人化推薦服務」，後來卻用於保險公司的風險評估，同時違反了OECD的「目的明確化原則」（未維持目的的明確性）和「限制利用原則」（超出原始告知目的利用資料）。此行為在台灣個資法下亦屬超出蒐集目的的「利用」行為。"
    difficulty: 3
    tags: ["OECD原則", "目的限制", "限制利用原則", "情境判斷"]

  - id: L11203-Q22
    stem: "某公司將客戶個資資料庫從舊系統遷移至新系統，過程中由工程師將資料檔案複製到臨時伺服器，並在完成後刪除臨時檔案。依台灣個資法第2條，「複製到臨時伺服器」和「刪除臨時檔案」分別屬於哪種行為？"
    options:
      a: "蒐集；利用"
      b: "蒐集；處理"
      c: "利用；蒐集"
      d: "處理；處理"
    answer: "d"
    explanation: "個資法第2條定義「處理」包含：記錄、輸入、儲存、編輯、更正、複製、檢索、刪除、輸出、連結或內部傳送。「複製到臨時伺服器」屬於複製（處理），「刪除臨時檔案」屬於刪除（處理）。兩者都是個資的內部操作，均屬「處理」。"
    difficulty: 3
    tags: ["蒐集處理利用", "個資法第2條", "處理定義"]

  - id: L11203-Q23
    stem: "以下哪種情境中，資料安全（Security）做得好，但隱私（Privacy）仍然被侵犯？"
    options:
