    stem: "某政府機關AI助理系統暴露了一個提示詞注入（Prompt Injection）漏洞，攻擊者可誘導系統洩漏存儲在系統提示詞中的機密政策和公民個人資料。從隱私與安全的多層面分析，此事件涉及哪些問題的組合最完整？"
