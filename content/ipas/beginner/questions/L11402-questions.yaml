    explanation: "將鑑別式AI的輸出（plagiarism_score、suspicious_sentences）作為上下文塞進生成式AI的提示詞中，這正是Context Injection（上下文注入）的用途——把鑑別式的分析結果「注入」到生成式的輸入，讓生成式能基於鑑別結果產生相關的個人化回覆。"
