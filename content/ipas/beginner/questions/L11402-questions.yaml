    answer: "d"
    explanation: "這是資料流設計（Data Flow Design）問題：鑑別式AI輸出JSON格式，但生成式AI的提示詞設計只接受純文字，兩個模組之間的「介面」不對齊，導致系統無法正常串接。解決方案是在提示工程中設計格式轉換，或要求鑑別式輸出生成式可直接使用的格式。"
