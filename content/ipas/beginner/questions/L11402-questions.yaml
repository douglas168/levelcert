topic: L11402
topic_name: 鑑別式AI與生成式AI的整合應用
level: beginner
questions:

  # ── D1 記憶題（8題）──────────────────────────────────────

  - id: L11402-Q01
    stem: "RAG（Retrieval-Augmented Generation，檢索增強生成）中，「R」代表哪個環節？"
    options:
      a: "Retrieval（從知識庫檢索相關資料）"
      b: "Response（生成式AI的回應輸出）"
      c: "Ranking（對候選答案進行排名）"
      d: "Reasoning（模型的推理過程）"
    answer: "a"
    explanation: "RAG 的 R = Retrieval（檢索），是鑑別式AI的工作——在知識庫中搜尋比對相關文件；A = Augmented（增強）；G = Generation（生成式回答）。"
    difficulty: 1
    tags: ["RAG", "retrieval", "integration"]

  - id: L11402-Q02
    stem: "語音合成（TTS，Text-to-Speech）屬於下列哪一種AI類型的應用？"
    options:
      a: "鑑別式AI，因為它需要辨識語音內容"
      b: "監督式學習的分類任務"
      c: "強化學習"
      d: "生成式AI，因為它創造出新的語音內容"
    answer: "d"
    explanation: "TTS 的任務是從文字「生成」語音——產出全新的音訊內容，是典型的生成式AI應用。ASR（語音辨識）才是鑑別式，方向相反：ASR 是聲音→文字，TTS 是文字→聲音。"
    difficulty: 1
    tags: ["TTS", "speech", "generative"]

  - id: L11402-Q03
    stem: "下列哪一個整合模式的流程是：生成式AI先產生合成訓練資料，再幫助鑑別式AI訓練？"
    options:
      a: "串聯模式（Pipeline）"
      b: "並聯模式（Parallel）"
      c: "RAG 模式"
      d: "強化模式（Augmentation）"
    answer: "d"
    explanation: "強化模式（Augmentation）的核心是：生成式AI先合成資料（如 GAN 合成罕見瑕疵圖片），再把合成資料混入真實資料，幫助鑑別式AI訓練得更好。"
    difficulty: 1
    tags: ["augmentation", "synthetic-data", "integration"]

  - id: L11402-Q04
    stem: "在GAN（Generative Adversarial Network，生成對抗網路）的架構中，鑑別器（Discriminator）的角色是什麼？"
    options:
      a: "生成逼真的假資料"
      b: "監控生成器的記憶體使用量"
      c: "判斷輸入資料是真實的還是生成的"
      d: "將生成器輸出轉換成不同格式"
    answer: "c"
    explanation: "GAN 中的鑑別器扮演鑑別式AI的角色，負責區分真實資料與生成器產出的假資料，是一個二元分類任務。生成逼真假資料是生成器（Generator）的角色。"
    difficulty: 1
    tags: ["GAN", "discriminator", "discriminative"]

  - id: L11402-Q05
    stem: "在ASR→NLP→TTS 的智慧客服管線中，哪個步驟屬於生成式AI？"
    options:
      a: "ASR（自動語音辨識）"
      b: "NLP 的意圖分類環節"
      c: "TTS（語音合成）"
      d: "以上三者都是鑑別式AI"
    answer: "c"
    explanation: "TTS（Text-to-Speech，文字轉語音）是生成式AI——它「創造」出新的聲音內容。ASR（語音辨識）是鑑別式AI（聲音→文字）。NLP 中的意圖分類是鑑別式，回覆生成是生成式。"
    difficulty: 1
    tags: ["pipeline", "TTS", "ASR", "generative"]

  - id: L11402-Q06
    stem: "下列哪一行業應用中，鑑別式AI負責「詐欺偵測」、生成式AI負責「風險報告撰寫」？"
    options:
      a: "醫療行業"
      b: "製造行業"
      c: "教育行業"
      d: "金融行業"
    answer: "d"
    explanation: "金融行業的典型整合：鑑別式AI負責詐欺偵測（Fraud Detection）和信用評分，生成式AI負責風險報告自動生成和個人化客服對話。"
    difficulty: 1
    tags: ["finance", "industry", "integration"]

  - id: L11402-Q07
    stem: "提示工程中的「Context Injection（上下文注入）」主要用途為何？"
    options:
      a: "訓練鑑別式AI模型的新分類類別"
      b: "將鑑別式AI的分析結果注入生成式AI的提示詞輸入"
      c: "替換生成式AI的模型權重"
      d: "監控系統延遲並自動優化"
    answer: "b"
    explanation: "Context Injection（上下文注入）是把鑑別式AI的輸出結果（如詐欺評分、意圖分類）塞進生成式AI的提示詞，讓生成式AI能根據鑑別結果產生更精準的回覆。"
    difficulty: 1
    tags: ["prompt-engineering", "context-injection", "integration"]

  - id: L11402-Q08
    stem: "下列哪一項是整合式AI系統的「幻覺（Hallucination）」問題的正確描述？"
    options:
      a: "鑑別式AI分類錯誤，把良品判成不良品"
      b: "生成式AI產生不準確或憑空捏造的內容"
      c: "系統延遲過高，導致使用者等待太久"
      d: "並聯模式中兩個模型的輸出無法融合"
    answer: "b"
    explanation: "幻覺（Hallucination）是生成式AI特有的問題：模型可能生成聽起來合理但實際上不正確或不存在的內容。這是整合系統中需要特別注意的挑戰。"
    difficulty: 1
    tags: ["hallucination", "generative", "challenge"]

  # ── D2 理解題（9題）──────────────────────────────────────

  - id: L11402-Q09
    stem: "關於RAG整合模式，下列敘述何者正確？"
    options:
      a: "RAG 屬於純生成式技術，因為其名稱包含Generation"
      b: "RAG 的檢索環節（R）屬於鑑別式AI的工作，生成環節（G）屬於生成式AI"
      c: "RAG 只使用鑑別式AI，不需要任何生成模型"
      d: "RAG 主要用於提升鑑別式AI的分類準確率"
    answer: "b"
    explanation: "RAG = Retrieval（檢索，鑑別式）+ Augmented（增強）+ Generation（生成，生成式）。R 是在知識庫中搜尋比對相關文件（鑑別式工作），G 是根據檢索結果產生自然語言答案（生成式工作）。"
    difficulty: 2
    tags: ["RAG", "discriminative", "generative"]

  - id: L11402-Q10
    stem: "關於智慧客服的ASR→NLP→TTS管線，下列敘述何者正確？"
    options:
      a: "三個步驟都是生成式AI的應用"
      b: "TTS 負責將語音轉為文字，ASR 負責將文字轉為語音"
      c: "ASR 是鑑別式（語音辨識），TTS 是生成式（語音合成），兩者方向相反"
      d: "此管線只使用鑑別式AI，不涉及生成技術"
    answer: "c"
    explanation: "ASR（自動語音辨識）把聲音轉文字，屬於鑑別式AI（辨識/分類）；TTS（語音合成）把文字轉聲音，屬於生成式AI（創造語音內容）。兩者方向完全相反，是考試常見陷阱。"
    difficulty: 2
    tags: ["pipeline", "ASR", "TTS", "discriminative-generative"]

  - id: L11402-Q11
    stem: "製造業用生成式AI合成大量罕見瑕疵圖片，再混入真實資料訓練品檢AI。這個流程屬於哪種整合模式？"
    options:
      a: "串聯模式（Pipeline）"
      b: "強化模式（Augmentation）"
      c: "RAG 模式"
      d: "並聯模式（Parallel）"
    answer: "b"
    explanation: "強化模式（Augmentation）的定義：生成式AI先合成訓練資料，幫助鑑別式AI訓練。工廠瑕疵品案例中，真實瑕疵品極少，GAN 合成假瑕疵圖片 → 擴充訓練集 → 品檢鑑別式AI效果提升，是強化模式的典型。"
    difficulty: 2
    tags: ["augmentation", "manufacturing", "GAN"]

  - id: L11402-Q12
    stem: "為什麼RAG能降低生成式AI的幻覺（Hallucination）風險？"
    options:
      a: "因為RAG會重新訓練生成模型的參數，修正錯誤知識"
      b: "因為RAG讓生成模型基於實際檢索到的文件內容回答，而非完全依賴模型內部記憶"
      c: "因為RAG的鑑別器會自動過濾掉不正確的生成內容"
      d: "因為RAG強制生成模型只輸出既定的答案模板"
    answer: "b"
    explanation: "RAG 讓生成模型在回答前先從知識庫檢索相關文件，然後基於這些文件來生成答案，而不是完全依賴訓練時記住的知識。有了真實文件作為依據，幻覺風險大幅降低（但無法完全消除）。"
    difficulty: 2
    tags: ["RAG", "hallucination", "retrieval"]

  - id: L11402-Q13
    stem: "串聯模式（Pipeline）中，若生成式AI步驟需要4秒、鑑別式AI步驟需要1秒，整體管線延遲約為多少？"
    options:
      a: "1秒（只算最慢的步驟）"
      b: "2.5秒（取平均）"
      c: "5秒（累加所有步驟）"
      d: "4秒（只算生成式AI的延遲）"
    answer: "c"
    explanation: "串聯模式中，各步驟必須依序執行，延遲是累加型的：1秒（鑑別式）+ 4秒（生成式）= 5秒。這就是為什麼串聯管線中生成式AI步驟是延遲瓶頸——每個步驟都要等前一步完成才能開始。"
    difficulty: 2
    tags: ["latency", "pipeline", "challenge"]

  - id: L11402-Q14
    stem: "下列哪一個說法正確描述了GAN（生成對抗網路）與「純生成式AI」的區別？"
    options:
      a: "GAN 是純生成式AI，因為最終目的是生成高品質圖片"
      b: "GAN 內部同時包含生成器（生成式）和鑑別器（鑑別式），是整合應用的典型"
      c: "GAN 是純鑑別式AI，因為它的鑑別器才是核心"
      d: "GAN 只在訓練時用到鑑別器，推論時是純生成式AI"
    answer: "b"
    explanation: "GAN 由兩個部分組成：生成器（Generator，生成式）和鑑別器（Discriminator，鑑別式）。兩者相互對抗共同演進，是鑑別式+生成式整合的最經典範例。即使考題問GAN，答案涉及『鑑別+生成』時要選整合應用。"
    difficulty: 2
    tags: ["GAN", "discriminator", "generator", "integration"]

  - id: L11402-Q15
    stem: "企業客服系統「先用AI辨別客戶意圖（退貨/查訂單/投訴），再生成對應的個人化回覆」，這屬於哪種整合模式？"
    options:
      a: "並聯模式（Parallel）"
      b: "強化模式（Augmentation）"
      c: "RAG 模式"
      d: "串聯模式（Pipeline）"
    answer: "d"
    explanation: "先辨別意圖（鑑別式：分類任務）→ 再生成回覆（生成式）——前一步的輸出作為後一步的輸入，有明確的先後順序，是串聯模式（Pipeline）。"
    difficulty: 2
    tags: ["pipeline", "intent-classification", "generative"]

  - id: L11402-Q16
    stem: "下列哪一個情況最適合使用並聯模式（Parallel Integration）？"
    options:
      a: "必須先辨識圖片內容，才能根據內容生成說明文字"
      b: "先生成合成資料，再用合成資料訓練分類模型"
      c: "情感分析和摘要生成任務可以同時對同一篇文章執行，最後合併輸出"
      d: "先從知識庫搜尋相關文件，再根據文件生成回答"
    answer: "c"
    explanation: "並聯模式中，兩個AI任務不互相依賴，可以同時平行執行，最後融合結果。情感分析（鑑別式）和摘要生成（生成式）都以同一篇文章為輸入，不需要等待對方，可以同時跑，符合並聯模式。"
    difficulty: 2
    tags: ["parallel", "integration", "concurrent"]

  - id: L11402-Q17
    stem: "系統提示（System Prompt）在整合AI系統中的主要作用是什麼？"
    options:
      a: "為鑑別式AI提供分類標籤的定義"
      b: "設定生成式AI的角色、行為規範和輸出格式"
      c: "替換整合系統的向量資料庫內容"
      d: "監測整合系統的Token費用並自動控制"
    answer: "b"
    explanation: "系統提示（System Prompt）是提示工程的核心工具，用來設定生成式AI的角色定位（「你是一位財務分析師」）、回答規範和輸出格式要求（「請以JSON格式輸出」），確保生成式AI的輸出符合整合系統下游模組的需求。"
    difficulty: 2
    tags: ["system-prompt", "prompt-engineering", "generative"]

  # ── D3 應用題（10題）──────────────────────────────────────

  - id: L11402-Q18
    stem: "某醫院導入AI系統：Step 1 用AI分析CT影像偵測可疑腫瘤；Step 2 對可疑案例自動生成結構化診斷報告草稿供醫師確認。這個系統最適合描述為哪種整合模式？"
    options:
      a: "串聯模式：鑑別式偵測腫瘤後，生成式撰寫報告"
      b: "強化模式：生成假的CT影像來訓練腫瘤偵測AI"
      c: "並聯模式：偵測和報告生成同時執行"
      d: "RAG 模式：先搜尋病歷知識庫再生成報告"
    answer: "a"
    explanation: "Step 1（CT影像偵測腫瘤）= 鑑別式AI；Step 2（生成診斷報告）= 生成式AI。Step 1的輸出（偵測結果）作為Step 2的輸入（報告內容的依據），有明確先後順序，是串聯模式。"
    difficulty: 3
    tags: ["medical", "pipeline", "scenario"]

  - id: L11402-Q19
    stem: "金融公司想建立一個AI系統：員工詢問「最新的反洗錢法規要求是什麼？」系統能查閱最新的監管文件後回答，而非依賴模型訓練時的舊知識。下列哪種整合方式最適合？"
    options:
      a: "串聯模式：先用NLP分類問題類型，再生成回答"
      b: "強化模式：用生成式AI合成大量法規問答來訓練模型"
      c: "RAG 模式：從監管文件知識庫中檢索相關內容，再生成回答"
      d: "並聯模式：鑑別式和生成式同時分析問題"
    answer: "c"
    explanation: "這個場景的關鍵需求是「查閱最新文件後回答」——正是RAG的核心用途：Retrieval（從知識庫檢索最新監管文件）+ Generation（根據檢索結果生成精確回答）。RAG解決了生成模型知識截止日和幻覺的問題。"
    difficulty: 3
    tags: ["RAG", "finance", "scenario"]

  - id: L11402-Q20
    stem: "教育平台想讓AI根據每個學生的弱點自動出題：Step 1 分析學生答題記錄找出弱點；Step 2 針對弱點生成個人化練習題。此系統中兩個步驟分別屬於哪種AI？"
    options:
      a: "Step 1 = 鑑別式（分析/預測弱點）；Step 2 = 生成式（生成題目）"
      b: "Step 1 = 生成式（生成分析報告）；Step 2 = 鑑別式（分類題目難度）"
      c: "Step 1 和 Step 2 都是生成式AI"
      d: "Step 1 和 Step 2 都是鑑別式AI"
    answer: "a"
    explanation: "Step 1（分析答題記錄、預測弱點）= 鑑別式AI（分析/分類任務）；Step 2（生成個人化練習題）= 生成式AI（創造新內容）。整體是串聯整合：先分析弱點，再針對弱點創造題目。"
    difficulty: 3
    tags: ["education", "pipeline", "discriminative-generative"]

  - id: L11402-Q21
    stem: "某零售平台想提升商品上架效率：使用AI自動分析商品圖片辨別類別，再自動生成商品描述文案。同時，針對個別客戶行為分析喜好，生成個人化推薦理由。如果採用並聯模式，兩個分支最可能是？"
    options:
      a: "圖片分類（鑑別式）在一個分支；推薦理由生成（生成式）在另一分支，兩者同時處理同一個商品請求"
      b: "圖片分類和商品描述生成都在同一分支，並聯處理"
      c: "兩個分支都是鑑別式AI，處理不同類型的分類任務"
      d: "RAG 先檢索商品資料庫，再並聯生成描述和推薦"
    answer: "a"
    explanation: "並聯模式中，針對同一個輸入請求，兩個AI分支同時執行：一個分支做圖片分類/商品辨識（鑑別式），另一個分支做個人化推薦理由生成（生成式），最後融合兩個輸出呈現給使用者。"
    difficulty: 3
    tags: ["retail", "parallel", "scenario"]

  - id: L11402-Q22
    stem: "一個自動化內容審核系統的流程：AI生成行銷文案草稿 → 鑑別式AI審核是否合規 → 不合格退回重生成，合格才發布。這個流程最接近哪種整合模式的描述？"
    options:
      a: "強化模式（Augmentation）"
      b: "RAG 模式"
      c: "「生—鑑—監」閉環模式"
      d: "並聯模式（Parallel）"
    answer: "c"
    explanation: "這個流程是：生成式AI產出內容（生）→ 鑑別式AI審核品質/合規（鑑）→ 監控和回饋（監），形成一個改善閉環。不合格退回重生成，符合「生—鑑—監」閉環的特徵：生成→鑑別→監控→循環。"
    difficulty: 3
    tags: ["generate-discriminate-monitor", "content-moderation", "scenario"]

  - id: L11402-Q23
    stem: "製造業品管團隊發現：現有瑕疵品樣本太少（10,000片產品中只有3片不良品），導致品檢AI準確率很低。下列哪種整合方案最能解決此問題？"
    options:
      a: "採用強化模式，用生成式AI（如GAN）合成大量假瑕疵圖片擴充訓練集"
      b: "採用RAG模式，從瑕疵知識庫中檢索後生成檢測報告"
      c: "採用串聯模式，先用語音辨識記錄操作員的品管評語"
      d: "採用並聯模式，同時運行兩個品檢模型取平均"
    answer: "a"
    explanation: "稀少的罕見類別是強化模式（Augmentation）最適合解決的問題。GAN等生成模型可以合成大量「假的不良品圖片」，混入真實資料後，品檢鑑別式AI有足夠的罕見類別樣本訓練，準確率大幅提升。"
    difficulty: 3
    tags: ["augmentation", "manufacturing", "GAN", "scenario"]

  - id: L11402-Q24
