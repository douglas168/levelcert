  # ── D4 分析題（5題）──────────────────────────────────────

  - id: L11402-Q28
    stem: "一家銀行想比較兩套AI系統設計方案：\n方案A（串聯）：詐欺偵測模型 → 生成式AI生成風險報告 → 審核員查看\n方案B（並聯）：詐欺偵測 + 報告生成 同時執行 → 審核員查看\n關於兩方案的延遲特性，下列分析何者正確？"
    options:
      a: "方案A總延遲 = 詐欺偵測延遲 + 報告生成延遲；方案B總延遲 ≈ max（詐欺偵測延遲，報告生成延遲）"
      b: "方案A比方案B慢，但方案A的報告可以引用詐欺偵測的具體結果；方案B更快但報告無法基於偵測結果"
      c: "兩個方案的延遲相同，都取決於較慢的那個步驟"
      d: "方案B延遲 = 方案A延遲 × 2，因為需要同時執行兩個模型"
