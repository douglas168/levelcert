  - id: L11402-Q31
    stem: "整合系統工程師發現一個問題：鑑別式AI輸出一個JSON物件 {category: 'fraud', confidence: 0.92}，但生成式AI的提示詞只設計接受純文字輸入，導致生成式AI無法正確理解鑑別結果。這個問題屬於哪種整合挑戰？"
